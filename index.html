 not: PostgresRepo()","tags":["#solid","#clean-code","#dependency-injection","#design-principles"]},{"e":"\ud83c\udfad","name":"Design Patterns \u2014 GoF Essentials","m":"bf","tldr":"Creational: Factory, Builder, Singleton. Structural: Adapter, Decorator, Facade, Proxy. Behavioral: Observer, Strategy, Command, Iterator. Know when NOT to use each \u2014 patterns are solutions to specific problems.","code":"# Strategy \u2014 swap algorithm at runtime\nclass Sorter:\n    def __init__(self, strategy: SortStrategy): self.s = strategy\n    def sort(self, data): return self.s.sort(data)\n\n# Observer \u2014 event-driven decoupling\nclass EventBus:\n    handlers: dict[str, list] = {}\n    def subscribe(self, event, h): self.handlers.setdefault(event,[]).append(h)\n    def publish(self, event, data=None):\n        for h in self.handlers.get(event, []): h(data)\n\n# Decorator \u2014 add behavior without modification\ndef retry(max_attempts=3):\n    def decorator(func):\n        async def wrapper(*args, **kwargs):\n            for i in range(max_attempts):\n                try: return await func(*args, **kwargs)\n                except Exception:\n                    if i == max_attempts-1: raise\n                    await asyncio.sleep(2**i)  # exponential backoff\n        return wrapper\n    return decorator\n\n# Factory \u2014 create objects without specifying exact class\nclass StorageFactory:\n    @staticmethod\n    def create(env: str) -> Storage:\n        return S3Storage() if env == \"prod\" else LocalStorage()","tags":["#design-patterns","#strategy","#observer","#decorator","#factory","#gof"]}]},{"label":"API & messaging","cards":[{"e":"\ud83d\udd0c","name":"API Design \u2014 REST + GraphQL + gRPC","m":"bfl","tldr":"REST: resource-based, HTTP verbs, stateless, cacheable \u2014 good for public APIs. GraphQL: client-specified shape, single endpoint \u2014 good for complex frontends. gRPC: protobuf, binary, streaming \u2014 good for internal services.","code":"# REST \u2014 resource conventions\n# GET    /orders        list (with ?cursor= pagination)\n# POST   /orders        create -> 201 + Location header\n# GET    /orders/{id}   read\n# PUT    /orders/{id}   replace\n# PATCH  /orders/{id}   partial update\n# DELETE /orders/{id}   delete -> 204\n\n# Cursor-based pagination (better than offset for large data)\n# GET /orders?cursor=eyJpZCI6MTAwfQ&limit=20\n# Response: { data: [...], next_cursor: \"eyJpZCI6MTIwfQ\" }\n\n# gRPC service definition (.proto)\n# service OrderService {\n#   rpc CreateOrder(CreateOrderRequest) returns (Order);\n#   rpc StreamOrders(StreamRequest) returns (stream Order);\n# }\n\n# GraphQL: use DataLoader to solve N+1\n# loader = DataLoader(batch_fn)  # batches: [id1,id2] -> [user1,user2]\n# result = await loader.load(user_id)  # batched automatically","tags":["#rest","#graphql","#grpc","#api-design","#pagination","#dataloader"]},{"e":"\u26a1","name":"Message Queues \u2014 Kafka / Pub-Sub","m":"bfl","tldr":"Kafka: log-based, high throughput, replayable, partitioned by key. Pub/Sub (GCP): managed, at-least-once delivery, push or pull. RabbitMQ: message-based routing, competing consumers, acknowledgments.","img":"Kafka = train station with recorded timetable. You can replay any train. Pub/Sub = postal system. Each letter delivered once to one recipient. Wrong metaphor = wrong tool for your use case.","code":"# Kafka producer (Python)\nfrom confluent_kafka import Producer\np = Producer({\"bootstrap.servers\": \"broker:9092\"})\np.produce(\n    \"order-events\",\n    key=str(order_id).encode(),\n    value=json.dumps(event).encode(),\n    callback=lambda err, msg: print(f\"Delivered to {msg.topic()}\"))\np.flush()\n\n# Consumer with manual offset commit (exactly-once processing)\nc = Consumer({\n    \"bootstrap.servers\": \"broker:9092\",\n    \"group.id\": \"order-processor\",\n    \"auto.offset.reset\": \"earliest\",\n    \"enable.auto.commit\": False,  # manual: only commit after processing\n})\nc.subscribe([\"order-events\"])\nmsg = c.poll(1.0)\nprocess(msg.value())\nc.commit()   # only after successful processing","tags":["#kafka","#pubsub","#message-queue","#event-driven","#consumer-group"]}]},{"label":"Concurrency & scalability patterns","cards":[{"e":"\ud83e\uddf5","name":"Concurrency Patterns \u2014 Mutex, Semaphore, Actor Model","m":"bf","tldr":"Mutex: one owner at a time (binary lock). Semaphore: N concurrent owners. RWLock: many readers OR one writer. Actor model: no shared state, communicate only via messages \u2014 Erlang/Akka/Go channels.","img":"Mutex = single-stall bathroom. Semaphore = parking lot with N spaces. RWLock = library: many can read the book simultaneously, only one can annotate it. Actor = each person has their own inbox \u2014 no grabbing stuff from each others desks.","code":"# Python asyncio locks\nimport asyncio\n\n# Mutex \u2014 one coroutine at a time\nmutex = asyncio.Lock()\nasync def critical_section():\n    async with mutex:\n        await do_exclusive_work()\n\n# Semaphore \u2014 limit concurrent DB connections\nsem = asyncio.Semaphore(10)\nasync def query_db(sql):\n    async with sem:   # max 10 concurrent queries\n        return await db.execute(sql)\n\n# RWLock \u2014 many readers, one writer\nimport asyncio_rwlock\nlock = asyncio_rwlock.RWLock()\nasync def read():\n    async with lock.reader:\n        return cache.get(key)\nasync def write(val):\n    async with lock.writer:   # exclusive\n        cache.set(key, val)\n\n# Go channels (Actor model pattern)\n# ch := make(chan int, 100)  // buffered channel\n# go func() { ch <- compute() }()  // send\n# result := <-ch             // receive","tags":["#concurrency","#mutex","#semaphore","#rwlock","#actor-model","#channels"]},{"e":"\ud83c\udfaa","name":"CQRS Read Models & Projections","m":"bf","tldr":"Write side: commands \u2192 domain events \u2192 event store. Read side: projections subscribe to events and build optimized read models (denormalized, query-specific). Each read model is a different view of the same events.","img":"A company keeps one master ledger (event store). The accounting department builds their own spreadsheet from it (read model A). Sales builds a different dashboard (read model B). Both always accurate, optimized for their own queries.","code":"# Event handler builds a read model\nclass OrderSummaryProjection:\n    \"\"\"Denormalized read model \u2014 optimized for dashboard queries\"\"\"\n\n    async def on(self, event: DomainEvent):\n        if event.type == \"ORDER_CREATED\":\n            await db.execute(\"\"\"\n                INSERT INTO order_summaries\n                    (id, customer_id, status, total, item_count, created_at)\n                VALUES ($1,$2,$3,$4,$5,$6)\n            \"\"\", event.order_id, event.customer_id,\n                \"pending\", event.total, len(event.items), event.timestamp)\n\n        elif event.type == \"ORDER_COMPLETED\":\n            await db.execute(\"\"\"\n                UPDATE order_summaries\n                SET status=\"completed\", completed_at=$2\n                WHERE id=$1\n            \"\"\", event.order_id, event.timestamp)\n\n# Read model query \u2014 O(1), no joins\nsummary = await db.fetchrow(\n    \"SELECT * FROM order_summaries WHERE id=$1\", order_id)\n\n# Different projection for analytics\nclass RevenueByDayProjection:\n    async def on(self, event):\n        if event.type == \"ORDER_COMPLETED\":\n            await db.execute(\"\"\"\n                INSERT INTO revenue_by_day (day, revenue)\n                VALUES (date_trunc(\"day\",$1), $2)\n                ON CONFLICT (day) DO UPDATE SET revenue = revenue + $2\n            \"\"\", event.timestamp, event.total)","tags":["#cqrs","#projection","#read-model","#event-sourcing","#denormalization"]},{"e":"\ud83d\udd10","name":"Distributed Locking \u2014 Redis + etcd","m":"bf","tldr":"Distributed locks prevent concurrent execution across multiple nodes. Redis: SET NX PX (Redlock for multi-node). etcd: lease-based with TTL. Use for: cron job deduplication, critical sections, leader election.","img":"Hotel room key card (distributed lock). Hotel computer (Redis/etcd) issues one key at a time. Key auto-expires if guest forgets to check out (TTL). Prevents two guests entering same room simultaneously.","code":"import redis, uuid, time\n\nclass RedisLock:\n    def __init__(self, redis_client, key, ttl_ms=30000):\n        self.r = redis_client\n        self.key = f\"lock:{key}\"\n        self.ttl = ttl_ms\n        self.token = str(uuid.uuid4())  # unique per lock instance\n\n    def acquire(self, retry=3, wait=0.1):\n        for _ in range(retry):\n            # SET key token NX PX ttl \u2014 atomic acquire\n            ok = self.r.set(self.key, self.token,\n                           nx=True, px=self.ttl)\n            if ok: return True\n            time.sleep(wait)\n        return False\n\n    def release(self):\n        # Lua script: only delete if we own it (atomic check+delete)\n        script = \"\"\"\n            if redis.call(\"get\",KEYS[1]) == ARGV[1] then\n                return redis.call(\"del\",KEYS[1])\n            else return 0 end\n        \"\"\"\n        self.r.eval(script, 1, self.key, self.token)\n\n# Usage\nlock = RedisLock(redis_client, \"process-invoices\")\nif lock.acquire():\n    try: process_invoices()\n    finally: lock.release()","tags":["#distributed-lock","#redis","#redlock","#etcd","#ttl","#idempotency"]},{"e":"\ud83d\udccb","name":"Outbox Pattern \u2014 Guaranteed Event Delivery","m":"bf","tldr":"Write business state AND event to outbox table in same DB transaction. Separate poller reads outbox and publishes to message broker. Guarantees no event loss even if broker is down when business action happens.","img":"Restaurant order slip system. Waiter writes order on slip (DB transaction + outbox entry). Runner checks the slip rail (outbox poller) and takes it to kitchen (message broker). Order never lost even if kitchen is temporarily closed.","code":"# Step 1: Write state + outbox in ONE transaction\nasync def place_order(order_data):\n    async with db.transaction():\n        order_id = await db.execute(\"\"\"\n            INSERT INTO orders (id, customer_id, total, status)\n            VALUES ($1,$2,$3,\"pending\") RETURNING id\n        \"\"\", uuid4(), order_data.customer_id, order_data.total)\n\n        # Outbox entry \u2014 same transaction, guaranteed atomic\n        await db.execute(\"\"\"\n            INSERT INTO outbox (id, aggregate_id, event_type, payload, published)\n            VALUES ($1,$2,\"ORDER_PLACED\",$3, false)\n        \"\"\", uuid4(), order_id, json.dumps(order_data))\n\n    return order_id\n\n# Step 2: Poller publishes unpublished events\nasync def outbox_poller():\n    while True:\n        events = await db.fetch(\"\"\"\n            SELECT * FROM outbox\n            WHERE published = false\n            ORDER BY created_at\n            LIMIT 100\n            FOR UPDATE SKIP LOCKED   -- prevents concurrent processing\n        \"\"\")\n        for event in events:\n            await kafka.publish(event.event_type, event.payload)\n            await db.execute(\n                \"UPDATE outbox SET published=true WHERE id=$1\", event.id)\n        await asyncio.sleep(0.1)","tags":["#outbox","#transactional-outbox","#at-least-once","#kafka","#reliability"]}]},{"label":"Reliability & contracts","cards":[{"e":"\ud83e\udd1d","name":"API Contracts \u2014 Consumer-Driven Contract Testing","m":"bf","tldr":"Consumer writes test asserting what it expects from provider. Provider runs consumer contract tests in CI. Catches breaking changes before deployment. Pact is the standard tool. Never coordinate via shared Postman collections.","code":"# Consumer defines the contract (using Pact)\nfrom pact import Consumer, Provider\n\npact = Consumer(\"order-service\").has_pact_with(Provider(\"payment-service\"))\n\ndef test_charge_payment():\n    (pact\n     .given(\"a valid customer with credit card on file\")\n     .upon_receiving(\"a charge request\")\n     .with_request(\"POST\", \"/charge\",\n                   body={\"amount\": 9999, \"currency\": \"CLP\"})\n     .will_respond_with(200, body={\n         \"transaction_id\": pact.like(\"tx-123\"),  # any string\n         \"status\": \"approved\"\n     }))\n    with pact:\n        result = payment_client.charge(amount=9999)\n        assert result.status == \"approved\"\n# Pact publishes contract to broker\n# payment-service CI pulls and verifies it can satisfy contract","tags":["#contract-testing","#pact","#consumer-driven","#api-contract","#breaking-changes"]},{"e":"\ud83c\udff7\ufe0f","name":"Semantic Versioning & API Evolution","m":"bm","tldr":"MAJOR.MINOR.PATCH. Major = breaking change. Minor = backward-compatible feature. Patch = bug fix. API versioning strategies: URL path (/v1/), header (Accept-Version), query param. Never break existing clients \u2014 always add, never remove.","code":"# URL versioning (most explicit, best for public APIs)\nGET /api/v1/orders      # old version\nGET /api/v2/orders      # new version \u2014 can run simultaneously\n\n# Header versioning (cleaner URLs, harder to test in browser)\nGET /api/orders\nAccept: application/vnd.myapi.v2+json\n\n# Expand-contract pattern (zero-downtime schema migration)\n# Phase 1: Add new field (backward compatible)\nALTER TABLE orders ADD COLUMN customer_email text;\n\n# Phase 2: Dual-write old and new field in code\n# order.customer_id = ...   (old)\n# order.customer_email = ... (new)\n\n# Phase 3: Migrate data\nUPDATE orders o SET customer_email = u.email\nFROM users u WHERE u.id = o.customer_id;\n\n# Phase 4: Remove old field reads from code\n# Phase 5: Drop old column\nALTER TABLE orders DROP COLUMN customer_id;\n\n# Deprecation headers (give clients time to migrate)\n# Deprecation: Tue, 01 Jan 2026 00:00:00 GMT\n# Sunset: Mon, 01 Jan 2027 00:00:00 GMT\n# Link: <https://docs.api.com/migration>; rel=\"deprecation\"","tags":["#semver","#api-versioning","#backward-compatibility","#deprecation","#expand-contract"]}]}]},"systems":{"icon":"\ud83c\udf10","color":"var(--arch)","bg":"rgba(77,171,247,0.10)","title":"Distributed Systems","desc":"CAP theorem, consensus, sharding, replication, circuit breakers. The hard problems of distributed computing.","secs":[{"label":"Fundamentals","cards":[{"e":"\ud83d\udd3a","name":"CAP Theorem & Consistency Models","m":"bm","tldr":"Pick 2 of 3: Consistency (all nodes see same data), Availability (every request gets response), Partition tolerance (works despite network splits). In practice always choose P, so choose C or A. PACELC extends this for latency tradeoff.","img":"Three judges who must agree but cannot always communicate. Consistency = wait until all agree. Availability = any judge can give verdict now. Partition = phone lines down. Cannot have all three when lines fail.","code":"# CP systems (consistent over available):\n# HBase, Zookeeper, etcd, MongoDB (w: majority)\n# Use for: bank balances, inventory, distributed locks\n\n# AP systems (available over consistent):\n# DynamoDB (default), Cassandra, CouchDB\n# Use for: shopping cart, user profiles, analytics counters\n\n# Consistency levels in Cassandra (tunable per query):\n# ONE < TWO < QUORUM < ALL\n# session.execute(query, timeout=10,\n#     consistency_level=ConsistencyLevel.QUORUM)\n\n# Postgres: serializable (strongest) to read uncommitted (weakest)\n# Most apps: READ COMMITTED is fine\n# Financial: REPEATABLE READ or SERIALIZABLE\n\n# Eventual consistency: DynamoDB default\n# Strong consistency: DynamoDB option (2x read cost)\n# table.get_item(Key={...}, ConsistentRead=True)","tags":["#cap","#consistency","#availability","#partition","#eventual-consistency"]},{"e":"\ud83d\udc94","name":"Circuit Breaker & Retry Patterns","m":"bfl","tldr":"Circuit breaker: CLOSED (normal) \u2192 OPEN (failing fast) \u2192 HALF-OPEN (testing recovery). Prevents cascade failure. Retry: exponential backoff + jitter prevents thundering herd. Bulkhead: separate thread pools per dependency.","img":"Electrical circuit breaker: normal = closed (current flows), too many failures = open (cut power, fail fast). Half-open = test with one request. Bulkhead = ship compartments \u2014 one flooding does not sink the whole ship.","code":"from circuitbreaker import circuit\nfrom tenacity import retry, stop_after_attempt, wait_exponential, wait_random\n\n# Circuit breaker\n@circuit(failure_threshold=5, recovery_timeout=30,\n         expected_exception=ConnectionError)\nasync def call_payment_service(payload):\n    return await http.post(\"http://payment/charge\", json=payload)\n\n# Retry with exponential backoff + jitter (prevents thundering herd)\n@retry(\n    stop=stop_after_attempt(3),\n    wait=wait_exponential(multiplier=1, min=1, max=30) + wait_random(0, 2),\n    reraise=True,\n)\nasync def resilient_api_call(url):\n    return await http.get(url)\n\n# Timeout: always set explicit timeouts\nasync with aiohttp.ClientSession(\n    timeout=aiohttp.ClientTimeout(total=5.0)) as session:\n    response = await session.get(url)","tags":["#circuit-breaker","#retry","#backoff","#bulkhead","#resilience"]},{"e":"\ud83d\udd00","name":"Consistent Hashing & Sharding","m":"bf","tldr":"Consistent hashing: virtual nodes on ring, only K/N keys remapped when node added/removed vs K/total for naive hashing. Used by: Cassandra, DynamoDB, Redis Cluster. Sharding strategies: range, hash, directory.","code":"import hashlib, bisect\n\nclass ConsistentHashRing:\n    def __init__(self, nodes, replicas=150):\n        self.ring = {}\n        self.keys = []\n        for node in nodes:\n            for i in range(replicas):  # virtual nodes = even distribution\n                k = self._hash(f\"{node}:{i}\")\n                self.ring[k] = node\n                bisect.insort(self.keys, k)\n\n    def _hash(self, s):\n        return int(hashlib.md5(s.encode()).hexdigest(), 16)\n\n    def get_node(self, key):\n        h = self._hash(key)\n        i = bisect.bisect(self.keys, h) % len(self.keys)\n        return self.ring[self.keys[i]]\n\n# Sharding strategies:\n# Range: shard by user_id range (simple, hot spots possible)\n# Hash:  shard by hash(user_id) (even distribution, no range queries)\n# Directory: lookup table (flexible, single point of failure risk)","tags":["#sharding","#consistent-hashing","#partitioning","#cassandra","#redis-cluster"]},{"e":"\ud83d\uddf3\ufe0f","name":"Raft Consensus Algorithm","m":"bf","tldr":"How distributed nodes agree despite failures. Leader handles all writes and replicates to majority. Followers reply with acks. Committed = majority acknowledged. If leader dies: followers elect new leader via term voting.","img":"Voting committee where members can drop off calls. Elect a leader (term), leader replicates log to majority, commits when majority acknowledges. No majority = no progress (safety over liveness).","code":"# Raft roles: Leader, Follower, Candidate\n# Term: monotonically increasing election epoch\n# Log entry committed when replicated to majority (N/2 + 1)\n\n# etcd uses Raft internally \u2014 used by Kubernetes\n# All pod scheduling uses Raft consensus\n\n# Distributed lock via etcd\nimport etcd3\nclient = etcd3.client(host=\"localhost\", port=2379)\nlock = client.lock(\"critical-section\", ttl=30)\nwith lock:\n    # Only one node runs this at a time\n    do_critical_work()\n\n# Read with strong consistency (from leader)\n# etcdctl get /config/key --consistency=l\n\n# Leader election pattern: whoever sets the key first wins\n# TTL = automatic release if holder crashes","tags":["#raft","#paxos","#consensus","#etcd","#distributed-lock","#leader-election"]}]},{"label":"Patterns","cards":[{"e":"\ud83d\udcf8","name":"Saga Pattern \u2014 Distributed Transactions","m":"bf","tldr":"Distributed transactions without 2-phase commit. Choreography: each service emits events, others react. Orchestration: central coordinator calls each service sequentially. Compensating transactions handle rollback.","code":"# Orchestration Saga \u2014 Toteat order flow\nclass CreateOrderSaga:\n    async def execute(self, order):\n        compensations = []\n        try:\n            await inventory.reserve(order.items)\n            compensations.append(lambda: inventory.release(order.items))\n\n            await payment.charge(order.customer_id, order.total)\n            compensations.append(lambda: payment.refund(order.payment_id))\n\n            await notification.send_confirmation(order.customer_id)\n            return {\"status\": \"success\", \"order_id\": order.id}\n\n        except Exception as e:\n            # Compensate in reverse order\n            for compensate in reversed(compensations):\n                try: await compensate()\n                except Exception: pass  # log, continue compensating\n            raise SagaFailedError(str(e))","tags":["#saga","#distributed-transactions","#compensation","#orchestration"]}]},{"label":"Data consistency & replication","cards":[{"e":"\ud83d\udcdd","name":"Write-Ahead Log (WAL) & Replication","m":"bf","tldr":"Every write goes to append-only WAL before data files. Crash recovery replays WAL. Replication ships WAL to replicas (streaming replication in Postgres). Logical replication: replicate specific tables across versions.","img":"Restaurant kitchen order ticket rail. Every order written on ticket BEFORE food is made. If chef collapses, new chef reads tickets and catches up. Replicas = other kitchens reading the same ticket rail in real time.","code":"# Postgres WAL and replication\n# Primary: stream WAL to replicas\n# postgresql.conf on primary:\n# wal_level = replica\n# max_wal_senders = 3\n# wal_keep_size = 1GB\n\n# Check replication lag\nSELECT client_addr,\n       pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn) AS lag_bytes,\n       state, sync_state\nFROM pg_stat_replication;\n\n# Logical replication: replicate subset of tables\n# Publisher (source):\nCREATE PUBLICATION my_pub FOR TABLE orders, customers;\n\n# Subscriber (destination):\nCREATE SUBSCRIPTION my_sub\n    CONNECTION \"host=primary dbname=mydb\"\n    PUBLICATION my_pub;\n\n# Point-in-time recovery (PITR):\n# base backup + WAL archives = restore to any timestamp\n# pg_basebackup -h primary -D /backup -Ft -Xs -P\n# recovery_target_time = \"2024-03-15 14:30:00\"","tags":["#wal","#replication","#postgres","#pitr","#streaming-replication"]},{"e":"\ud83d\udd04","name":"Two-Phase Commit (2PC) vs Saga","m":"bf","tldr":"2PC: coordinator asks all participants to prepare (Phase 1), then commit (Phase 2). Atomic but blocking \u2014 if coordinator crashes between phases, participants hold locks indefinitely. Saga is better: no blocking, compensations for rollback.","img":"2PC = wedding ceremony. Officiant (coordinator) asks both parties \"do you agree?\" (prepare). If both say yes, declares married (commit). If officiant faints between phases, both parties stuck waiting forever. Saga = just start the honeymoon and if it goes badly, get a divorce (compensation).","code":"# 2PC \u2014 implementation sketch (rarely build yourself)\nclass TwoPhaseCommit:\n    async def prepare(self, participants, transaction):\n        votes = await asyncio.gather(*[\n            p.prepare(transaction) for p in participants])\n        return all(votes)  # all must vote YES\n\n    async def execute(self, participants, transaction):\n        if await self.prepare(participants, transaction):\n            await asyncio.gather(*[p.commit(transaction) for p in participants])\n        else:\n            await asyncio.gather(*[p.rollback(transaction) for p in participants])\n\n# Saga (preferred) \u2014 see sw-arch room for full example\n# Key difference: no distributed lock held during saga\n# Compensation instead of rollback:\n# Book flight -> book hotel -> book car\n# If car fails: cancel hotel, cancel flight (compensations)\n# Each step is its own committed transaction\n\n# When to use 2PC: you control all participants, short transactions\n# When to use Saga: microservices, long-running, external services","tags":["#2pc","#two-phase-commit","#saga","#distributed-transactions","#atomicity"]},{"e":"\ud83d\udcbe","name":"Read Replicas & Connection Pooling","m":"bfl","tldr":"Read replica: async replica taking all read traffic. PgBouncer: connection pool in front of Postgres (100s of app connections \u2192 10s of DB connections). Pattern: writes to primary, reads to replica, cache in Redis.","code":"# PgBouncer config (pgbouncer.ini)\n[databases]\nmydb = host=primary port=5432 dbname=mydb\nmydb_read = host=replica port=5432 dbname=mydb\n\n[pgbouncer]\npool_mode = transaction    # recommended \u2014 connection released after txn\nmax_client_conn = 1000     # app connections\ndefault_pool_size = 20     # DB connections per user/db pair\nmin_pool_size = 5\nreserve_pool_size = 5\nserver_idle_timeout = 600\n\n# Application: route reads to replica\nclass DBRouter:\n    def __init__(self):\n        self.write = asyncpg.create_pool(\"postgresql://primary/mydb\")\n        self.read  = asyncpg.create_pool(\"postgresql://replica/mydb\")\n\n    async def execute(self, sql, *args):\n        pool = self.read if sql.strip().upper().startswith(\"SELECT\") else self.write\n        async with pool.acquire() as conn:\n            return await conn.fetch(sql, *args)\n\n# Redis caching layer on top\nasync def get_order(order_id):\n    cached = await redis.get(f\"order:{order_id}\")\n    if cached: return json.loads(cached)\n    order = await db.execute(\"SELECT * FROM orders WHERE id=$1\", order_id)\n    await redis.setex(f\"order:{order_id}\", 300, json.dumps(order))  # 5min TTL\n    return order","tags":["#read-replica","#pgbouncer","#connection-pooling","#caching","#redis"]}]},{"label":"Observability & debugging","cards":[{"e":"\ud83d\udd2c","name":"Distributed Tracing \u2014 Context Propagation","m":"bf","tldr":"Trace ID propagated in HTTP headers (W3C traceparent) across all services. Each service creates child spans. Full request traced end-to-end even across 10 microservices. Critical for debugging latency in distributed systems.","code":"# W3C Trace Context header format:\n# traceparent: 00-{trace_id}-{parent_span_id}-{flags}\n# tracestate: vendor-specific key=value pairs\n\n# FastAPI + OpenTelemetry auto-instrumentation\nfrom opentelemetry.instrumentation.fastapi import FastAPIInstrumentor\nfrom opentelemetry.instrumentation.httpx import HTTPXClientInstrumentor\n\nFastAPIInstrumentor.instrument_app(app)    # injects trace headers automatically\nHTTPXClientInstrumentor().instrument()     # propagates to outgoing requests\n\n# Manual span with attributes\nfrom opentelemetry import trace\ntracer = trace.get_tracer(__name__)\n\nasync def process_payment(order_id, amount):\n    with tracer.start_as_current_span(\"payment.process\") as span:\n        span.set_attribute(\"order.id\", str(order_id))\n        span.set_attribute(\"payment.amount\", amount)\n        span.set_attribute(\"payment.currency\", \"CLP\")\n        try:\n            result = await payment_gateway.charge(amount)\n            span.set_attribute(\"payment.transaction_id\", result.tx_id)\n            return result\n        except Exception as e:\n            span.record_exception(e)\n            span.set_status(trace.StatusCode.ERROR, str(e))\n            raise\n\n# Baggage: carry business context across services\nfrom opentelemetry.baggage import set_baggage\nctx = set_baggage(\"customer.tier\", \"premium\")","tags":["#distributed-tracing","#opentelemetry","#trace-context","#spans","#w3c-traceparent"]}]}]},"langs":{"icon":"\ud83d\udcbb","color":"var(--langs)","bg":"rgba(38,198,218,0.10)","title":"Languages & Runtimes","desc":"Python, TypeScript/Node.js, SQL, async patterns, memory models. Internalized by every principal engineer.","secs":[{"label":"Python","cards":[{"e":"\ud83d\udc0d","name":"Python \u2014 Advanced Patterns & Performance","m":"bm","tldr":"GIL means only one thread runs Python at a time. Use asyncio for I/O-bound tasks, multiprocessing for CPU-bound. Generators for memory efficiency. Type hints + dataclasses + functools = clean fast Python.","code":"# asyncio \u2014 I/O bound (HTTP, DB, files)\nimport asyncio, aiohttp\n\nasync def fetch_all(urls: list[str]) -> list[dict]:\n    async with aiohttp.ClientSession() as session:\n        tasks = [fetch_one(session, url) for url in urls]\n        return await asyncio.gather(*tasks)  # all parallel\n\n# multiprocessing \u2014 CPU bound (ML inference, data processing)\nfrom multiprocessing import Pool\nwith Pool(processes=8) as pool:\n    results = pool.map(process_batch, data_chunks)\n\n# Generators \u2014 memory efficient for large datasets\ndef read_large_file(path: str):\n    with open(path) as f:\n        for line in f:\n            yield parse_line(line)  # never loads whole file\n\n# Dataclasses \u2014 clean value objects\nfrom dataclasses import dataclass, field\n@dataclass(frozen=True)\nclass ModelConfig:\n    model_name: str = \"claude-sonnet-4\"\n    max_tokens: int = 2048\n    tools: list[str] = field(default_factory=list)\n\n# Caching expensive computations\nfrom functools import cache, lru_cache\n@cache  # unbounded, thread-safe in 3.9+\ndef expensive(n: int) -> int: return fib(n-1) + fib(n-2)","tags":["#python","#asyncio","#multiprocessing","#generators","#dataclass","#cache"]},{"e":"\ud83d\udd22","name":"NumPy & Pandas \u2014 Essential Patterns","m":"bm","tldr":"NumPy: vectorized ops 1000x faster than Python loops. Broadcasting avoids copies. Pandas: groupby-agg, merge, window functions. Never loop over DataFrame rows \u2014 use vectorized operations.","code":"import numpy as np, pandas as pd\n\n# NumPy \u2014 vectorized, no loops\na = np.random.randn(1000, 512)\nnorms = np.linalg.norm(a, axis=1, keepdims=True)\nnormalized = a / norms  # broadcasting \u2014 no copy, no loop\n\n# einsum: readable matrix operations\nattention = np.einsum(\"bhid,bhjd->bhij\", Q, K) / math.sqrt(d_k)\n\n# Pandas \u2014 groupby with multiple aggregations\nfeatures = df.groupby(\"user_id\").agg(\n    event_count=(\"event_id\", \"count\"),\n    avg_amount=(\"amount\", \"mean\"),\n    last_active=(\"timestamp\", \"max\"),\n).reset_index()\n\n# Window functions\ndf[\"rolling_7d\"] = (df.groupby(\"user_id\")[\"amount\"]\n                    .transform(lambda x: x.rolling(7, min_periods=1).mean()))\n\n# Memory optimization\ndf[\"count\"] = df[\"count\"].astype(np.int32)      # 64 -> 32 bit\ndf[\"category\"] = df[\"category\"].astype(\"category\")  # string dedup","tags":["#numpy","#pandas","#vectorization","#broadcasting","#groupby","#window"]}]},{"label":"TypeScript & Node.js","cards":[{"e":"\ud83d\udcd8","name":"TypeScript \u2014 Type System Mastery","m":"bfl","tldr":"Utility types: Partial, Required, Pick, Omit, Record, Exclude, Extract. Generics with constraints. Conditional types. Template literal types. Discriminated unions = exhaustive type-safe event handling.","code":"// Utility types\ntype UserDTO    = Partial<User>\ntype UserID     = Pick<User, \"id\" | \"email\">\ntype NoPassword = Omit<User, \"password\">\ntype RouteMap   = Record<string, () => void>\n\n// Generic with constraint\nfunction get<T, K extends keyof T>(obj: T, key: K): T[K] {\n    return obj[key];  // fully type-safe\n}\n\n// Discriminated union \u2014 exhaustive switch\ntype Event =\n  | { type: \"ORDER_CREATED\"; orderId: string; total: number }\n  | { type: \"PAYMENT_FAILED\"; reason: string; code: number }\n\nfunction handle(event: Event): void {\n    switch (event.type) {\n        case \"ORDER_CREATED\":  console.log(event.orderId); break;\n        case \"PAYMENT_FAILED\": console.log(event.reason);  break;\n        // TypeScript errors if a case is missing\n    }\n}\n\n// Template literal types\ntype EventName = \"ORDER_CREATED\" | \"PAYMENT_FAILED\"\n// Template literal type\n// type Route = \"/api/\" + string  -- maps to string literal union","tags":["#typescript","#generics","#utility-types","#discriminated-union","#type-safety"]},{"e":"\u26a1","name":"Node.js \u2014 Event Loop & Async Patterns","m":"bfl","tldr":"Event loop priority: Sync code \u2192 process.nextTick \u2192 Promise microtasks \u2192 setTimeout/I/O callbacks \u2192 setImmediate. Never block the event loop with CPU work. Use worker_threads for CPU-bound tasks.","code":"// Event loop priority (highest to lowest):\n// 1. Sync code in call stack\n// 2. process.nextTick() callbacks\n// 3. Promise microtasks (.then/.catch/.finally)\n// 4. setTimeout / setInterval (macrotasks)\n// 5. I/O callbacks\n// 6. setImmediate\n\n// Never block: offload CPU to worker thread\nconst { Worker, isMainThread, parentPort, workerData } = require(\"worker_threads\");\nif (isMainThread) {\n    const worker = new Worker(__filename, { workerData: { input: bigArray } });\n    worker.on(\"message\", result => console.log(\"Done:\", result));\n} else {\n    parentPort.postMessage(heavyCPUWork(workerData.input));\n}\n\n// Stream with backpressure (handles large data)\nconst { pipeline } = require(\"stream/promises\");\nawait pipeline(\n    fs.createReadStream(\"large-file.csv\"),\n    csvParser(),\n    transformStream,  // your processing\n    fs.createWriteStream(\"output.json\"),\n);  // pipeline handles backpressure automatically","tags":["#nodejs","#event-loop","#async-await","#worker-threads","#streams"]}]},{"label":"SQL & databases","cards":[{"e":"\ud83d\uddc4\ufe0f","name":"SQL \u2014 Advanced Patterns Every Engineer Needs","m":"bm","tldr":"Window functions replace 80% of self-joins. CTEs make recursive queries readable. EXPLAIN ANALYZE finds slow queries. Index types: B-tree (default), GiST (geometric/full-text), GIN (arrays/JSONB), BRIN (time-series).","code":"-- Window functions: analytics without subqueries\nSELECT user_id, amount,\n    ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY created_at DESC) AS rn,\n    SUM(amount)  OVER (PARTITION BY user_id)                         AS total_spent,\n    LAG(amount)  OVER (PARTITION BY user_id ORDER BY created_at)     AS prev_amount,\n    AVG(amount)  OVER (PARTITION BY user_id\n                       ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)     AS rolling_7d\nFROM orders;\n\n-- CTE for readable multi-step analytics\nWITH revenue AS (\n    SELECT date_trunc(\"month\", created_at) AS month,\n           sum(total) AS rev\n    FROM orders WHERE status = \"completed\"\n    GROUP BY 1\n), mom AS (\n    SELECT *, rev / LAG(rev) OVER (ORDER BY month) - 1 AS growth\n    FROM revenue\n)\nSELECT * FROM mom WHERE growth < -0.1;  -- months with >10% decline\n\n-- EXPLAIN ANALYZE: always run before deploying slow queries\nEXPLAIN (ANALYZE, BUFFERS, FORMAT JSON)\nSELECT * FROM orders WHERE user_id = 123;\n-- Seq Scan on large table = missing index\n-- Nested Loop on large sets = might need Hash Join","tags":["#sql","#window-functions","#cte","#indexes","#explain-analyze","#postgres"]}]},{"label":"Java & JVM","cards":[{"e":"\u2615","name":"Java \u2014 Modern Features (17+) & JVM Internals","m":"bf","tldr":"Records (immutable data classes), sealed classes (exhaustive types), pattern matching switch, virtual threads (Project Loom \u2014 lightweight concurrency). JVM: JIT compilation, GC tuning (G1 vs ZGC), JMX monitoring.","img":"JVM = a very sophisticated factory floor. JIT = machine that auto-optimizes production line based on actual usage patterns. GC = cleaning crew that removes waste without stopping production. Virtual threads = millions of lightweight workers vs thousands of heavy OS threads.","code":"// Records \u2014 immutable value objects (Java 16+)\npublic record OrderEvent(\n    String orderId,\n    String customerId,\n    BigDecimal total,\n    Instant timestamp\n) {}  // equals, hashCode, toString auto-generated\n\n// Sealed classes \u2014 exhaustive type hierarchy (Java 17+)\npublic sealed interface PaymentResult\n    permits PaymentApproved, PaymentDeclined, PaymentPending {}\n\npublic record PaymentApproved(String transactionId) implements PaymentResult {}\npublic record PaymentDeclined(String reason, int code) implements PaymentResult {}\n\n// Pattern matching switch (Java 21)\nString describe(PaymentResult r) {\n    return switch (r) {\n        case PaymentApproved a  -> \"Approved: \" + a.transactionId();\n        case PaymentDeclined d  -> \"Declined: \" + d.reason();\n        case PaymentPending  p  -> \"Pending\";\n    };  // compiler checks exhaustiveness\n}\n\n// Virtual threads (Java 21) \u2014 millions of lightweight threads\ntry (var executor = Executors.newVirtualThreadPerTaskExecutor()) {\n    IntStream.range(0, 100_000).forEach(i ->\n        executor.submit(() -> callExternalService(i)));\n}  // blocks here until all complete; each task is a virtual thread\n   // no more CompletableFuture callback hell for I/O-bound work","tags":["#java","#records","#sealed-classes","#virtual-threads","#jvm","#java21"]},{"e":"\ud83c\udf0a","name":"Java Streams & Functional Patterns","m":"bfl","tldr":"Stream pipeline: source \u2192 intermediate ops (lazy) \u2192 terminal op (executes everything). Parallel streams use ForkJoinPool. Optional replaces null. Method references clean up lambdas. CompletableFuture for async.","code":"import java.util.*;\nimport java.util.stream.*;\nimport java.util.concurrent.CompletableFuture;\n\n// Stream pipeline \u2014 lazy evaluation\nList<OrderSummary> result = orders.stream()\n    .filter(o -> o.status() == Status.COMPLETED)         // lazy\n    .filter(o -> o.total().compareTo(BigDecimal.ZERO) > 0)\n    .sorted(Comparator.comparing(Order::createdAt).reversed())\n    .map(o -> new OrderSummary(o.id(), o.total()))       // lazy\n    .limit(100)\n    .collect(Collectors.toList());                        // executes all\n\n// Grouping and aggregation\nMap<Status, Long> countByStatus = orders.stream()\n    .collect(Collectors.groupingBy(Order::status, Collectors.counting()));\n\nMap<String, DoubleSummaryStatistics> statsByCustomer = orders.stream()\n    .collect(Collectors.groupingBy(Order::customerId,\n        Collectors.summarizingDouble(o -> o.total().doubleValue())));\n\n// CompletableFuture \u2014 async composition\nCompletableFuture<Order> future = CompletableFuture\n    .supplyAsync(() -> orderRepo.findById(orderId))      // async fetch\n    .thenApplyAsync(order -> enrichWithCustomer(order))  // async transform\n    .thenCombine(fetchInventory(orderId),                // parallel fetch\n                 (order, inv) -> mergeOrderWithInventory(order, inv))\n    .exceptionally(ex -> Order.empty());  // fallback on error","tags":["#java","#streams","#functional","#completablefuture","#optional","#collectors"]},{"e":"\ud83c\udff0","name":"Spring Boot \u2014 Production Patterns","m":"bf","tldr":"Spring Boot = opinionated convention-over-config Java. Key: @Transactional (declarative transactions), @Async (virtual thread executor), Actuator (health, metrics, env), Spring Data JPA (repository pattern), Spring Security.","code":"// Repository pattern with Spring Data JPA\n@Repository\npublic interface OrderRepository extends JpaRepository<Order, UUID> {\n    // Spring generates implementation automatically\n    List<Order> findByCustomerIdAndStatusOrderByCreatedAtDesc(\n        UUID customerId, OrderStatus status);\n\n    @Query(\"SELECT o FROM Order o WHERE o.total > :min AND o.createdAt > :since\")\n    Page<Order> findHighValueOrders(\n        @Param(\"min\") BigDecimal min,\n        @Param(\"since\") Instant since,\n        Pageable pageable);\n}\n\n// Service with declarative transaction\n@Service\npublic class OrderService {\n    @Transactional           // rolls back on RuntimeException\n    public Order placeOrder(CreateOrderCommand cmd) {\n        Order order = Order.create(cmd);\n        Order saved = orderRepository.save(order);\n        eventPublisher.publishEvent(new OrderCreatedEvent(saved));\n        return saved;\n    }\n\n    @Async                   // runs in virtual thread pool (Spring Boot 3.2+)\n    public CompletableFuture<Report> generateReport(UUID customerId) {\n        return CompletableFuture.completedFuture(buildReport(customerId));\n    }\n}\n\n// Actuator health check\n// GET /actuator/health -> {\"status\":\"UP\",\"components\":{...}}\n// GET /actuator/metrics/jvm.memory.used\n// GET /actuator/env","tags":["#spring-boot","#jpa","#transactional","#repository","#actuator","#async"]},{"e":"\u26a1","name":"Kotlin \u2014 Modern JVM (Coroutines + DSLs)","m":"bf","tldr":"Kotlin = Java but readable. Null safety built into type system. Data classes. Extension functions. Coroutines = structured concurrency (suspend functions). DSL builders. 100% interop with Java.","code":"// Null safety \u2014 no NPE if you follow the type system\nfun processOrder(order: Order?): String {\n    return order?.let {          // only executes if order != null\n        it.id.toString()\n    } ?: \"no order\"             // Elvis operator: fallback if null\n}\n\n// Data class \u2014 equals/hashCode/copy/toString auto-generated\ndata class OrderSummary(\n    val id: UUID,\n    val total: BigDecimal,\n    val status: OrderStatus = OrderStatus.PENDING,  // default value\n)\nval updated = summary.copy(status = OrderStatus.COMPLETED)  // immutable update\n\n// Coroutines \u2014 structured concurrency\nsuspend fun processOrder(orderId: UUID): Order = coroutineScope {\n    val order = async { orderRepo.findById(orderId) }      // parallel\n    val customer = async { customerRepo.findById(/* */ ) }  // parallel\n    buildFullOrder(order.await(), customer.await())         // join both\n}\n\n// Extension functions \u2014 add methods to existing classes\nfun BigDecimal.toCLP(): String = \"CLP ${this.setScale(0)}\"\nval price = BigDecimal(\"9999.50\").toCLP()  // \"CLP 10000\"\n\n// Type-safe DSL\nval query = query {\n    select { listOf(orders.id, orders.total) }\n    from { orders }\n    where { orders.status eq OrderStatus.COMPLETED }\n    orderBy { orders.createdAt.desc() }\n}","tags":["#kotlin","#coroutines","#null-safety","#data-class","#extension-functions","#dsl"]}]},{"label":"DynamoDB \u2014 Deep Dive","cards":[{"e":"\ud83e\udd8b","name":"DynamoDB \u2014 Data Modeling & Key Design","m":"bf","tldr":"Everything depends on access patterns FIRST. Design table schema backwards from queries \u2014 opposite of SQL. Single-table design: one table, multiple entity types. PK = hash key (determines partition). SK = sort key (enables range queries within partition).","img":"DynamoDB is a filing cabinet where you MUST know the drawer name (PK) and the label order (SK) before putting anything in. SQL is a library where you can search any book by any field. Dynamo forces you to know what questions you will ask before you design the cabinet.","code":"# Single-table design \u2014 all entities in one table\n# PK (partition key) + SK (sort key) pattern\n\n# Entity types in one table:\n# USER          PK=USER#userId        SK=PROFILE\n# ORDER         PK=USER#userId        SK=ORDER#2024-03-15#orderId\n# ORDER_ITEM    PK=ORDER#orderId      SK=ITEM#itemId\n# PRODUCT       PK=PRODUCT#productId  SK=METADATA\n\n# Access patterns this supports:\n# Get user profile:         PK=USER#123, SK=PROFILE\n# Get user orders:          PK=USER#123, SK begins_with ORDER#\n# Get orders in date range: PK=USER#123, SK between ORDER#2024-01# and ORDER#2024-02#\n# Get order items:          PK=ORDER#456, SK begins_with ITEM#\n\n# GSI (Global Secondary Index) for reverse lookups:\n# GSI1PK = ORDER#orderId, GSI1SK = STATUS#pending\n# Query: \"all pending orders\" -> GSI1PK begins_with STATUS#pending\n\nimport boto3\nfrom boto3.dynamodb.conditions import Key, Attr\n\ntable = boto3.resource(\"dynamodb\").Table(\"MyApp\")\n\n# Put item\ntable.put_item(Item={\n    \"PK\": \"USER#usr-123\",\n    \"SK\": \"ORDER#2024-03-15#ord-456\",\n    \"total\": 9999,\n    \"status\": \"pending\",\n    \"GSI1PK\": \"STATUS#pending\",  # for GSI query\n    \"GSI1SK\": \"2024-03-15\",\n})\n\n# Query user orders in date range\nresult = table.query(\n    KeyConditionExpression=\n        Key(\"PK\").eq(\"USER#usr-123\") &\n        Key(\"SK\").between(\"ORDER#2024-01\", \"ORDER#2024-04\")\n)","tags":["#dynamodb","#single-table","#pk-sk","#gsi","#data-modeling","#access-patterns"]},{"e":"\u26a1","name":"DynamoDB \u2014 Transactions, Streams & TTL","m":"bf","tldr":"TransactWriteItems: up to 100 items across tables, ACID guarantee (2x cost). DynamoDB Streams: ordered record of all changes (CDC). TTL: auto-delete expired items \u2014 perfect for sessions, cache, ephemeral data.","code":"import boto3\nfrom datetime import datetime, timedelta\n\ndynamo = boto3.client(\"dynamodb\")\n\n# TransactWriteItems \u2014 atomic multi-item write\ndynamo.transact_write_items(TransactItems=[\n    {\n        \"Put\": {\n            \"TableName\": \"Orders\",\n            \"Item\": {\n                \"PK\": {\"S\": \"ORDER#ord-789\"},\n                \"SK\": {\"S\": \"METADATA\"},\n                \"status\": {\"S\": \"confirmed\"},\n            },\n            \"ConditionExpression\": \"attribute_not_exists(PK)\",  # idempotency\n        }\n    },\n    {\n        \"Update\": {\n            \"TableName\": \"Inventory\",\n            \"Key\": {\"PK\": {\"S\": \"PRODUCT#prod-1\"}, \"SK\": {\"S\": \"STOCK\"}},\n            \"UpdateExpression\": \"SET quantity = quantity - :qty\",\n            \"ConditionExpression\": \"quantity >= :qty\",  # optimistic lock\n            \"ExpressionAttributeValues\": {\":qty\": {\"N\": \"1\"}},\n        }\n    }\n])\n\n# TTL \u2014 auto-expire items (sessions, cache, temp data)\nexpire_at = int((datetime.now() + timedelta(hours=24)).timestamp())\ntable.put_item(Item={\n    \"PK\": \"SESSION#sess-abc\",\n    \"SK\": \"DATA\",\n    \"user_id\": \"usr-123\",\n    \"ttl\": expire_at,   # DynamoDB deletes automatically (within 48h)\n})\n\n# DynamoDB Streams \u2014 react to changes (Lambda trigger)\n# Stream record: {eventName: INSERT|MODIFY|REMOVE,\n#                 NewImage: {...}, OldImage: {...}}","tags":["#dynamodb","#transactions","#transact-write","#streams","#ttl","#cdc"]},{"e":"\ud83d\udcca","name":"DynamoDB \u2014 Capacity Planning & Cost Optimization","m":"bf","tldr":"On-demand: pay per request, auto-scales, good for unpredictable. Provisioned: set RCU/WCU, cheaper at steady load, use auto-scaling. GSI cost = main table throughput on index. Avoid hot partitions (spread writes across PKs).","code":"# Capacity units:\n# 1 RCU = 1 strongly consistent read of 4KB\n#        or 2 eventually consistent reads of 4KB\n# 1 WCU = 1 write up to 1KB\n\n# Estimating capacity:\n# 1000 reads/sec of 2KB items, strong consistency:\n#   RCUs = 1000 * ceil(2KB/4KB) * 1 = 1000 RCU\n# 500 writes/sec of 500B items:\n#   WCUs = 500 * ceil(500B/1KB) = 500 WCU\n\n# Hot partition problem \u2014 avoid these PK patterns:\n# BAD:  PK=\"STATUS#pending\"  (all pending orders in one partition)\n# BAD:  PK=\"DATE#2024-03-15\" (all today orders in one partition)\n# GOOD: PK=\"USER#userId\"     (spreads across users)\n# GOOD: PK=\"ORDER#orderId\"   (random UUID = even distribution)\n\n# Write sharding for high-throughput single key:\nimport random\nshard = random.randint(0, 9)  # 10 shards\ntable.update_item(\n    Key={\"PK\": f\"COUNTER#clicks#{shard}\", \"SK\": \"VALUE\"},\n    UpdateExpression=\"ADD count :inc\",\n    ExpressionAttributeValues={\":inc\": 1},\n)\n# Read: sum all 10 shards\n\n# Batch operations (cheaper than individual)\nwith table.batch_writer() as batch:\n    for item in items:\n        batch.put_item(Item=item)  # auto-batches in groups of 25","tags":["#dynamodb","#rcu","#wcu","#capacity-planning","#hot-partition","#cost"]}]}]},"infra":{"icon":"\u2601\ufe0f","color":"var(--infra)","bg":"rgba(255,107,107,0.10)","title":"Cloud & Infra","desc":"Kubernetes, Docker, Terraform, GitOps, OpenTelemetry. The production foundation.","secs":[{"label":"Containers & orchestration","cards":[{"e":"\ud83d\udc33","name":"Docker \u2014 Production Multi-Stage Builds","m":"bm","tldr":"Multi-stage: build stage has all dev deps, production stage copies only final artifacts. Non-root user. HEALTHCHECK. Pin base image versions. Result: small, secure, reproducible production images.","code":"# Node.js \u2014 minimal production image (~150MB vs ~1GB)\nFROM node:20-alpine AS builder\nWORKDIR /app\nCOPY package*.json ./\nRUN npm ci                       # reproducible (uses package-lock.json)\nCOPY . .\nRUN npm run build\n\nFROM node:20-alpine AS production\nWORKDIR /app\n# Non-root user for security\nRUN addgroup -g 1001 -S app && adduser -S app -u 1001\nCOPY --from=builder --chown=app:app /app/node_modules ./node_modules\nCOPY --from=builder --chown=app:app /app/dist         ./dist\nCOPY --chown=app:app package.json .\nUSER app\nEXPOSE 3000\nHEALTHCHECK --interval=30s --timeout=5s     CMD wget -qO- http://localhost:3000/health || exit 1\nCMD [\"node\", \"dist/index.js\"]\n\n# Python ML with GPU\n# FROM nvidia/cuda:12.1-runtime-ubuntu22.04\n# RUN pip install --no-cache-dir torch==2.1.0+cu121","tags":["#docker","#multi-stage","#security","#non-root","#healthcheck","#gpu"]},{"e":"\u2638\ufe0f","name":"Kubernetes \u2014 Production Patterns","m":"bfl","tldr":"Deployment with rolling update + resource limits + liveness/readiness probes = zero-downtime. HPA autoscales on CPU or custom metrics. PodDisruptionBudget ensures availability during node drain.","code":"# Deployment \u2014 production-ready\napiVersion: apps/v1\nkind: Deployment\nspec:\n  replicas: 3\n  strategy:\n    type: RollingUpdate\n    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}  # zero-downtime\n  template:\n    spec:\n      containers:\n      - name: api\n        resources:\n          requests: {cpu: \"100m\", memory: \"256Mi\"}  # scheduling\n          limits:   {cpu: \"500m\", memory: \"512Mi\"}  # hard cap\n        livenessProbe:\n          httpGet: {path: /health, port: 3000}\n          initialDelaySeconds: 30\n        readinessProbe:\n          httpGet: {path: /ready, port: 3000}\n        lifecycle:\n          preStop: {exec: {command: [\"sleep\", \"10\"]}}  # drain connections\n\n# Essential kubectl commands\n# kubectl rollout restart deployment/api     -- rolling restart\n# kubectl rollout status deployment/api      -- watch rollout\n# kubectl top pods -n prod                   -- resource usage\n# kubectl port-forward svc/api 8080:80       -- debug locally","tags":["#kubernetes","#k8s","#hpa","#pdb","#rolling-update","#probes"]},{"e":"\ud83c\udfd7\ufe0f","name":"Terraform & CDKTF \u2014 IaC Patterns","m":"bfl","tldr":"Always use remote state with locking. Modules for reusability. Plan \u2192 Review \u2192 Apply \u2014 never skip plan. CDKTF adds TypeScript type safety to Terraform. Workspaces for environment isolation.","code":"# Remote state with locking (prevents concurrent apply)\nterraform {\n  backend \"gcs\" {\n    bucket = \"my-tf-state\"\n    prefix = \"prod/services\"\n  }\n}\n\n# Module pattern \u2014 reusable infrastructure\nmodule \"ml_cluster\" {\n  source       = \"./modules/gke-cluster\"\n  project_id   = var.project_id\n  region       = \"us-central1\"\n  node_count   = 3\n  machine_type = \"n2-standard-8\"\n  gpu_type     = \"nvidia-tesla-t4\"\n}\n\n# CDKTF \u2014 Terraform with TypeScript type safety\nimport { App, TerraformStack } from \"cdktf\";\nimport { GoogleProvider, ContainerCluster } from \"@cdktf/provider-google\";\n\nclass MLStack extends TerraformStack {\n  constructor(scope: Construct, id: string) {\n    super(scope, id);\n    new GoogleProvider(this, \"gcp\", {project: \"my-project\"});\n    new ContainerCluster(this, \"cluster\", {name: \"ml-cluster\"});\n  }\n}","tags":["#terraform","#cdktf","#iac","#gcp","#gke","#remote-state"]}]},{"label":"Observability","cards":[{"e":"\ud83d\udc41\ufe0f","name":"OpenTelemetry \u2014 Full Observability Stack","m":"bm","tldr":"OTel = traces + metrics + logs under one standard. Instrument once, send to any backend (Grafana, Datadog, Honeycomb). For AI agents: trace every LLM call with token usage, latency, and model version.","code":"import { NodeSDK } from \"@opentelemetry/sdk-node\";\nimport { OTLPTraceExporter } from \"@opentelemetry/exporter-trace-otlp-http\";\nimport { PrometheusExporter } from \"@opentelemetry/exporter-prometheus\";\n\nconst sdk = new NodeSDK({\n  serviceName: process.env.SERVICE_NAME,\n  traceExporter: new OTLPTraceExporter({url: process.env.OTEL_ENDPOINT}),\n  metricReader: new PrometheusExporter({port: 9464}),\n});\nsdk.start();  // auto-instruments: http, express, pg, redis\n\n// Manual span for AI operations\nconst tracer = trace.getTracer(\"ai-operations\");\nconst span = tracer.startSpan(\"llm.chat_completion\");\nspan.setAttributes({\n  \"llm.provider\":      \"anthropic\",\n  \"llm.model\":         \"claude-sonnet-4\",\n  \"llm.tokens.input\":  inputTokens,\n  \"llm.tokens.output\": outputTokens,\n  \"llm.cost_usd\":      0.0023,\n  \"agent.name\":        \"incident-resolver\",\n});\nspan.end();","tags":["#opentelemetry","#observability","#tracing","#metrics","#prometheus"]}]}]},"claude-setup":{"icon":"\u2699\ufe0f","color":"var(--tools)","bg":"rgba(255,169,77,0.10)","title":"Claude Code & AI Tools","desc":"CLAUDE.md config, slash commands, worktree workflows, Cursor, Copilot. Maximum AI-assisted velocity.","secs":[{"label":"Configuration","cards":[{"e":"\ud83d\udccb","name":"CLAUDE.md \u2014 Master Config Template","m":"bm","tldr":"Read at every session start \u2014 this IS your system prompt for Claude Code. Put: project context, tech stack, coding standards, agent definitions, forbidden patterns, frequently used commands.","code":"# Project: Toteat POS Platform\n## What this is\nMulti-country restaurant POS and payments platform. Currently migrating\nfrom Python/Flask monolith to Node.js/Fastify microservices.\nActive services: orders, inventory, products, billing, notifications.\n\n## Tech stack\n- Runtime: Node.js 20 + TypeScript 5 (strict: true)\n- Framework: Fastify + Zod validation (all external data)\n- DB: PostgreSQL 16 + pgvector + Redis 7\n- Infra: GCP GKE + Terraform CDKTF + GitHub Actions CI/CD\n- AI: Claude Code + Anthropic API for agentic features\n\n## Architecture\n- Hexagonal: src/domain/ has ZERO infra imports \u2014 enforced\n- Event Sourcing + CQRS for orders and inventory domains\n- @toteat/service-core for all new microservices\n\n## Standards\n- Never use 'any' \u2014 use 'unknown' + type guard\n- All errors: Error subclasses, never throw strings\n- No console.log \u2014 use: import { log } from \"@toteat/service-core\"\n- Tests required for all domain logic\n\n## Agents\n### system-architect (opus \u2014 auto-invoke)\nTrigger: schema changes, new services, architectural decisions\nAction: think deeply, consider trade-offs, write ADR\n\n## Forbidden\n- Direct DB calls from route handlers (go through use-case layer)\n- Hardcoded secrets (use environment variables only)","tags":["#claude-code","#claude-md","#config","#project-context","#standards"]},{"e":"\u26a1","name":"Slash Commands Library","m":"bm","tldr":"Custom slash commands stored in .claude/commands/ as markdown files. Each is a reusable agent workflow. Call with /command-name. Can chain Claude actions, run bash, and interact with git.","code":".claude/commands/\n  # Worktree workflow (parallel feature development)\n  wt-init.md       # Create worktree, copy .env, npm install\n  wt-deliver.md    # Commit staged changes + create PR\n  wt-check.md      # Run lint + tests + typecheck before commit\n  wt-cleanup.md    # Remove merged worktrees, prune stale\n\n  # Code quality\n  lint.md          # Run ESLint/ruff + auto-fix\n  test.md          # Run test suite + explain failures clearly\n  typecheck.md     # Run tsc --noEmit + explain type errors\n\n  # Architecture\n  adr.md           # Create Architecture Decision Record\n  review.md        # Comprehensive code review checklist\n  refactor.md      # Refactor with explanation of tradeoffs\n\n  # AI workflows\n  agent-debug.md   # Debug agent loop with full trace analysis\n  prompt-test.md   # Test prompt variations systematically\n  cost-audit.md    # Audit token spend per workflow\n\n# Example wt-init.md content:\n# 1. Ask user for feature name\n# 2. git worktree add ../{project}-{feature} -b feature/{feature}\n# 3. cd to new worktree, copy .env.local\n# 4. npm install in new worktree\n# 5. Report: \"Ready in ../{project}-{feature}\"","tags":["#slash-commands","#claude-code","#workflow","#automation","#worktree"]},{"e":"\ud83c\udf3f","name":"Git Worktree \u2014 Parallel AI Development","m":"bfl","tldr":"Work on N features simultaneously without stashing. Each worktree = separate directory, same git repo. Claude Code can run in parallel across worktrees. Game changer for parallel AI-assisted development.","img":"Multiple workbenches from the same toolbox. Switching features = walk to another bench (instant), not clean up everything first. Each Claude Code instance works independently on its own branch.","code":"# Create worktree for new feature\ngit worktree add ../toteat-payments -b feature/payment-v2\n\n# Now run Claude Code instances simultaneously:\n# Terminal 1: cd ../toteat-payments && claude\n# Terminal 2: cd toteat-main && claude\n# Both run concurrently, different branches, same repo\n\n# List all active worktrees\ngit worktree list\n\n# Clean up after merging\ngit worktree remove ../toteat-payments\ngit worktree prune   # remove stale references\n\n# Power layout\n# ~/work/\n#   toteat-main/           <- main branch\n#   toteat-payments/       <- feature worktree\n#   toteat-edge-fleet/     <- another feature worktree\n# Each has its own node_modules and .env.local","tags":["#git-worktree","#parallel","#workflow","#claude-code","#feature-branches"]}]},{"label":"AI coding tools","cards":[{"e":"\ud83d\uddb1\ufe0f","name":"Cursor \u2014 Rules & Best Practices","m":"bfl","tldr":".cursorrules file = always-on system prompt for your project. Be specific about architecture rules, naming conventions, and forbidden patterns. Cursor applies context on every completion.","code":"# .cursorrules (project root)\nYou are an expert TypeScript and Python engineer.\nThis project uses Fastify + hexagonal architecture.\n\nArchitecture rules:\n- src/domain/ NEVER imports from src/infrastructure/\n- All external data validated with Zod \u2014 never trust raw input\n- Prefer explicit error types: ApiError, DomainError, InfraError\n\nWhen suggesting code:\n- Show most idiomatic TypeScript approach\n- Point out performance issues immediately\n- Flag any security concerns (SQL injection, auth gaps, secrets)\n\nFor SQL: always parameterized queries, never string interpolation\nFor async: always handle errors \u2014 no unhandled rejections\nFor tests: unit tests for domain, integration tests for adapters\n\n# Cursor power features:\n# Cmd+K:  edit selected code in place\n# Cmd+L:  open chat about current file\n# @file:  reference a specific file in chat\n# @docs:  search framework documentation\n# @codebase: ask about entire project structure","tags":["#cursor","#cursorrules","#ai-coding","#productivity","#code-completion"]},{"e":"\ud83e\udd1d","name":"GitHub Copilot \u2014 Getting Best Results","m":"bfl","tldr":"Better function names + type hints + comments as specs = dramatically better Copilot suggestions. Copilot Chat /commands for specific tasks: /explain, /fix, /tests, /doc. @workspace for project-wide questions.","code":"# Copilot works best with rich context:\n\n# 1. Descriptive names signal intent\ndef calculate_rolling_average_excluding_nulls(\n    values: list[float | None],\n    window: int,\n) -> list[float]:\n    # Copilot now generates exactly the right implementation\n\n# 2. Type hints as specification\ndef create_rag_retriever(\n    vectorstore: Chroma,\n    k: int = 5,\n    search_type: Literal[\"similarity\", \"mmr\"] = \"mmr\",\n    score_threshold: float = 0.7,\n) -> BaseRetriever:\n    # Full type context = complete accurate suggestions\n\n# 3. Comment as natural language spec\n# Given transactions list, compute per user:\n# - total spent last 30 days\n# - rolling 7-day average order value\n# - percentile rank among all users\ndef analyze_user_spending(txns: list[Transaction]) -> list[UserStats]:\n    # Copilot generates full implementation from comment\n\n# Copilot Chat commands:\n# /explain  -- explain selected code\n# /fix      -- fix selected error or bug\n# /tests    -- generate tests for selection\n# /doc      -- generate docstring\n# @workspace -- ask about entire project","tags":["#copilot","#github-copilot","#ai-coding","#type-hints","#copilot-chat"]}]},{"label":"Advanced Claude Code patterns","cards":[{"e":"\ud83c\udfd7\ufe0f","name":"system-architect Agent \u2014 Opus on Demand","m":"bm","tldr":"Define a system-architect agent in CLAUDE.md that auto-invokes on architectural decisions using claude-opus-4. It thinks deeply, considers tradeoffs, and writes ADRs. The key is: Sonnet for day-to-day work, Opus only when the decision matters and is hard to reverse.","code":"# In CLAUDE.md:\n## Agents\n\n### system-architect\nModel: claude-opus-4-20250514\nAuto-invoke on: any question about schema design, new service creation,\n  data model changes, API contract decisions, choosing between patterns\nAction:\n  1. Think deeply \u2014 consider 3+ alternatives\n  2. Reason about: scalability, maintainability, operability\n  3. Write ADR to docs/decisions/YYYY-MM-DD-{slug}.md\n\n### code-reviewer\nModel: claude-sonnet-4-20250514\nAuto-invoke on: when user says \"review this\", \"is this correct\"\nAction:\n  - Check for: security issues, N+1 queries, missing error handling\n  - Check for: type safety, test coverage gaps, performance red flags\n  - Output: numbered list of issues by severity\n\n### test-writer\nModel: claude-sonnet-4-20250514\nInvoke with: /write-tests\nAction:\n  - Read the implementation file\n  - Identify all code paths and edge cases\n  - Write unit tests and integration tests\n  - Aim for 90%+ branch coverage","real":"With this setup, Claude Code escalates to Opus only for hard architectural decisions \u2014 keeping most work on Sonnet for cost efficiency while getting full reasoning power where it matters.","tags":["#claude-code","#system-architect","#opus","#adr","#agent-definition"]},{"e":"\ud83d\udd04","name":"Parallel Subagent Execution \u2014 Task Tool Mastery","m":"bm","tldr":"The Task tool lets Claude Code spawn parallel subagents. Pattern: decompose task into independent units \u2192 spawn all simultaneously \u2192 join results. Key: subagents share read-only context, never share mutable state.","code":"# Prompt pattern for parallel execution:\n\n\"\"\"\nI need to analyze this codebase for security issues.\nUse the Task tool to run these 4 agents IN PARALLEL:\n\nTask 1: \"Scan all Python files for SQL injection vulnerabilities.\n  Look for string interpolation in SQL queries. Report file:line for each.\"\n\nTask 2: \"Scan all route handlers for missing authentication.\n  Check if protected routes verify JWT tokens. List unprotected endpoints.\"\n\nTask 3: \"Scan all environment variable usage.\n  Find any secrets hardcoded in source files vs loaded from env.\"\n\nTask 4: \"Scan all dependencies in requirements.txt and package.json.\n  Flag packages with known CVEs. Check against npm audit and safety DB.\"\n\nWait for all 4 to complete, then merge findings into a priority-ranked report.\n\"\"\"\n\n# Why this is faster:\n# Sequential: 4 tasks * 2min each = 8 min\n# Parallel:   4 tasks running simultaneously = ~2 min\n# Speedup: 4x on independent subtasks\n\n# Key constraint: subagents should only READ shared files\n# Writing to same file from multiple agents = race condition","tags":["#task-tool","#parallel","#subagent","#decomposition","#speedup"]},{"e":"\ud83d\udd10","name":"Permission Settings \u2014 Trust Levels & Security","m":"bm","tldr":"Claude Code has 4 permission levels: auto-approve trusted tools (bash in sandbox), prompt for network/writes, always-deny destructive ops. Configure per-project in settings. Key: never auto-approve git push or production deploys.","code":"# Claude Code permission configuration\n# ~/.claude/settings.json (global) or .claude/settings.json (project)\n\n{\n  \"permissions\": {\n    \"allow\": [\n      \"bash(npm test)\",          # always allow test runs\n      \"bash(npm run lint)\",       # always allow linting\n      \"bash(git status)\",         # always allow git status\n      \"bash(git diff)\",           # always allow diffs\n      \"bash(git add *)\",          # allow staging\n      \"bash(cat *)\",              # allow reading files\n      \"str_replace(*)\",           # allow file edits\n      \"create_file(*)\"            # allow creating files\n    ],\n    \"deny\": [\n      \"bash(git push *)\",         # always confirm before push\n      \"bash(kubectl * prod *)\",   # never auto-run prod kubectl\n      \"bash(rm -rf *)\",           # never auto-delete\n      \"bash(* --force *)\"         # never auto-force anything\n    ]\n  },\n  \"model\": \"claude-sonnet-4-20250514\",\n  \"tools\": {\n    \"bash\": { \"timeout\": 120 }   # kill runaway commands after 2min\n  }\n}\n\n# Project-level: .claude/settings.json overrides global\n# Useful: stricter settings in production-adjacent repos","tags":["#claude-code","#permissions","#security","#settings","#trust-levels"]},{"e":"\ud83d\udcdd","name":"ADR Workflow \u2014 Architecture Decision Records","m":"bfl","tldr":"ADR = lightweight doc capturing: Context (why decision needed), Options considered, Decision made, Consequences. Stored in docs/decisions/. Claude Code auto-writes them via the system-architect agent. Future you will thank present you.","code":"# ADR template (docs/decisions/template.md)\n# ADR {number}: {title}\n\n## Status\n{Proposed | Accepted | Deprecated | Superseded by ADR-XXX}\n\n## Date\n{YYYY-MM-DD}\n\n## Context\n{What situation required a decision? What constraints exist?\n What problem are we solving?}\n\n## Options Considered\n\n### Option 1: {name}\n- Pros: ...\n- Cons: ...\n\n### Option 2: {name}\n- Pros: ...\n- Cons: ...\n\n## Decision\n{What was decided and why. Be direct.}\n\n## Consequences\n- Positive: ...\n- Negative: ...\n- Neutral: ...\n\n## Implementation Notes\n{Any gotchas or things to watch out for}\n\n# Example: docs/decisions/2024-03-15-event-sourcing-for-orders.md\n# Status: Accepted\n# Context: Need audit log, time-travel debugging, ML training data\n# Decision: Use Event Sourcing for Orders domain only\n# Consequence: More complex write path, enables full replay capability","tags":["#adr","#architecture-decisions","#documentation","#knowledge-base"]},{"e":"\ud83e\uddea","name":"Test-Driven Development with Claude Code","m":"bfl","tldr":"Pattern: write failing test \u2192 ask Claude to make it pass \u2192 refactor. Or: describe behavior \u2192 Claude writes test + implementation together. Key: keep Claude in the red-green-refactor loop, not just implementation mode.","code":"# Workflow 1: Test-first\n# 1. Write the test yourself:\ndef test_order_total_includes_tax():\n    order = Order(items=[Item(\"burger\", 1000)])\n    assert order.total_with_tax(tax_rate=0.19) == 1190\n\n# 2. Ask Claude: \"Make this test pass without modifying it\"\n# Claude implements Order.total_with_tax() correctly\n\n# Workflow 2: Behavior-first\n# Tell Claude: \"Write tests AND implementation for:\n# - OrderService.cancel(order_id) should:\n#   - Only work if status is PENDING or CONFIRMED\n#   - Emit ORDER_CANCELLED event\n#   - Refund payment if payment was processed\n#   - Raise OrderNotCancellableError if status is COMPLETED\"\n\n# Workflow 3: Regression via Claude\n# When bug found: \"Write a test that would have caught this bug,\n# then fix the bug so the test passes\"\n\n# /write-tests slash command in CLAUDE.md:\n# 1. Read the implementation file passed as argument\n# 2. Identify all branches and edge cases\n# 3. Write pytest/jest tests for each\n# 4. Run tests, fix any that fail due to test mistakes (not bugs)\n# 5. Report coverage summary","tags":["#tdd","#claude-code","#testing","#red-green-refactor","#test-first"]}]},{"label":"Advanced configuration","cards":[{"e":"\ud83c\udfaf","name":"Project-Specific CLAUDE.md \u2014 Full Examples","m":"bm","tldr":"Different projects need different Claude Code personalities. A fintech project needs strict security focus. A research project needs exploration mode. An ML project needs training awareness. Here are three real templates.","code":"# === FINTECH PROJECT ===\n# Security-first CLAUDE.md\n\n## Security rules (NEVER violate)\n- Never log sensitive data: card numbers, CVVs, PINs, full account numbers\n- Always validate and sanitize input at service boundaries with Zod\n- Use parameterized queries \u2014 never string-interpolate SQL\n- Encrypt PII at rest (use existing EncryptedField type)\n- Rate limiting required on all public endpoints\n\n## Before suggesting any code change, verify:\n1. Does it introduce any logging of sensitive data?\n2. Does it bypass any auth or authorization check?\n3. Does it create a SQL injection surface?\nIf yes to any: refuse and explain the security issue.\n\n---\n# === ML RESEARCH PROJECT ===\n# Experiment-friendly CLAUDE.md\n\n## Philosophy\nThis is a research repo. Prefer working experiments over clean code.\nMove fast, comment your assumptions, use notebooks for exploration.\n\n## When writing training code:\n- Always log to wandb: loss, val_loss, learning_rate, epoch\n- Save checkpoints every 10 epochs minimum\n- Always set random seeds for reproducibility\n- Document dataset version in experiment config\n\n## Compute awareness\n- Default to CPU for unit tests\n- Use .to(device) everywhere \u2014 never hardcode \"cuda\"\n- Warn if batch size > 64 (likely OOM on dev machines)","tags":["#claude-md","#fintech","#ml-research","#project-config","#security"]},{"e":"\ud83d\udd17","name":"MCP Server Integration \u2014 Custom Tools","m":"bf","tldr":"MCP (Model Context Protocol) lets you add custom tools to Claude Code. Connect to: your internal APIs, databases, monitoring systems, Slack, GitHub. Claude can then call these as native tools during any task.","code":"# MCP server in ~/.claude/config.json\n{\n  \"mcpServers\": {\n    \"internal-api\": {\n      \"command\": \"node\",\n      \"args\": [\"./mcp-servers/internal-api.js\"],\n      \"env\": { \"API_TOKEN\": \"...\" }\n    },\n    \"postgres-inspector\": {\n      \"command\": \"uvx\",\n      \"args\": [\"mcp-server-postgres\", \"--db-url\", \"postgresql://...\"]\n    },\n    \"github\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@modelcontextprotocol/server-github\"],\n      \"env\": { \"GITHUB_TOKEN\": \"...\" }\n    }\n  }\n}\n\n# Writing a custom MCP server (Node.js)\nimport { McpServer } from \"@modelcontextprotocol/sdk/server/mcp.js\";\nimport { z } from \"zod\";\n\nconst server = new McpServer({ name: \"internal-api\", version: \"1.0\" });\n\nserver.tool(\"get_order\", {\n    orderId: z.string().describe(\"The order ID to fetch\")\n}, async ({ orderId }) => {\n    const order = await fetch(\"https://internal-api/orders/\"+orderId,\n        {headers: {\"Authorization\": \"Bearer \"+process.env.API_TOKEN}});\n    return { content: [{type: \"text\", text: JSON.stringify(await order.json())}]};\n});","tags":["#mcp","#model-context-protocol","#custom-tools","#claude-code","#integration"]}]}]},"terminal":{"icon":"\ud83d\udcbb","color":"var(--terminal)","bg":"rgba(169,227,75,0.10)","title":"Terminal & Dev Tools","desc":"zsh, tmux, essential CLIs, shell scripting. Your terminal is your cockpit \u2014 every second saved compounds over years.","secs":[{"label":"Shell setup","cards":[{"e":"\ud83d\udc1a","name":"zsh + oh-my-zsh \u2014 Power Setup","m":"bm","tldr":"zsh + oh-my-zsh + powerlevel10k + zsh-autosuggestions + zsh-syntax-highlighting. These four tools make your terminal 3x faster to use every day.","code":"# Install oh-my-zsh\nsh -c \"$(curl -fsSL https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh)\"\n\n# Essential plugins (~/.zshrc)\nplugins=(git docker kubectl python node\n         zsh-autosuggestions zsh-syntax-highlighting)\n\n# Theme: powerlevel10k (git status, k8s context, python env)\ngit clone --depth=1     https://github.com/romkatv/powerlevel10k $ZSH_CUSTOM/themes/powerlevel10k\nZSH_THEME=\"powerlevel10k/powerlevel10k\"\n\n# Must-have aliases\nalias k=\"kubectl\"      alias kgp=\"kubectl get pods -n prod\"\nalias kl=\"kubectl logs -f\"   alias kex=\"kubectl exec -it\"\nalias g=\"git\"          alias gs=\"git status\"\nalias gl=\"git log --oneline -20\"   alias gp=\"git push\"\nalias d=\"docker\"       alias dc=\"docker compose\"\nalias ll=\"ls -la\"      alias ..=\"cd ..\"   alias ...=\"cd ../..\"\nalias ai=\"claude\"      # run Claude Code from anywhere\n\n# fzf \u2014 fuzzy search everything (life-changing)\nbrew install fzf && $(brew --prefix)/opt/fzf/install\n# Ctrl+R: fuzzy history search\n# Ctrl+T: fuzzy file search\n# Alt+C:  fuzzy directory change","tags":["#zsh","#oh-my-zsh","#powerlevel10k","#fzf","#aliases","#terminal"]},{"e":"\ud83e\ude9f","name":"tmux \u2014 Session & Pane Management","m":"bfl","tldr":"tmux = multiple terminal sessions in one window, persistent across SSH disconnects. Sessions keep running when you close your laptop. One session per project, multiple windows per session.","img":"tmux is like a tiling window manager inside your terminal. Sessions are virtual desktops that survive laptop lid close and SSH disconnects. Essential for remote servers.","code":"# ~/.tmux.conf \u2014 sensible defaults\nset -g prefix C-a               # Ctrl+A easier than Ctrl+B\nbind C-a send-prefix\nset -g mouse on                 # enable mouse scrolling\nset -g base-index 1             # windows start at 1\nset -g history-limit 50000      # more scrollback\n\n# Session management\ntmux new -s ml-work             # named session\ntmux attach -t ml-work          # reattach after disconnect\ntmux ls                         # list all sessions\ntmux kill-session -t old-proj   # cleanup\n\n# Pane/window shortcuts (prefix = Ctrl+A)\n# Ctrl+A |     split vertical\n# Ctrl+A -     split horizontal\n# Ctrl+A arrow move between panes\n# Ctrl+A z     zoom/unzoom current pane\n# Ctrl+A d     detach (session keeps running)\n# Ctrl+A [     enter scroll mode (q to exit, / to search)\n\n# Power setup: one session per project\n# toteat: window 1=editor, 2=server, 3=logs, 4=claude\n# agentic: window 1=editor, 2=agent-runner, 3=monitoring","tags":["#tmux","#sessions","#panes","#multiplexer","#remote","#ssh"]}]},{"label":"Essential CLIs","cards":[{"e":"\ud83d\udee0\ufe0f","name":"Essential CLI Tools \u2014 AI Engineering Stack","m":"bm","tldr":"jq for JSON, httpie for HTTP, ripgrep for search, lazygit for git UI, gh for GitHub, uv for Python packages, k9s for Kubernetes UI, bat for file viewing. These replace 10 native tools.","code":"# jq \u2014 JSON processor (essential for API/LLM work)\ncurl api.example.com/events | jq \".items[] | {id, type}\"\ncat response.json | jq \"group_by(.user) | map({u:.[0].user, n:length})\"\n\n# httpie \u2014 human-readable HTTP client\nhttp POST api.example.com/orders     \"Authorization:Bearer $TOKEN\"     id=1 total:=99.99 items:=\"[]\"\n\n# ripgrep \u2014 10x faster than grep, respects .gitignore\nrg \"class.*Model\" --type py -l        # files with Model classes\nrg \"TODO|FIXME|HACK\" --type ts        # find tech debt\nrg \"embedding\" --type py -A 3 -B 3    # 3 lines of context\n\n# lazygit \u2014 TUI for git (replaces 80% of git CLI usage)\nbrew install lazygit && lazygit\n# space: stage/unstage | c: commit | p: push | P: pull\n\n# gh \u2014 GitHub CLI\ngh pr create --title \"feat: agent memory\" --reviewer alice\ngh pr list --state open --author \"@me\"\n\n# uv \u2014 Python package manager (100x faster than pip)\nuv venv && source .venv/bin/activate\nuv pip install torch transformers --no-cache\n\n# k9s \u2014 Kubernetes TUI (replaces most kubectl usage)\nbrew install k9s && k9s  # : command, / filter, l logs, d describe","tags":["#jq","#httpie","#ripgrep","#lazygit","#gh","#uv","#k9s","#bat"]},{"e":"\ud83d\udcca","name":"Bash Scripting \u2014 Production Patterns","m":"bfl","tldr":"Always start with set -euo pipefail. Quote all variables. Use functions for reusability. trap for cleanup. Check command existence before using. These patterns prevent 90% of script bugs.","code":"#!/usr/bin/env bash\nset -euo pipefail   # exit on error, undefined var, pipe fail\nIFS=$\"\n\t\"         # safer word splitting\n\n# Always quote variables \u2014 unquoted = word splitting bug\nNAME=\"hello world\"\necho \"$NAME\"        # correct: \"hello world\"\necho $NAME          # wrong: two args \"hello\" \"world\"\n\n# Functions with local variables\ncheck_health() {\n    local service=\"$1\"\n    local url=\"http://${service}:3000/health\"\n    if curl -sf \"$url\" > /dev/null 2>&1; then\n        echo \"OK: $service\"\n    else\n        echo \"FAIL: $service\" >&2; return 1\n    fi\n}\n\n# Cleanup on exit\nTMP=$(mktemp)\ncleanup() { rm -f \"$TMP\"; echo \"Cleaned up\"; }\ntrap cleanup EXIT    # runs on any exit (normal or error)\n\n# Check command exists\nif ! command -v jq &> /dev/null; then\n    echo \"jq is required but not installed\" >&2; exit 1\nfi\n\n# Arrays (use for lists of values)\nSERVICES=(\"api\" \"worker\" \"scheduler\")\nfor svc in \"${SERVICES[@]}\"; do\n    check_health \"$svc\" || echo \"Service $svc is down\"\ndone","tags":["#bash","#shell-scripting","#set-euo","#functions","#trap","#arrays"]}]},{"label":"Advanced shell & scripting","cards":[{"e":"\ud83c\udf9b\ufe0f","name":"Shell Functions & .zshrc Power Config","m":"bm","tldr":"Shell functions beat aliases for anything with logic. Keep .zshrc modular \u2014 source separate files per topic. Use environment variables for secrets. PATH management, autocomplete setup, conditional loading.","code":"# ~/.zshrc \u2014 modular structure\nsource ~/.zsh/aliases.zsh\nsource ~/.zsh/functions.zsh\nsource ~/.zsh/work.zsh      # work-specific (not in git)\nsource ~/.zsh/completions.zsh\n\n# ~/.zsh/functions.zsh \u2014 smart functions\n\n# Clone and immediately open in editor + tmux\nfunction ghclone() {\n    git clone \"git@github.com:$1.git\" && cd \"$(basename $1)\" && tmux new-session -d -s \"$(basename $1)\" && code .\n}\n\n# Quick kill process on port\nfunction killport() {\n    lsof -ti tcp:\"$1\" | xargs kill -9\n}\n\n# Switch k8s context with fuzzy search\nfunction kctx() {\n    kubectl config use-context $(kubectl config get-contexts -o name | fzf)\n}\n\n# cd to git root\nfunction groot() { cd \"$(git rev-parse --show-toplevel)\"; }\n\n# Copy last command to clipboard\nfunction copylast() { history | tail -1 | awk \"{print $2}\" | pbcopy; }\n\n# Pretty print JSON from clipboard\nfunction jsonclip() { pbpaste | jq . | bat -l json; }\n\n# Auto-activate Python venv when entering directory\nfunction auto_venv() {\n    if [[ -f \".venv/bin/activate\" ]]; then\n        source .venv/bin/activate\n    fi\n}\nadd-zsh-hook chpwd auto_venv","tags":["#zsh","#shell-functions","#dotfiles","#productivity","#zshrc"]},{"e":"\ud83d\udd11","name":"SSH Config & Key Management","m":"bfl","tldr":"~/.ssh/config: define hosts with aliases, key files, jump hosts. ssh-agent: holds decrypted keys in memory. 1Password SSH agent: store keys in 1Password vault. Jump hosts: bastion \u2192 internal server in one command.","code":"# ~/.ssh/config \u2014 clean host definitions\n\nHost bastion-prod\n    HostName bastion.company.com\n    User cris\n    IdentityFile ~/.ssh/id_ed25519_work\n    AddKeysToAgent yes\n\nHost prod-*\n    User ubuntu\n    ProxyJump bastion-prod      # auto-jump through bastion\n    IdentityFile ~/.ssh/id_ed25519_work\n    ServerAliveInterval 60      # prevent timeout\n    StrictHostKeyChecking no    # for ephemeral cloud instances\n\nHost github.com\n    IdentityFile ~/.ssh/id
