_ed25519_github\n    AddKeysToAgent yes\n\n# Now you can:\n# ssh prod-api-1               # auto-jumps through bastion\n# ssh prod-db-1                # same\n# scp prod-api-1:/var/log/app.log .   # copy files through jump\n\n# SSH tunnel \u2014 forward local port to remote service\nssh -L 5432:db.internal:5432 bastion-prod -N &\n# Now: psql -h localhost -p 5432   (connects to prod DB through tunnel)\n\n# 1Password SSH Agent (best practice)\n# op plugin init ssh\n# All SSH keys stored in 1Password, agent auto-populates","tags":["#ssh","#ssh-config","#jump-host","#bastion","#tunnel","#1password"]},{"e":"\ud83d\udce6","name":"dotfiles \u2014 Version Control Your Setup","m":"bfl","tldr":"dotfiles repo: version control all your config files. Use GNU stow or a bare git repo to symlink from $HOME. New machine setup: git clone + stow = fully configured in minutes.","code":"# Method 1: bare git repo (simplest)\ngit init --bare $HOME/.dotfiles\nalias dotfiles=\"git --git-dir=$HOME/.dotfiles/ --work-tree=$HOME\"\ndotfiles config status.showUntrackedFiles no\ndotfiles remote add origin git@github.com:you/dotfiles.git\n\n# Add and commit config files\ndotfiles add ~/.zshrc ~/.zsh/ ~/.ssh/config ~/.gitconfig ~/.tmux.conf\ndotfiles add ~/.config/nvim/ ~/.claude/\n\ndotfiles commit -m \"add zsh and neovim config\"\ndotfiles push\n\n# On new machine:\ngit clone --bare git@github.com:you/dotfiles.git $HOME/.dotfiles\nalias dotfiles=\"git --git-dir=$HOME/.dotfiles/ --work-tree=$HOME\"\ndotfiles checkout   # symlinks all files to $HOME\n\n# Structure of your dotfiles repo:\n# .zshrc, .zsh/aliases.zsh, .zsh/functions.zsh\n# .gitconfig, .gitignore_global\n# .tmux.conf\n# .config/nvim/init.lua\n# .claude/settings.json, .claude/CLAUDE.md (global)\n# .ssh/config (without keys \u2014 add keys separately)\n# install.sh   \u2014 bootstraps tools on new machine (brew/apt)","tags":["#dotfiles","#stow","#bare-git","#reproducible-setup","#new-machine"]}]},{"label":"Neovim & editor setup","cards":[{"e":"\ud83d\udd37","name":"Neovim \u2014 LSP, Treesitter, Essential Plugins","m":"bf","tldr":"Modern Neovim = Lua config + LSP (language server) + Treesitter (syntax) + Telescope (fuzzy find) + lazy.nvim (plugin manager). Effectively a full IDE with sub-millisecond startup.","code":"-- ~/.config/nvim/init.lua (minimal modern config)\n\n-- Plugin manager: lazy.nvim\nlocal lazypath = vim.fn.stdpath(\"data\") .. \"/lazy/lazy.nvim\"\nvim.opt.rtp:prepend(lazypath)\n\nrequire(\"lazy\").setup({\n    -- LSP: language servers\n    { \"neovim/nvim-lspconfig\",\n      dependencies = {\n        \"williamboman/mason.nvim\",         -- install LSP servers\n        \"williamboman/mason-lspconfig.nvim\",\n      }},\n    -- Completion\n    { \"hrsh7th/nvim-cmp\",\n      dependencies = {\"hrsh7th/cmp-nvim-lsp\", \"L3MON4D3/LuaSnip\"} },\n    -- Fuzzy find everything\n    { \"nvim-telescope/telescope.nvim\",\n      dependencies = {\"nvim-lua/plenary.nvim\"} },\n    -- Syntax highlighting\n    { \"nvim-treesitter/nvim-treesitter\", build = \":TSUpdate\" },\n    -- File tree\n    { \"nvim-tree/nvim-tree.lua\" },\n    -- Git integration\n    { \"lewis6991/gitsigns.nvim\" },\n    { \"tpope/vim-fugitive\" },\n    -- AI completion\n    { \"github/copilot.vim\" },\n})\n\n-- Key mappings\nlocal map = vim.keymap.set\nmap(\"n\", \"<leader>ff\", \":Telescope find_files<CR>\")   -- find files\nmap(\"n\", \"<leader>fg\", \":Telescope live_grep<CR>\")     -- grep\nmap(\"n\", \"<leader>fb\", \":Telescope buffers<CR>\")       -- buffers\nmap(\"n\", \"gd\", vim.lsp.buf.definition)                 -- go to definition\nmap(\"n\", \"K\",  vim.lsp.buf.hover)                      -- hover docs\nmap(\"n\", \"<leader>ca\", vim.lsp.buf.code_action)        -- code action","tags":["#neovim","#lsp","#treesitter","#telescope","#lazy-nvim","#ide"]}]},{"label":"Advanced CLI tools","cards":[{"e":"\ud83d\udd2d","name":"Advanced fzf \u2014 Fuzzy Find Everything","m":"bm","tldr":"fzf is not just file search. It is a universal fuzzy selector that can pipe to anything. Fuzzy git branches, docker containers, k8s pods, process kill, environment variables. Most powerful CLI tool you can learn.","code":"# ~/.zsh/fzf.zsh power config\n\nexport FZF_DEFAULT_COMMAND=\"rg --files --hidden --follow --glob !.git\"\nexport FZF_DEFAULT_OPTS=\"\n    --height 60% --layout=reverse --border\n    --preview-window=right:50%:wrap\n    --color=dark,bg+:-1,hl:yellow,hl+:yellow,info:blue,prompt:blue\"\n\n# Fuzzy git checkout (with branch preview)\nfunction gfco() {\n    git checkout $(git branch --all |\n        fzf --preview \"git log --oneline {} | head -20\" |\n        sed \"s/remotes\\/origin\\///\")\n}\n\n# Fuzzy kill process\nfunction fkill() {\n    ps aux | fzf --header \"Select process to kill\" |\n    awk \"{print $2}\" | xargs kill -9\n}\n\n# Fuzzy docker exec\nfunction dexec() {\n    docker exec -it $(docker ps | tail -n +2 |\n        fzf --preview \"docker inspect {1}\" |\n        awk \"{print $1}\") /bin/sh\n}\n\n# Fuzzy kubectl exec into pod\nfunction kexec() {\n    kubectl exec -it $(kubectl get pods | tail -n +2 |\n        fzf --preview \"kubectl describe pod {1}\" |\n        awk \"{print $1}\") -- /bin/sh\n}\n\n# Fuzzy env variable lookup\nfunction envget() {\n    env | fzf | cut -d\"=\" -f2 | pbcopy\n    echo \"Copied to clipboard\"\n}\n\n# Ctrl+R history search with multi-line preview\nbindkey \"^R\" fzf-history-widget","tags":["#fzf","#fuzzy","#git","#docker","#kubectl","#productivity"]},{"e":"\ud83d\udce1","name":"HTTPie & curl \u2014 API Testing Power Patterns","m":"bfl","tldr":"HTTPie: human-friendly HTTP client with JSON by default, auth shortcuts, session support. curl: universal, scriptable, cookie jars, cert pinning. Know both \u2014 httpie for manual testing, curl for scripts.","code":"# HTTPie \u2014 human-friendly HTTP\n# Install: brew install httpie (or: pip install httpie)\n\n# Basic requests\nhttp GET api.example.com/orders\nhttp POST api.example.com/orders total:=9999 items:=\"[]\"   # := means JSON value\n\n# Auth\nhttp -a username:password GET api.example.com/protected\nhttp GET api.example.com/orders \"Authorization:Bearer $TOKEN\"\n\n# Sessions (stores cookies, auth)\nhttp --session=myapp POST api.example.com/login username=cris password=secret\nhttp --session=myapp GET api.example.com/profile  # uses saved session\n\n# Download with progress\nhttp --download GET files.example.com/large-model.bin\n\n# Follow redirects, verbose headers\nhttp --follow --print=hHbB GET api.example.com/redirect\n\n# curl \u2014 for scripts and advanced use\n# Save cookies, follow redirect\ncurl -c cookies.txt -L -o /dev/null -s -w \"%{http_code}\" https://api.example.com\n\n# POST JSON\ncurl -X POST https://api.example.com/orders     -H \"Content-Type: application/json\"     -H \"Authorization: Bearer $TOKEN\"     -d \"$(jq -n --arg id \"$ORDER_ID\" \"{id: $id, total: 9999}\")\"\n\n# Test SSL cert\ncurl -v --cacert /path/to/ca.crt https://internal-api.company.com","tags":["#httpie","#curl","#api-testing","#http","#rest","#debugging"]},{"e":"\ud83d\udcca","name":"Terminal Monitoring \u2014 htop, btop, glances","m":"bfl","tldr":"htop: interactive process viewer with tree view. btop: beautiful resource monitor (CPU, mem, net, disk). glances: overview of everything in one screen. watch: run any command repeatedly. Use for debugging CPU spikes, memory leaks, network saturation.","code":"# htop key bindings (F-keys or letters)\n# F6 / s    : sort by (CPU, MEM, PID, etc.)\n# F5 / t    : tree view (see parent-child processes)\n# F4 / /    : filter processes by name\n# F9 / k    : kill selected process\n# u         : filter by user\n# Space     : tag process (for batch operations)\n# H         : toggle user/kernel threads\n\n# btop \u2014 gorgeous resource monitor\nbrew install btop && btop\n# Themes: press \"t\" to cycle\n# Shows: CPU per core, memory, swap, network I/O, disk I/O, process list\n\n# glances \u2014 single-pane overview\npip install glances && glances\n# Web interface: glances -w   -> http://localhost:61208\n\n# watch \u2014 repeat command every N seconds\nwatch -n 2 \"kubectl get pods -n prod\"     # refresh pod list every 2s\nwatch -n 1 \"kubectl top pods -n prod\"     # live resource usage\nwatch -n 5 \"ps aux | grep python | grep -v grep\"  # watch python processes\n\n# Useful one-liners for debugging\n# Memory usage by process:\nps aux --sort=-%mem | head -20\n\n# Top CPU consumers, live:\ntop -bn1 | grep -v grep | sort -k9rn | head -10\n\n# Network connections by state:\nss -s   # socket statistics summary\nnetstat -tupln  # listening ports with PID","tags":["#htop","#btop","#glances","#monitoring","#debugging","#performance"]},{"e":"\ud83d\uddc2\ufe0f","name":"fd, bat, eza, delta \u2014 Modern Unix Replacements","m":"bf","tldr":"fd replaces find (10x faster, sane syntax). bat replaces cat (syntax highlighting, line numbers). eza replaces ls (colors, git status, tree). delta replaces diff in git (side-by-side, syntax highlighting).","code":"# Install all at once\nbrew install fd bat eza git-delta\n\n# fd \u2014 find replacement\nfd \"*.py\"                           # find all Python files\nfd -e py -x wc -l                   # count lines in all Python files\nfd -t d \"node_modules\" --exec rm -rf  # delete all node_modules\n\n# bat \u2014 cat with syntax highlighting\nbat src/main.py                      # highlighted Python\nbat --style=numbers,changes,header file.py  # with git changes\nbat -l json response.json            # force JSON highlighting\ngit diff | bat                       # highlighted diff\n\n# eza \u2014 ls replacement\neza -la --git                        # list with git status column\neza --tree --level=2                 # tree view (2 levels deep)\neza -la --sort=modified              # sort by modification time\n\n# Add to .zshrc:\nalias ls=\"eza --icons\"\nalias ll=\"eza -la --git\"\nalias lt=\"eza --tree --level=3\"\nalias cat=\"bat\"\nalias find=\"fd\"\n\n# delta \u2014 better git diffs\n# ~/.gitconfig:\n# [core]\n#     pager = delta\n# [delta]\n#     navigate = true\n#     side-by-side = true\n#     line-numbers = true\n#     syntax-theme = \"Dracula\"\n# [interactive]\n#     diffFilter = delta --color-only","tags":["#fd","#bat","#eza","#delta","#modern-unix","#productivity"]},{"e":"\ud83d\udd0d","name":"jq Deep Dive \u2014 JSON Power Queries","m":"bm","tldr":"jq is Turing-complete. Beyond basic filtering: recursive descent, map/select, reduce, group_by, env variables, update operators. Master jq and you never need to write a Python script for JSON manipulation again.","code":"# Basic \u2192 intermediate \u2192 advanced jq\n\n# Extract nested fields\ncat data.json | jq \".items[] | {id: .id, name: .user.name}\"\n\n# Filter + transform\ncat orders.json | jq \"[.[] | select(.status == \"completed\" and .total > 1000)]\"\n\n# Group and count\ncat events.json | jq \"group_by(.type) | map({type: .[0].type, count: length})\"\n\n# Recursive descent \u2014 find key anywhere in structure\necho $COMPLEX_JSON | jq \".. | .error? // empty\"\n\n# Update in place (create modified copy)\ncat config.json | jq \".database.pool_size = 20 | .cache.ttl = 300\"\n\n# Reduce \u2014 aggregate values\ncat orders.json | jq \"[.[] | .total] | add\"          # sum all totals\ncat logs.json   | jq \"reduce .[] as $l ({}; .[$l.level] += 1)\"  # count by level\n\n# Environment variables in jq\nexport MIN_TOTAL=1000\ncat orders.json | jq --argjson min \"$MIN_TOTAL\" \"[.[] | select(.total > $min)]\"\n\n# Format as CSV\ncat users.json | jq -r \".[] | [.id, .name, .email] | @csv\"\n\n# Kubernetes + jq power combo\nkubectl get pods -A -o json | jq \"\n  .items[] |\n  select(.status.phase != \"Running\") |\n  {name: .metadata.name, ns: .metadata.namespace, phase: .status.phase}\"","tags":["#jq","#json","#query","#kubectl","#data-processing","#advanced"]},{"e":"\ud83d\udc19","name":"Git \u2014 Advanced Operations","m":"bm","tldr":"Interactive rebase to clean up history. Bisect to find when a bug was introduced. Reflog to recover from mistakes. Stash with messages. Cherry-pick ranges. Partial staging with -p. These are the operations that separate senior from principal.","code":"# Interactive rebase \u2014 rewrite history before pushing\ngit rebase -i HEAD~5       # edit last 5 commits\n# pick, reword, edit, squash, fixup, drop\n# squash = combine commits, fixup = squash without commit message\n\n# Bisect \u2014 binary search for bug introduction\ngit bisect start\ngit bisect bad             # current commit has the bug\ngit bisect good v1.2.0     # this version was fine\n# Git checks out midpoint\n# Test it, then:\ngit bisect good            # or: git bisect bad\n# Repeat until git identifies the first bad commit\ngit bisect reset           # return to HEAD\n\n# Reflog \u2014 recover from disasters\ngit reflog                 # complete history of HEAD movements\ngit checkout HEAD@{3}      # go back 3 HEAD positions\ngit reset --hard HEAD@{2}  # reset to 2 steps ago\n\n# Partial staging (interactive)\ngit add -p                 # stage individual hunks within files\n# y=stage, n=skip, s=split hunk, e=edit hunk manually\n\n# Cherry-pick range\ngit cherry-pick A..B       # pick commits from A to B (exclusive A)\ngit cherry-pick A^..B      # pick commits from A to B (inclusive A)\n\n# Stash with context\ngit stash push -m \"WIP: auth refactor\" -- src/auth/\ngit stash list             # list all stashes\ngit stash apply stash@{2}  # apply specific stash\n\n# Find when line was added\ngit log -S \"function processPayment\" --source --all","tags":["#git","#rebase","#bisect","#reflog","#stash","#cherry-pick","#advanced"]}]}]},"mml-math":{"icon":"Sigma","color":"var(--math)","bg":"rgba(255,183,77,0.12)","title":"MML \u2014 Linear Algebra & Geometry","desc":"MML Book Ch.2 & Ch.3 \u2014 Deisenroth, Faisal, Ong. Vector spaces, linear independence, basis, rank, Gaussian elimination, linear mappings, norms, inner products, projections, orthogonality. The math behind every ML algorithm.","secs":[{"label":"Chapter 2 \u2014 Linear Algebra","cards":[{"e":"\ud83e\uddee","name":"Systems of Linear Equations \u2014 Gaussian Elimination","m":"bfl","tldr":"Any system Ax=b can have 0, 1, or infinitely many solutions. Gaussian elimination transforms to Row Echelon Form (REF) then Back-substitution solves. Reduced REF (RREF) gives unique solution directly. Foundation of all linear algebra.","img":"You have 3 unknowns and 3 equations. Each equation is a plane in 3D space. The solution is where all three planes intersect \u2014 a point (unique), a line (infinite solutions), or empty (no solution). Gaussian elimination finds that intersection systematically by eliminating variables one at a time.","code":"import numpy as np\n\n# Solve Ax = b with Gaussian elimination\nA = np.array([[2., 1., -1.],\n              [-3., -1., 2.],\n              [-2., 1., 2.]])\nb = np.array([8., -11., -3.])\n\n# NumPy built-in (uses LU decomposition internally)\nx = np.linalg.solve(A, b)\nprint(x)  # [2. 3. -1.]\n\n# Manual augmented matrix [A|b]\nAb = np.hstack([A, b.reshape(-1,1)])\n\n# Forward elimination -> Row Echelon Form\nfor col in range(len(A)):\n    # Pivot: find max in column (partial pivoting)\n    max_row = col + np.argmax(abs(Ab[col:, col]))\n    Ab[[col, max_row]] = Ab[[max_row, col]]  # swap rows\n    for row in range(col+1, len(A)):\n        factor = Ab[row, col] / Ab[col, col]\n        Ab[row] -= factor * Ab[col]  # eliminate\n\n# Back substitution\nn = len(A)\nx = np.zeros(n)\nfor i in range(n-1, -1, -1):\n    x[i] = (Ab[i,-1] - Ab[i,i+1:n] @ x[i+1:n]) / Ab[i,i]\n\n# Key insight: each row operation = multiplying by elementary matrix\n# REF: upper triangular + zeros below diagonal\n# RREF: identity on left side -> x = b directly","tags":["#linear-equations","#gaussian-elimination","#ref","#rref","#mml-ch2"]},{"e":"\ud83d\udce6","name":"Vector Spaces & Subspaces","m":"bfl","tldr":"A vector space V is a set with addition and scalar multiplication satisfying 8 axioms (closure, associativity, commutativity, identity, inverse, distributivity). Subspace: a subset closed under addition and scalar multiplication. Examples: R^n, polynomials, matrices, functions.","img":"A vector space is any set where you can \"add things\" and \"scale things\" and the result stays in the set. R^2 is the classic \u2014 add two arrows, get an arrow. Scale an arrow, get an arrow. A line through the origin is a subspace of R^2. A line NOT through the origin is NOT a subspace (add two points on it and you might leave the line).","code":"import numpy as np\n\n# R^n is the canonical vector space\n# Subspace test: closed under + and scalar multiplication\n\ndef is_subspace(vectors, test_points):\n    \"\"\"Check if span of vectors contains test_points\"\"\"\n    V = np.column_stack(vectors)\n    for p in test_points:\n        # Solve Vc = p (least squares)\n        c, res, rank, _ = np.linalg.lstsq(V, p, rcond=None)\n        if not np.allclose(V @ c, p):\n            return False\n    return True\n\n# Common vector spaces:\n# R^n:           n-dim real vectors\n# R^(m x n):     m x n matrices (with matrix +, scalar *)\n# Polynomials:   p(x) of degree <= n\n# Functions:     C([a,b]) continuous functions on [a,b]\n\n# The zero vector is ALWAYS in a subspace\n# Three equivalent subspace conditions:\n# 1. u + v in S for all u,v in S  (closed under addition)\n# 2. alpha*u in S for all u in S, alpha in R  (closed under scaling)\n# 3. S is non-empty (contains 0)\n\n# Column space of A = span of columns of A\n# Null space of A = {x : Ax = 0}\n# Both are subspaces","tags":["#vector-space","#subspace","#column-space","#null-space","#mml-ch2"]},{"e":"\ud83d\udd17","name":"Linear Independence, Basis & Rank","m":"bfl","tldr":"Vectors are linearly independent if no vector is a linear combination of the others (only trivial solution to sum=0). Basis: linearly independent spanning set. Rank of A = dim(column space) = number of pivot columns in REF. Rank-nullity: rank(A) + nullity(A) = n.","img":"Linear independence = no redundancy. If you have 3 vectors in R^3 and they are linearly independent, they span all of R^3. Add a 4th vector and it MUST be a combination of the first 3 \u2014 it is redundant. A basis is the smallest spanning set (no redundancy) and the largest independent set (nothing left out).","code":"import numpy as np\n\n# Check linear independence via rank\nA = np.array([[1,2,3],\n              [4,5,6],\n              [7,8,10]])  # Note: 10, not 9\n\nrank = np.linalg.matrix_rank(A)\nprint(f\"Rank: {rank}\")  # 3 = full rank, linearly independent\n\n# Rank-nullity theorem: rank + nullity = n (num columns)\n# nullity = dim(null space) = num free variables\n\n# Find a basis for the column space\n# Pivot columns of A are a basis for col(A)\ndef column_space_basis(A):\n    _, _, Vt = np.linalg.svd(A)\n    rank = np.linalg.matrix_rank(A)\n    return A[:, :rank]  # simplified\n\n# Gram-Schmidt: turn any basis into orthonormal basis\ndef gram_schmidt(V):\n    U = np.zeros_like(V, dtype=float)\n    for i in range(V.shape[1]):\n        u = V[:, i].copy()\n        for j in range(i):\n            u -= np.dot(U[:,j], V[:,i]) * U[:,j]\n        U[:,i] = u / np.linalg.norm(u)\n    return U\n\n# Key facts:\n# rank(A) = rank(A^T)\n# rank(AB) <= min(rank(A), rank(B))\n# A invertible <=> rank(A) = n <=> det(A) != 0","tags":["#linear-independence","#basis","#rank","#nullity","#gram-schmidt","#mml-ch2"]},{"e":"\ud83d\uddfa\ufe0f","name":"Linear Mappings & Matrix Representation","m":"bfl","tldr":"A linear map Phi: V -> W satisfies Phi(u+v) = Phi(u)+Phi(v) and Phi(alpha*v) = alpha*Phi(v). Every linear map has a matrix representation. Change of basis: A_new = T^-1 * A_old * T where T is the transformation matrix between bases.","img":"A linear map is a structure-preserving transformation. It does not curve or bend space \u2014 only stretches, rotates, reflects, or projects. Matrix multiplication IS a linear map. The matrix columns tell you where each basis vector lands after the transformation.","code":"import numpy as np\n\n# A linear map Phi: R^n -> R^m is represented by an m x n matrix A\n# Phi(x) = Ax\n\n# Example: rotation by angle theta in R^2\ndef rotation_matrix(theta):\n    c, s = np.cos(theta), np.sin(theta)\n    return np.array([[c, -s],\n                     [s,  c]])\n\nR = rotation_matrix(np.pi/4)  # 45 degrees\nv = np.array([1., 0.])\nprint(R @ v)  # [0.707, 0.707] -- rotated 45 degrees\n\n# Change of basis\n# Same linear map, different coordinate systems\n# If B is old basis, B_new is new basis:\n# A_new = B_new^-1 @ A_old @ B_new\nB_old = np.eye(2)   # standard basis\nB_new = np.array([[1,1],[0,1]])  # new basis\n\nA_old = rotation_matrix(np.pi/4)\nA_new = np.linalg.inv(B_new) @ A_old @ B_new\n\n# Kernel (null space) and image (range):\n# ker(Phi) = {v in V : Phi(v) = 0} -- what maps to zero\n# Im(Phi) = {Phi(v) : v in V}      -- what you can reach\n# Rank-nullity: dim(ker) + dim(Im) = dim(V)\n\n# Bijective linear map = isomorphism\n# V and W isomorphic <=> dim(V) = dim(W)","tags":["#linear-map","#matrix-representation","#change-of-basis","#kernel","#image","#mml-ch2"]},{"e":"\ud83d\udd04","name":"Matrix Inverse, Transpose & Special Matrices","m":"bm","tldr":"A^-1 exists iff det(A) != 0 iff rank(A) = n. Moore-Penrose pseudoinverse A+ works for non-square: A+=(A^T A)^-1 A^T (left pseudoinverse for overdetermined systems). Symmetric: A=A^T. Orthogonal: A^T A = I (columns are orthonormal).","code":"import numpy as np\n\n# Square inverse: A * A^-1 = I\nA = np.array([[2.,1.],[5.,3.]])\nA_inv = np.linalg.inv(A)\nprint(A @ A_inv)  # identity\n\n# Moore-Penrose pseudoinverse for non-square A\n# Overdetermined (m > n): A+ = (A^T A)^-1 A^T  (least squares solution)\n# Underdetermined (m < n): A+ = A^T (A A^T)^-1 (minimum norm solution)\nA_rect = np.array([[1.,2.],[3.,4.],[5.,6.]])  # 3x2\nA_pinv = np.linalg.pinv(A_rect)\n# A_pinv is 2x3: A+ @ A = I_2 (left inverse)\n\n# Properties of transpose:\n# (AB)^T = B^T A^T\n# (A^-1)^T = (A^T)^-1\n# tr(AB) = tr(BA)  -- trace is cyclic\n\n# Symmetric matrix: A = A^T\n# All eigenvalues are real\n# Eigenvectors are orthogonal\nS = A @ A.T  # A*A^T is always symmetric\n\n# Orthogonal matrix: Q^T Q = Q Q^T = I\n# Columns and rows are orthonormal\n# det(Q) = +/- 1  -- preserves volume\n# Rotation and reflection matrices are orthogonal\nQ, _ = np.linalg.qr(np.random.randn(3,3))  # QR gives orthogonal Q\nprint(np.allclose(Q.T @ Q, np.eye(3)))  # True","tags":["#inverse","#pseudoinverse","#transpose","#symmetric","#orthogonal","#mml-ch2"]}]},{"label":"Chapter 3 \u2014 Analytic Geometry","cards":[{"e":"\ud83d\udccf","name":"Norms \u2014 Measuring Vector Length","m":"bfl","tldr":"A norm maps a vector to a non-negative scalar measuring its length. Must satisfy: positivity, homogeneity, triangle inequality. L1 norm: sum of |xi|. L2 norm: sqrt(sum xi^2). L-inf: max |xi|. L2 is the Euclidean distance. Used in regularization: L1=Lasso, L2=Ridge.","img":"Think of three cities between two points. L2 = straight-line flight distance. L1 = Manhattan taxi distance (only horizontal/vertical streets). L-inf = how many \"chess king moves\" (max of row or column distance). Each norm is a different ruler measuring different aspects of length.","code":"import numpy as np\n\nv = np.array([3., -4., 0.])\n\n# L1 norm (Manhattan): sum of absolute values\nl1 = np.linalg.norm(v, ord=1)   # 7.0\nl1_manual = np.sum(np.abs(v))\n\n# L2 norm (Euclidean): sqrt(sum of squares) -- DEFAULT\nl2 = np.linalg.norm(v)          # 5.0\nl2_manual = np.sqrt(v @ v)\n\n# L-infinity: max absolute value\nlinf = np.linalg.norm(v, ord=np.inf)  # 4.0\n\n# Lp norm: (sum |xi|^p)^(1/p)\np = 3\nlp = np.linalg.norm(v, ord=p)\n\n# ML applications:\n# L1 regularization (Lasso): encourages sparsity, zero coefficients\n# L2 regularization (Ridge): encourages small, balanced coefficients\n# L2 in loss functions: MSE = ||y - Ax||^2 / n\n\n# Frobenius norm of matrix: sqrt(sum of all elements squared)\nA = np.random.randn(3, 4)\nfro = np.linalg.norm(A, \"fro\")  # = sqrt(sum(A**2))\n# Frobenius = L2 norm of flattened matrix","tags":["#norms","#l1","#l2","#lasso","#ridge","#regularization","#mml-ch3"]},{"e":"\ud83d\udd35","name":"Inner Products \u2014 The Heart of Geometry","m":"bfl","tldr":"Inner product generalizes dot product. Must be: bilinear, symmetric, positive definite. Dot product: x^T y = sum(xi*yi). General: <x,y> = x^T A y for symmetric positive definite A. Inner product induces norm: ||x|| = sqrt(<x,x>). Determines all geometry.","img":"The inner product is the fundamental \"comparison tool\" of geometry. It answers: how much of x points in the direction of y? Zero = they are perpendicular (orthogonal). Positive = same general direction. The dot product is the simplest inner product, but any symmetric positive definite matrix A defines a valid one.","code":"import numpy as np\n\nx = np.array([1., 2., 3.])\ny = np.array([4., 5., 6.])\n\n# Standard dot product (L2 inner product)\ndot = x @ y          # 32.0\ndot = np.dot(x, y)   # same\n\n# General inner product: <x,y>_A = x^T A y\n# A must be symmetric positive definite (SPD)\nA = np.array([[2.,0.,0.],[0.,1.,0.],[0.,0.,3.]])  # diagonal SPD\ninner_A = x @ A @ y   # weighted inner product\n\n# Cauchy-Schwarz inequality:\n# |<x,y>| <= ||x|| * ||y||\n# Equality iff x and y are linearly dependent\n\n# Induced norm: ||x|| = sqrt(<x,x>)\nnorm_x = np.sqrt(x @ x)\n\n# Cosine similarity (using dot product)\ncos_sim = (x @ y) / (np.linalg.norm(x) * np.linalg.norm(y))\nprint(f\"Cosine similarity: {cos_sim:.3f}\")  # 0.974\n\n# Used EVERYWHERE in ML:\n# - Attention scores: Q @ K^T (dot product of queries and keys)\n# - Cosine similarity for embeddings\n# - Kernel methods: k(x,y) = <phi(x), phi(y)> (implicit inner product)\n# - PCA: maximizes variance = inner products","tags":["#inner-product","#dot-product","#cosine-similarity","#spd","#kernel","#mml-ch3"]},{"e":"\ud83d\udcd0","name":"Distances, Angles & Orthogonality","m":"bm","tldr":"Distance: d(x,y) = ||x-y||. Angle between vectors: cos(theta) = <x,y>/(||x||*||y||). Orthogonal: <x,y>=0 i.e. angle=90 degrees. Orthonormal set: pairwise orthogonal AND unit length. Orthogonal matrix: columns form orthonormal set.","img":"Pythagoras is a special case of the inner product. The angle between two vectors is the arccos of their normalized dot product. When two vectors are orthogonal (dot product = 0), knowing one tells you nothing about the other \u2014 they carry independent information. This is why PCA seeks orthogonal components.","code":"import numpy as np\n\nx = np.array([1., 0.])\ny = np.array([1., 1.]) / np.sqrt(2)  # normalized\n\n# Distance (Euclidean)\nd = np.linalg.norm(x - y)\nprint(f\"Distance: {d:.3f}\")  # 0.541\n\n# Angle between vectors\ncos_theta = (x @ y) / (np.linalg.norm(x) * np.linalg.norm(y))\ntheta = np.degrees(np.arccos(np.clip(cos_theta, -1, 1)))\nprint(f\"Angle: {theta:.1f} degrees\")  # 45.0\n\n# Orthogonality check\nu = np.array([1., 0.])\nv = np.array([0., 1.])\nprint(f\"Orthogonal: {np.isclose(u @ v, 0)}\")  # True\n\n# Orthonormal basis: orthogonal + unit norm\nB = np.array([[1,0,0],[0,1,0],[0,0,1]], dtype=float)  # standard basis\nprint(f\"Orthonormal: {np.allclose(B.T @ B, np.eye(3))}\")  # True\n\n# ML connections:\n# - Cosine distance = 1 - cosine_similarity (used in NLP, embeddings)\n# - Orthogonal features = no correlation = independent information\n# - PCA components are orthogonal: explained variance adds up\n# - Attention: Q K^T / sqrt(d_k) computes scaled angle-based similarity\n\n# Gram-Schmidt: orthogonalize any basis\ndef gram_schmidt(V):\n    Q = np.zeros_like(V, dtype=float)\n    for i in range(V.shape[1]):\n        q = V[:, i].astype(float)\n        for j in range(i):\n            q -= (Q[:,j] @ V[:,i]) * Q[:,j]\n        Q[:,i] = q / np.linalg.norm(q)\n    return Q","tags":["#distance","#angle","#orthogonality","#orthonormal","#gram-schmidt","#mml-ch3"]},{"e":"\ud83c\udfaf","name":"Orthogonal Projections \u2014 Core of ML","m":"bm","tldr":"Projection of x onto subspace U: pi_U(x) = B(B^T B)^-1 B^T x where B is a matrix whose columns span U. Projection matrix P = B(B^T B)^-1 B^T. Properties: P^2=P (idempotent), P^T=P (symmetric). Least squares solution = projection of b onto col(A).","img":"Shining a light straight down from a point onto a surface \u2014 the shadow is the projection. The projection is the closest point on the subspace to the original vector. Least squares regression literally finds the projection of the target vector onto the column space of the feature matrix. PCA projects onto eigenvectors. Attention projects queries onto key subspaces.","code":"import numpy as np\n\n# Project vector x onto 1D subspace spanned by b\nx = np.array([4., 2., 4.])\nb = np.array([1., 1., 0.])  # direction\n\n# Projection formula: pi = (b^T x / b^T b) * b\nproj_scalar = (b @ x) / (b @ b)\nproj_vector = proj_scalar * b\nprint(f\"Projection: {proj_vector}\")   # [3, 3, 0]\n\n# Projection matrix for 1D: P = b b^T / (b^T b)\nP1d = np.outer(b, b) / (b @ b)\nprint(np.allclose(P1d @ x, proj_vector))  # True\n\n# General projection onto subspace spanned by columns of B\n# P = B (B^T B)^-1 B^T\nB = np.array([[1,0],[1,1],[0,1]], dtype=float)\nP = B @ np.linalg.inv(B.T @ B) @ B.T\n# P is idempotent: P @ P = P\nprint(np.allclose(P @ P, P))  # True\n\n# Least squares via projection:\n# Ax = b has no solution (overdetermined)\n# Best solution: x* = (A^T A)^-1 A^T b = A+ b\n# This is the projection of b onto col(A)\n\nA = np.array([[1,1],[1,2],[1,3]], dtype=float)\nb = np.array([1., 2., 2.])\nx_ls = np.linalg.lstsq(A, b, rcond=None)[0]\nb_proj = A @ x_ls  # projection of b onto col(A)\nresidual = b - b_proj\nprint(f\"Residual perpendicular to col(A): {np.allclose(A.T @ residual, 0)}\")  # True","tags":["#projection","#least-squares","#projection-matrix","#pca","#mml-ch3"]},{"e":"\ud83c\udf00","name":"Rotations \u2014 Geometry in R^n","m":"bf","tldr":"Rotation matrix R: orthogonal (R^T R=I) with det(R)=+1. R^2: [[cos,-sin],[sin,cos]]. R^3: composed of rotations around x, y, z axes (Euler angles) or axis-angle (Rodrigues formula). Rotations preserve lengths and angles.","img":"A rotation is a rigid transformation \u2014 it does not stretch, shrink, or reflect, only turns. Think of rotating a 3D object: the object stays the same shape. The key constraint is orthogonality (R^T = R^-1): rotating forward then rotating backward returns you to start.","code":"import numpy as np\n\n# 2D rotation by angle theta\ndef R2(theta):\n    c, s = np.cos(theta), np.sin(theta)\n    return np.array([[c, -s], [s, c]])\n\n# Verify: orthogonal + det=1\nR = R2(np.pi/3)  # 60 degrees\nprint(np.allclose(R.T @ R, np.eye(2)))   # True (orthogonal)\nprint(np.isclose(np.linalg.det(R), 1.))  # True (proper rotation)\n\n# 3D rotation around z-axis\ndef Rz(theta):\n    c, s = np.cos(theta), np.sin(theta)\n    return np.array([[c,-s,0],[s,c,0],[0,0,1]])\n\n# Rodrigues rotation formula (axis-angle)\n# Rotate by angle theta around unit axis k\ndef rodrigues(k, theta):\n    k = k / np.linalg.norm(k)  # ensure unit vector\n    K = np.array([[0,-k[2],k[1]],[k[2],0,-k[0]],[-k[1],k[0],0]])  # skew-symmetric\n    return np.eye(3) + np.sin(theta)*K + (1-np.cos(theta))*K@K\n\n# ML uses:\n# - Data augmentation: rotate images (2D rotation)\n# - 3D point cloud processing: SO(3) group\n# - Equivariant neural networks: learn rotation-invariant features\n# - RoPE embeddings in transformers: rotary position encoding\n#   Rotates Q,K embeddings by position angle -> relative position encodes naturally\n# - Spherical harmonics in molecular ML (equivariance to SO(3))","tags":["#rotation","#orthogonal-matrix","#rodrigues","#rope","#so3","#mml-ch3"]},{"e":"\ud83e\udde9","name":"Symmetric Positive Definite Matrices \u2014 SPD","m":"bfl","tldr":"Matrix A is SPD if A=A^T (symmetric) and x^T A x > 0 for all x != 0. Equivalent: all eigenvalues > 0. SPD matrices define valid inner products and are the building blocks of covariance matrices, Gram matrices, and Hessians.","img":"Think of SPD matrix as a stretched/rotated version of the identity. The identity says all directions have equal length. An SPD matrix says some directions are longer than others (eigenvalues) and the preferred directions (eigenvectors) may not be axis-aligned. A covariance matrix IS an SPD matrix.","code":"import numpy as np\n\n# Check if matrix is SPD\ndef is_spd(A, tol=1e-10):\n    if not np.allclose(A, A.T):          # symmetric?\n        return False\n    eigenvalues = np.linalg.eigvalsh(A)   # eigenvalues of symmetric A\n    return np.all(eigenvalues > tol)       # all positive?\n\n# Construct SPD: A = B^T B for any full-rank B\nB = np.random.randn(4, 3)\nA = B.T @ B  # always positive SEMI-definite (may have 0 eigenvalues)\nA += 0.01 * np.eye(3)  # add small diagonal for strict positivity\n\nprint(is_spd(A))  # True\n\n# Cholesky decomposition: A = L L^T (for SPD only)\n# L = lower triangular, used for efficient solving\nL = np.linalg.cholesky(A)\n# Solve Ax = b efficiently:\n# Ax = b -> L L^T x = b -> Ly = b, L^T x = y\ny = np.linalg.solve(L, np.ones(3))\nx = np.linalg.solve(L.T, y)\n\n# SPD matrices in ML:\n# Covariance matrix Sigma: x^T Sigma x = variance of projection\n# Gram matrix K_ij = <phi(x_i), phi(x_j)>: always SPD (kernel methods)\n# Hessian of convex functions: SPD everywhere -> unique minimum\n# Mahalanobis distance: d(x,y) = sqrt((x-y)^T Sigma^-1 (x-y))\n#   Uses Sigma^-1 to normalize by covariance -> accounts for correlations","tags":["#spd","#positive-definite","#cholesky","#covariance","#mahalanobis","#mml-ch3"]}]},{"label":"ML Connections from MML Ch.2 & Ch.3","cards":[{"e":"\ud83d\udd17","name":"Linear Algebra in ML \u2014 The Full Map","m":"bm","tldr":"Every core ML algorithm is linear algebra in disguise. PCA = eigendecomposition. Linear regression = projection / least squares. SVD = matrix factorization for recommendations. Attention = matrix multiply. Neural nets = composed linear maps with nonlinearities. Knowing the math = knowing why algorithms work.","code":"import numpy as np\n\n# 1. LINEAR REGRESSION = projection\n# min ||Ax - b||^2  ->  x* = (A^T A)^-1 A^T b\n# = projection of b onto column space of A\n\n# 2. PCA = eigendecomposition of covariance matrix\nX = np.random.randn(100, 5)      # 100 samples, 5 features\nX -= X.mean(axis=0)              # center\nSigma = (X.T @ X) / 99          # covariance matrix (SPD)\neigenvalues, eigenvectors = np.linalg.eigh(Sigma)\n# Sort descending\nidx = np.argsort(-eigenvalues)\nW = eigenvectors[:, idx[:2]]    # top-2 eigenvectors = principal components\nX_pca = X @ W                   # project onto principal components\n\n# 3. ATTENTION = scaled inner products\n# Attention(Q,K,V) = softmax(Q K^T / sqrt(d)) V\n# Q K^T = matrix of inner products between queries and keys\n# Each row of output = weighted sum of value vectors\n\n# 4. SVD for matrix factorization (recommendations)\n# A (users x items) = U Sigma V^T\n# U = user factors, V = item factors, Sigma = importance\nU, S, Vt = np.linalg.svd(np.random.randn(50, 20), full_matrices=False)\nrank_k = 5\nA_approx = U[:,:rank_k] @ np.diag(S[:rank_k]) @ Vt[:rank_k,:]\n\n# 5. NEURAL NETS = composed linear maps + nonlinearities\n# Layer i: h_i = sigma(W_i h_{i-1} + b_i)\n# W_i in R^{out x in} is a linear map\n# Without sigma: entire network collapses to one linear map","tags":["#linear-algebra-ml","#pca","#attention","#svd","#neural-nets","#mml"]}]}]}};
</script>
<script>
(function(){
var ML={bn:"New",bf:"Familiar",bfl:"Fluent",bm:"Mastered"};
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function buildCard(c){
  var wrap=el("div","card");
  wrap.addEventListener("click",function(ev){if(ev.target.tagName==="A")return;wrap.classList.toggle("open");});
  var head=el("div","card-head");
  head.appendChild(el("span","card-emoji",c.e||""));
  head.appendChild(el("span","card-name",c.name||""));
  head.appendChild(el("span","badge "+(c.m||"bn"),ML[c.m||"bn"]||"New"));
  head.appendChild(el("span","chev","\u25B6"));
  wrap.appendChild(head);
  var body=el("div","card-body");
  function sec(lbl,inner){if(!inner)return;var s=el("div","cs");s.appendChild(el("div","csl",lbl));var ct=el("div","cst");ct.innerHTML=inner;s.appendChild(ct);body.appendChild(s);}
  if(c.tldr)sec("TL;DR",c.tldr);
  if(c.img){var s2=el("div","cs");s2.appendChild(el("div","csl","Mental image"));var m=el("div","mental");m.textContent=c.img;s2.appendChild(m);body.appendChild(s2);body.appendChild(el("div","dv"));}
  if(c.code){var s3=el("div","cs");s3.appendChild(el("div","csl","Code / Pattern"));var pre=el("pre");pre.textContent=c.code.trim();s3.appendChild(pre);body.appendChild(s3);}
  if(c.real)sec("Real example",c.real);
  if(c.warn){var s4=el("div","cs");var w=el("div","warn");w.textContent="\u26A0 "+c.warn;s4.appendChild(w);body.appendChild(s4);}
  if(c.tags&&c.tags.length){var tg=el("div","tags");c.tags.forEach(function(t){tg.appendChild(el("span","tag",t));});body.appendChild(tg);}
  wrap.appendChild(body);return wrap;
}
function buildRoom(id,room){
  var div=el("div","room");div.id="room-"+id;
  var hdr=el("div","room-hdr");
  var row=el("div","room-title-row");
  var ico=el("div","room-icon");ico.style.background=room.bg;ico.textContent=room.icon;row.appendChild(ico);
  var tit=el("div","room-title");tit.style.color=room.color;tit.textContent=room.title;row.appendChild(tit);
  hdr.appendChild(row);
  var desc=el("div","room-desc");desc.textContent=room.desc;hdr.appendChild(desc);div.appendChild(hdr);
  (room.secs||[]).forEach(function(sec){
    var sep=el("div","sep");sep.textContent=sec.label;div.appendChild(sep);
    var grid=el("div","grid");
    (sec.cards||[]).forEach(function(c){grid.appendChild(buildCard(c));});
    div.appendChild(grid);
  });
  return div;
}
function init(){
  var main=document.getElementById("main-content");
  var first=null;
  Object.keys(ROOMS).forEach(function(id){var r=buildRoom(id,ROOMS[id]);if(!first)first=r;main.appendChild(r);});
  if(first)first.classList.add("active");
  document.getElementById("tc").textContent=document.querySelectorAll(".card").length;
  document.querySelectorAll(".nr").forEach(function(link){
    link.style.cursor="pointer";
    link.addEventListener("click",function(){
      var rid=link.getAttribute("data-room");
      document.querySelectorAll(".room").forEach(function(r){r.classList.remove("active");});
      document.querySelectorAll(".nr").forEach(function(n){n.classList.remove("active");});
      var t=document.getElementById("room-"+rid);if(t)t.classList.add("active");
      link.classList.add("active");
    });
  });
  document.getElementById("search").addEventListener("input",function(){
    var q=this.value.toLowerCase().trim();
    if(!q){
      document.querySelectorAll(".card").forEach(function(c){c.classList.remove("hidden","open");});
      document.querySelectorAll(".room").forEach(function(r){r.classList.remove("active");});
      if(first)first.classList.add("active");
      return;
    }
    document.querySelectorAll(".room").forEach(function(r){r.classList.add("active");});
    document.querySelectorAll(".card").forEach(function(card){
      var txt=(card.querySelector(".card-name")||{}).textContent||"";
      txt+=" "+((card.querySelector(".card-body")||{}).textContent||"");
      if(txt.toLowerCase().includes(q)){card.classList.remove("hidden");card.classList.add("open");}
      else{card.classList.add("hidden");}
    });
  });
}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}else{init();}
})();
</script>
</body>
