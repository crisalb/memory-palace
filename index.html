ory Palace \u2014 How to Maintain This","desc":"Everything needed to update, deploy, and protect this palace. Add cards, rebuild HTML, push to GitHub Pages, protect the branch. Never forget how this works.","secs":[{"label":"Architecture","cards":[{"e":"map","name":"How This Palace Works \u2014 Architecture","m":"bm","tldr":"Single self-contained HTML file. All card data lives in a ROOMS JSON object inside a script tag. A vanilla JS renderer builds the DOM. No framework, no build step, works offline. Deploy anywhere that serves static files.","img":"One HTML file = the entire app. Open it in any browser, it just works. ROOMS = your database. The renderer = your frontend. GitHub Pages = your server. Claude = your content editor. That is the whole stack.","code":"ARCHITECTURE OVERVIEW\n\nmemory_palace_v9.html\n  |-- <style>          CSS: layout, cards, nav, mobile\n  |-- <header>         Search bar + card/room count stats\n  |-- <nav id=\"nav-bar\">  Horizontal scrollable pill nav\n  |-- <div id=\"main-content\">  Empty on load, filled by JS\n  |-- [SCRIPT TAG]         var ROOMS = { ... all card data ... }\n  |-- [SCRIPT TAG]         Renderer: builds DOM from ROOMS\n\nCARD SCHEMA (fields):\n  e:    emoji icon shown in header\n  name: card title\n  m:    mastery (bn=New, bf=Familiar, bfl=Fluent, bm=Mastered)\n  tldr: one-line summary always visible\n  img:  mental image or analogy (italic block)\n  code: code or text in monospace block\n  real: real-world example (optional)\n  warn: warning in amber box (optional)\n  tags: list of searchable hashtag strings\n\nROOMS dict key = room ID used in nav data-room attribute\nNAV ORDER is hardcoded in build_nav() in the Python script\nAdding new room: update BOTH ROOMS dict AND build_nav()","tags":["#architecture","#rooms","#schema","#palace-ops"]}]},{"label":"Adding cards and rooms","cards":[{"e":"plus","name":"How to Add New Cards \u2014 Step by Step","m":"bm","tldr":"Python workflow: load HTML -> extract ROOMS JSON -> build card dict -> append to right room/section -> serialize back -> inject into HTML -> save -> verify in browser -> upload to GitHub.","code":"STEP 1: Open the latest palace HTML file\n\nSTEP 2: Extract ROOMS JSON with Python\n  content = open(\"memory_palace_v9.html\").read()\n  START = \"[SCRIPT TAG]\\nvar ROOMS=\"\n  END   = \";\\n[/SCRIPT TAG]\"\n  s = content.index(START) + len(START)\n  e = content.index(END, s)\n  d = json.loads(content[s:e])\n\nSTEP 3: Build your card as a Python dict\n  card = {\n    \"e\":    \"emoji\",\n    \"name\": \"Title\",\n    \"m\":    \"bn\",\n    \"tldr\": \"one line summary\",\n    \"img\":  \"mental image analogy\",\n    \"code\": \"text or code (NO backtick characters!)\",\n    \"tags\": [\"#tag\"]\n  }\n\nSTEP 4: Append to correct room and section\n  d[\"room-id\"][\"secs\"][0][\"cards\"].append(card)\n\nSTEP 5: Serialize with ensure_ascii=True\n  safe = json.dumps(d, ensure_ascii=True,\n                    separators=(\",\",\":\"))\n  assert safe.count(chr(96)) == 0  # no backticks!\n\nSTEP 6: Inject back into HTML\n  new_html = content[:s] + safe + content[e:]\n  open(\"memory_palace_v9.html\",\"w\",\n       encoding=\"utf-8\").write(new_html)\n\nSTEP 7: Open file in browser, verify cards show\nSTEP 8: Upload to GitHub as index.html\n\nGOLDEN RULE: backtick chr(96) in any card field\n= blank palace + JS crash. Use single quotes instead.","tags":["#add-cards","#python","#workflow","#json","#palace-ops"]},{"e":"room","name":"How to Add a New Room \u2014 Step by Step","m":"bm","tldr":"A room = new key in ROOMS dict + new entry in build_nav(). The room needs icon, color (CSS var), bg (rgba), title, desc, and secs list. Update the room count number in the header HTML too.","code":"STEP 1: Add room entry to ROOMS dict\n  d[\"my-new-room\"] = {\n    \"icon\":  \"emoji or short text\",\n    \"color\": \"var(--ml)\",\n    \"bg\":    \"rgba(124,111,255,0.12)\",\n    \"title\": \"Room Display Title\",\n    \"desc\":  \"One sentence description.\",\n    \"secs\":  [{\"label\":\"Sec Name\",\"cards\":[...]}]\n  }\n\nAVAILABLE COLOR VARIABLES:\n  var(--ml)       purple   ML/AI\n  var(--agentic)  teal     Agents, LLM, RAG\n  var(--arch)     blue     Architecture\n  var(--langs)    cyan     Languages\n  var(--infra)    red      Cloud, infra\n  var(--tools)    orange   Claude Code, tools\n  var(--terminal) green    Terminal, CLI\n  var(--math)     amber    Math, MML\n\nSTEP 2: Add to nav in build_nav() function\n  Find groups list, add:\n  (\"my-new-room\", \"Short Nav Label\")\n  to the right group\n\nSTEP 3: Update room count in header\n  Find: <div class=\"stat-num\">15</div>\n  Change number to new total\n\nSTEP 4: Serialize, assert no backticks, write, upload","tags":["#add-room","#nav","#css-vars","#workflow","#palace-ops"]}]},{"label":"Deploying to GitHub Pages","cards":[{"e":"rocket","name":"Deploy to GitHub Pages \u2014 Full Workflow","m":"bm","tldr":"GitHub Pages serves index.html from main branch. Setup once: create repo, upload file as index.html, enable Pages in Settings. Update: replace index.html in repo. Pages rebuilds in ~60 seconds automatically.","code":"FIRST TIME SETUP (do once)\n\n1. Create repo: github.com -> + -> New repository\n   Name: memory-palace | Visibility: Public\n\n2. Upload file:\n   repo -> Add file -> Upload files\n   Rename your HTML file to index.html first\n   Commit changes\n\n3. Enable Pages:\n   Settings -> Pages\n   Source: Deploy from branch\n   Branch: main | Folder: / (root) -> Save\n   URL: https://YOUR-USERNAME.github.io/memory-palace/\n\n4. Protect main branch:\n   Settings -> Branches -> Add ruleset\n   Enforcement: Active  <- REQUIRED\n   Enable: Require pull request before merging\n   Enable: Required approvals = 1\n   Enable: Restrict updates\n   Enable: Restrict deletions\n   Bypass list: add yourself as Repository admin\n   Save\n\nUPDATING (every time you add cards)\n\nVia GitHub UI (easiest, works from anywhere):\n  repo -> index.html -> pencil icon -> edit\n  Cmd+A, Delete, paste new content, Commit\n\nVia terminal:\n  cp memory_palace_v9.html index.html\n  git add index.html && git commit -m \"update\"\n  git push origin main\n\nVERIFY: repo -> Actions tab -> green = deployed","tags":["#github-pages","#deploy","#workflow","#palace-ops"]},{"e":"phone","name":"Add to iPhone Home Screen","m":"bm","tldr":"Safari on iPhone can install any website as a fullscreen home screen app. Must use Safari (not Chrome). After installing: works offline, no browser chrome, feels native.","code":"STEPS:\n1. Open URL in SAFARI (must be Safari, not Chrome)\n   https://YOUR-USERNAME.github.io/memory-palace/\n\n2. Tap Share button (box with arrow up, bottom toolbar)\n\n3. Scroll down -> tap \"Add to Home Screen\"\n\n4. Name it \"Memory Palace\" -> tap Add\n\nResult:\n  - Fullscreen icon on home screen\n  - Opens with no browser bar (like a native app)\n  - Works completely offline after first load\n\nIF APP SHOWS OLD CONTENT after updating:\n  1. Delete the home screen icon\n  2. Settings -> Safari -> Clear History and Website Data\n  3. Open URL fresh in Safari\n  4. Add to Home Screen again\n\nREQUIRED META TAGS (already in palace v9):\n  viewport: viewport-fit=cover\n  apple-mobile-web-app-capable: yes\n  apple-mobile-web-app-status-bar-style: black-translucent\n  theme-color: #0a0a0f","tags":["#iphone","#pwa","#home-screen","#safari","#palace-ops"]}]},{"label":"Troubleshooting","cards":[{"e":"fix","name":"Common Problems & Fixes","m":"bm","tldr":"Three most common issues: (1) blank palace = backtick in content, (2) old version showing = cache problem, (3) sidebar on iPhone = meta tags or cache. All fixable in under 5 minutes.","code":"PROBLEM 1: Palace is completely blank\n  Symptom: loads but no cards, JS error in console\n  Cause:   backtick chr(96) in card content\n           breaks JS parser -> ROOMS undefined\n  Fix: DevTools -> Console -> look for SyntaxError\n       search file for the backtick character\n       replace with single quotes, re-save, re-upload\n\nPROBLEM 2: Seeing old version after uploading\n  Cause: aggressive browser/Safari cache\n  iPhone fix: Settings -> Safari ->\n              Clear History and Website Data\n              Delete home screen icon, re-add\n  Mac fix: Cmd+Shift+R (hard refresh)\n  Check: repo -> Actions tab -> deployment green?\n\nPROBLEM 3: Sidebar layout on iPhone\n  Cause: old CSS cached or missing meta tags\n  Fix: ensure index.html has viewport meta with\n       viewport-fit=cover, then clear Safari cache\n\nPROBLEM 4: GitHub Pages not updating\n  Check: repo -> Actions tab for error details\n  If branch protection: confirm bypass list has you\n\nDEBUGGING CHECKLIST:\n  1. Open HTML directly in browser (double-click)\n     Blank locally = file problem, not hosting\n  2. Check browser console for JS errors\n  3. No backticks: grep -c \"chr96\" index.html = 0\n  4. File size: wc -c index.html (~250-300KB OK)\n  5. Search for \"ml-optim\" -> confirms ROOMS has data","tags":["#troubleshooting","#backtick","#cache","#debug","#palace-ops"]}]}]}};
</script>
<script>
(function(){
var ML={bn:"New",bf:"Familiar",bfl:"Fluent",bm:"Mastered"};
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function buildCard(c){
  var wrap=el("div","card");
  wrap.addEventListener("click",function(ev){if(ev.target.tagName==="A")return;wrap.classList.toggle("open");});
  var head=el("div","card-head");
  head.appendChild(el("span","card-emoji",c.e||""));
  head.appendChild(el("span","card-name",c.name||""));
  head.appendChild(el("span","badge "+(c.m||"bn"),ML[c.m||"bn"]||"New"));
  head.appendChild(el("span","chev","\u25B6"));
  wrap.appendChild(head);
  var body=el("div","card-body");
  function sec(lbl,inner){if(!inner)return;var s=el("div","cs");s.appendChild(el("div","csl",lbl));var ct=el("div","cst");ct.innerHTML=inner;s.appendChild(ct);body.appendChild(s);}
  if(c.tldr)sec("TL;DR",c.tldr);
  if(c.img){var s2=el("div","cs");s2.appendChild(el("div","csl","Mental image"));var m=el("div","mental");m.textContent=c.img;s2.appendChild(m);body.appendChild(s2);body.appendChild(el("div","dv"));}
  if(c.code){var s3=el("div","cs");s3.appendChild(el("div","csl","Patterns & examples"));var pre=el("pre");pre.textContent=c.code.trim();s3.appendChild(pre);body.appendChild(s3);}
  if(c.real)sec("Real example",c.real);
  if(c.warn){var s4=el("div","cs");var w=el("div","warn");w.textContent="\u26A0 "+c.warn;s4.appendChild(w);body.appendChild(s4);}
  if(c.tags&&c.tags.length){var tg=el("div","tags");c.tags.forEach(function(t){tg.appendChild(el("span","tag",t));});body.appendChild(tg);}
  wrap.appendChild(body);return wrap;
}
function buildRoom(id,room){
  var div=el("div","room");div.id="room-"+id;
  var hdr=el("div","room-hdr");
  var row=el("div","room-title-row");
  var ico=el("div","room-icon");ico.style.background=room.bg;ico.textContent=room.icon;row.appendChild(ico);
  var tit=el("div","room-title");tit.style.color=room.color;tit.textContent=room.title;row.appendChild(tit);
  hdr.appendChild(row);
  var desc=el("div","room-desc");desc.textContent=room.desc;hdr.appendChild(desc);div.appendChild(hdr);
  (room.secs||[]).forEach(function(sec){
    var sep=el("div","sep");sep.textContent=sec.label;div.appendChild(sep);
    var grid=el("div","grid");
    (sec.cards||[]).forEach(function(c){grid.appendChild(buildCard(c));});
    div.appendChild(grid);
  });
  return div;
}
function init(){
  var main=document.getElementById("main-content");
  var first=null;
  Object.keys(ROOMS).forEach(function(id){var r=buildRoom(id,ROOMS[id]);if(!first)first=r;main.appendChild(r);});
  if(first)first.classList.add("active");
  document.getElementById("tc").textContent=document.querySelectorAll(".card").length;
  document.querySelectorAll(".nr").forEach(function(link){
    link.style.cursor="pointer";
    link.addEventListener("click",function(){
      var rid=link.getAttribute("data-room");
      document.querySelectorAll(".room").forEach(function(r){r.classList.remove("active");});
      document.querySelectorAll(".nr").forEach(function(n){n.classList.remove("active");});
      var t=document.getElementById("room-"+rid);if(t)t.classList.add("active");
      link.classList.add("active");
    });
  });
  document.getElementById("search").addEventListener("input",function(){
    var q=this.value.toLowerCase().trim();
    if(!q){
      document.querySelectorAll(".card").forEach(function(c){c.classList.remove("hidden","open");});
      document.querySelectorAll(".room").forEach(function(r){r.classList.remove("active");});
      if(first)first.classList.add("active");
      return;
    }
    document.querySelectorAll(".room").forEach(function(r){r.classList.add("active");});
    document.querySelectorAll(".card").forEach(function(card){
      var txt=(card.querySelector(".card-name")||{}).textContent||"";
      txt+=" "+((card.querySelector(".card-body")||{}).textContent||"");
      if(txt.toLowerCase().includes(q)){card.classList.remove("hidden");card.classList.add("open");}
      else{card.classList.add("hidden");}
    });
  });
}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}else{init();}
})();
</script>
