nctions.zsh \u2014 smart functions\n\n# Clone and immediately open in editor + tmux\nfunction ghclone() {\n    git clone \"git@github.com:$1.git\" && cd \"$(basename $1)\" && tmux new-session -d -s \"$(basename $1)\" && code .\n}\n\n# Quick kill process on port\nfunction killport() {\n    lsof -ti tcp:\"$1\" | xargs kill -9\n}\n\n# Switch k8s context with fuzzy search\nfunction kctx() {\n    kubectl config use-context $(kubectl config get-contexts -o name | fzf)\n}\n\n# cd to git root\nfunction groot() { cd \"$(git rev-parse --show-toplevel)\"; }\n\n# Copy last command to clipboard\nfunction copylast() { history | tail -1 | awk \"{print $2}\" | pbcopy; }\n\n# Pretty print JSON from clipboard\nfunction jsonclip() { pbpaste | jq . | bat -l json; }\n\n# Auto-activate Python venv when entering directory\nfunction auto_venv() {\n    if [[ -f \".venv/bin/activate\" ]]; then\n        source .venv/bin/activate\n    fi\n}\nadd-zsh-hook chpwd auto_venv","tags":["#zsh","#shell-functions","#dotfiles","#productivity","#zshrc"]},{"e":"\ud83d\udd11","name":"SSH Config & Key Management","m":"bfl","tldr":"~/.ssh/config: define hosts with aliases, key files, jump hosts. ssh-agent: holds decrypted keys in memory. 1Password SSH agent: store keys in 1Password vault. Jump hosts: bastion \u2192 internal server in one command.","code":"# ~/.ssh/config \u2014 clean host definitions\n\nHost bastion-prod\n    HostName bastion.company.com\n    User cris\n    IdentityFile ~/.ssh/id_ed25519_work\n    AddKeysToAgent yes\n\nHost prod-*\n    User ubuntu\n    ProxyJump bastion-prod      # auto-jump through bastion\n    IdentityFile ~/.ssh/id_ed25519_work\n    ServerAliveInterval 60      # prevent timeout\n    StrictHostKeyChecking no    # for ephemeral cloud instances\n\nHost github.com\n    IdentityFile ~/.ssh/id_ed25519_github\n    AddKeysToAgent yes\n\n# Now you can:\n# ssh prod-api-1               # auto-jumps through bastion\n# ssh prod-db-1                # same\n# scp prod-api-1:/var/log/app.log .   # copy files through jump\n\n# SSH tunnel \u2014 forward local port to remote service\nssh -L 5432:db.internal:5432 bastion-prod -N &\n# Now: psql -h localhost -p 5432   (connects to prod DB through tunnel)\n\n# 1Password SSH Agent (best practice)\n# op plugin init ssh\n# All SSH keys stored in 1Password, agent auto-populates","tags":["#ssh","#ssh-config","#jump-host","#bastion","#tunnel","#1password"]},{"e":"\ud83d\udce6","name":"dotfiles \u2014 Version Control Your Setup","m":"bfl","tldr":"dotfiles repo: version control all your config files. Use GNU stow or a bare git repo to symlink from $HOME. New machine setup: git clone + stow = fully configured in minutes.","code":"# Method 1: bare git repo (simplest)\ngit init --bare $HOME/.dotfiles\nalias dotfiles=\"git --git-dir=$HOME/.dotfiles/ --work-tree=$HOME\"\ndotfiles config status.showUntrackedFiles no\ndotfiles remote add origin git@github.com:you/dotfiles.git\n\n# Add and commit config files\ndotfiles add ~/.zshrc ~/.zsh/ ~/.ssh/config ~/.gitconfig ~/.tmux.conf\ndotfiles add ~/.config/nvim/ ~/.claude/\n\ndotfiles commit -m \"add zsh and neovim config\"\ndotfiles push\n\n# On new machine:\ngit clone --bare git@github.com:you/dotfiles.git $HOME/.dotfiles\nalias dotfiles=\"git --git-dir=$HOME/.dotfiles/ --work-tree=$HOME\"\ndotfiles checkout   # symlinks all files to $HOME\n\n# Structure of your dotfiles repo:\n# .zshrc, .zsh/aliases.zsh, .zsh/functions.zsh\n# .gitconfig, .gitignore_global\n# .tmux.conf\n# .config/nvim/init.lua\n# .claude/settings.json, .claude/CLAUDE.md (global)\n# .ssh/config (without keys \u2014 add keys separately)\n# install.sh   \u2014 bootstraps tools on new machine (brew/apt)","tags":["#dotfiles","#stow","#bare-git","#reproducible-setup","#new-machine"]}]},{"label":"Neovim & editor setup","cards":[{"e":"\ud83d\udd37","name":"Neovim \u2014 LSP, Treesitter, Essential Plugins","m":"bf","tldr":"Modern Neovim = Lua config + LSP (language server) + Treesitter (syntax) + Telescope (fuzzy find) + lazy.nvim (plugin manager). Effectively a full IDE with sub-millisecond startup.","code":"-- ~/.config/nvim/init.lua (minimal modern config)\n\n-- Plugin manager: lazy.nvim\nlocal lazypath = vim.fn.stdpath(\"data\") .. \"/lazy/lazy.nvim\"\nvim.opt.rtp:prepend(lazypath)\n\nrequire(\"lazy\").setup({\n    -- LSP: language servers\n    { \"neovim/nvim-lspconfig\",\n      dependencies = {\n        \"williamboman/mason.nvim\",         -- install LSP servers\n        \"williamboman/mason-lspconfig.nvim\",\n      }},\n    -- Completion\n    { \"hrsh7th/nvim-cmp\",\n      dependencies = {\"hrsh7th/cmp-nvim-lsp\", \"L3MON4D3/LuaSnip\"} },\n    -- Fuzzy find everything\n    { \"nvim-telescope/telescope.nvim\",\n      dependencies = {\"nvim-lua/plenary.nvim\"} },\n    -- Syntax highlighting\n    { \"nvim-treesitter/nvim-treesitter\", build = \":TSUpdate\" },\n    -- File tree\n    { \"nvim-tree/nvim-tree.lua\" },\n    -- Git integration\n    { \"lewis6991/gitsigns.nvim\" },\n    { \"tpope/vim-fugitive\" },\n    -- AI completion\n    { \"github/copilot.vim\" },\n})\n\n-- Key mappings\nlocal map = vim.keymap.set\nmap(\"n\", \"<leader>ff\", \":Telescope find_files<CR>\")   -- find files\nmap(\"n\", \"<leader>fg\", \":Telescope live_grep<CR>\")     -- grep\nmap(\"n\", \"<leader>fb\", \":Telescope buffers<CR>\")       -- buffers\nmap(\"n\", \"gd\", vim.lsp.buf.definition)                 -- go to definition\nmap(\"n\", \"K\",  vim.lsp.buf.hover)                      -- hover docs\nmap(\"n\", \"<leader>ca\", vim.lsp.buf.code_action)        -- code action","tags":["#neovim","#lsp","#treesitter","#telescope","#lazy-nvim","#ide"]}]},{"label":"Advanced CLI tools","cards":[{"e":"\ud83d\udd2d","name":"Advanced fzf \u2014 Fuzzy Find Everything","m":"bm","tldr":"fzf is not just file search. It is a universal fuzzy selector that can pipe to anything. Fuzzy git branches, docker containers, k8s pods, process kill, environment variables. Most powerful CLI tool you can learn.","code":"# ~/.zsh/fzf.zsh power config\n\nexport FZF_DEFAULT_COMMAND=\"rg --files --hidden --follow --glob !.git\"\nexport FZF_DEFAULT_OPTS=\"\n    --height 60% --layout=reverse --border\n    --preview-window=right:50%:wrap\n    --color=dark,bg+:-1,hl:yellow,hl+:yellow,info:blue,prompt:blue\"\n\n# Fuzzy git checkout (with branch preview)\nfunction gfco() {\n    git checkout $(git branch --all |\n        fzf --preview \"git log --oneline {} | head -20\" |\n        sed \"s/remotes\\/origin\\///\")\n}\n\n# Fuzzy kill process\nfunction fkill() {\n    ps aux | fzf --header \"Select process to kill\" |\n    awk \"{print $2}\" | xargs kill -9\n}\n\n# Fuzzy docker exec\nfunction dexec() {\n    docker exec -it $(docker ps | tail -n +2 |\n        fzf --preview \"docker inspect {1}\" |\n        awk \"{print $1}\") /bin/sh\n}\n\n# Fuzzy kubectl exec into pod\nfunction kexec() {\n    kubectl exec -it $(kubectl get pods | tail -n +2 |\n        fzf --preview \"kubectl describe pod {1}\" |\n        awk \"{print $1}\") -- /bin/sh\n}\n\n# Fuzzy env variable lookup\nfunction envget() {\n    env | fzf | cut -d\"=\" -f2 | pbcopy\n    echo \"Copied to clipboard\"\n}\n\n# Ctrl+R history search with multi-line preview\nbindkey \"^R\" fzf-history-widget","tags":["#fzf","#fuzzy","#git","#docker","#kubectl","#productivity"]},{"e":"\ud83d\udce1","name":"HTTPie & curl \u2014 API Testing Power Patterns","m":"bfl","tldr":"HTTPie: human-friendly HTTP client with JSON by default, auth shortcuts, session support. curl: universal, scriptable, cookie jars, cert pinning. Know both \u2014 httpie for manual testing, curl for scripts.","code":"# HTTPie \u2014 human-friendly HTTP\n# Install: brew install httpie (or: pip install httpie)\n\n# Basic requests\nhttp GET api.example.com/orders\nhttp POST api.example.com/orders total:=9999 items:=\"[]\"   # := means JSON value\n\n# Auth\nhttp -a username:password GET api.example.com/protected\nhttp GET api.example.com/orders \"Authorization:Bearer $TOKEN\"\n\n# Sessions (stores cookies, auth)\nhttp --session=myapp POST api.example.com/login username=cris password=secret\nhttp --session=myapp GET api.example.com/profile  # uses saved session\n\n# Download with progress\nhttp --download GET files.example.com/large-model.bin\n\n# Follow redirects, verbose headers\nhttp --follow --print=hHbB GET api.example.com/redirect\n\n# curl \u2014 for scripts and advanced use\n# Save cookies, follow redirect\ncurl -c cookies.txt -L -o /dev/null -s -w \"%{http_code}\" https://api.example.com\n\n# POST JSON\ncurl -X POST https://api.example.com/orders     -H \"Content-Type: application/json\"     -H \"Authorization: Bearer $TOKEN\"     -d \"$(jq -n --arg id \"$ORDER_ID\" \"{id: $id, total: 9999}\")\"\n\n# Test SSL cert\ncurl -v --cacert /path/to/ca.crt https://internal-api.company.com","tags":["#httpie","#curl","#api-testing","#http","#rest","#debugging"]},{"e":"\ud83d\udcca","name":"Terminal Monitoring \u2014 htop, btop, glances","m":"bfl","tldr":"htop: interactive process viewer with tree view. btop: beautiful resource monitor (CPU, mem, net, disk). glances: overview of everything in one screen. watch: run any command repeatedly. Use for debugging CPU spikes, memory leaks, network saturation.","code":"# htop key bindings (F-keys or letters)\n# F6 / s    : sort by (CPU, MEM, PID, etc.)\n# F5 / t    : tree view (see parent-child processes)\n# F4 / /    : filter processes by name\n# F9 / k    : kill selected process\n# u         : filter by user\n# Space     : tag process (for batch operations)\n# H         : toggle user/kernel threads\n\n# btop \u2014 gorgeous resource monitor\nbrew install btop && btop\n# Themes: press \"t\" to cycle\n# Shows: CPU per core, memory, swap, network I/O, disk I/O, process list\n\n# glances \u2014 single-pane overview\npip install glances && glances\n# Web interface: glances -w   -> http://localhost:61208\n\n# watch \u2014 repeat command every N seconds\nwatch -n 2 \"kubectl get pods -n prod\"     # refresh pod list every 2s\nwatch -n 1 \"kubectl top pods -n prod\"     # live resource usage\nwatch -n 5 \"ps aux | grep python | grep -v grep\"  # watch python processes\n\n# Useful one-liners for debugging\n# Memory usage by process:\nps aux --sort=-%mem | head -20\n\n# Top CPU consumers, live:\ntop -bn1 | grep -v grep | sort -k9rn | head -10\n\n# Network connections by state:\nss -s   # socket statistics summary\nnetstat -tupln  # listening ports with PID","tags":["#htop","#btop","#glances","#monitoring","#debugging","#performance"]},{"e":"\ud83d\uddc2\ufe0f","name":"fd, bat, eza, delta \u2014 Modern Unix Replacements","m":"bf","tldr":"fd replaces find (10x faster, sane syntax). bat replaces cat (syntax highlighting, line numbers). eza replaces ls (colors, git status, tree). delta replaces diff in git (side-by-side, syntax highlighting).","code":"# Install all at once\nbrew install fd bat eza git-delta\n\n# fd \u2014 find replacement\nfd \"*.py\"                           # find all Python files\nfd -e py -x wc -l                   # count lines in all Python files\nfd -t d \"node_modules\" --exec rm -rf  # delete all node_modules\n\n# bat \u2014 cat with syntax highlighting\nbat src/main.py                      # highlighted Python\nbat --style=numbers,changes,header file.py  # with git changes\nbat -l json response.json            # force JSON highlighting\ngit diff | bat                       # highlighted diff\n\n# eza \u2014 ls replacement\neza -la --git                        # list with git status column\neza --tree --level=2                 # tree view (2 levels deep)\neza -la --sort=modified              # sort by modification time\n\n# Add to .zshrc:\nalias ls=\"eza --icons\"\nalias ll=\"eza -la --git\"\nalias lt=\"eza --tree --level=3\"\nalias cat=\"bat\"\nalias find=\"fd\"\n\n# delta \u2014 better git diffs\n# ~/.gitconfig:\n# [core]\n#     pager = delta\n# [delta]\n#     navigate = true\n#     side-by-side = true\n#     line-numbers = true\n#     syntax-theme = \"Dracula\"\n# [interactive]\n#     diffFilter = delta --color-only","tags":["#fd","#bat","#eza","#delta","#modern-unix","#productivity"]},{"e":"\ud83d\udd0d","name":"jq Deep Dive \u2014 JSON Power Queries","m":"bm","tldr":"jq is Turing-complete. Beyond basic filtering: recursive descent, map/select, reduce, group_by, env variables, update operators. Master jq and you never need to write a Python script for JSON manipulation again.","code":"# Basic \u2192 intermediate \u2192 advanced jq\n\n# Extract nested fields\ncat data.json | jq \".items[] | {id: .id, name: .user.name}\"\n\n# Filter + transform\ncat orders.json | jq \"[.[] | select(.status == \"completed\" and .total > 1000)]\"\n\n# Group and count\ncat events.json | jq \"group_by(.type) | map({type: .[0].type, count: length})\"\n\n# Recursive descent \u2014 find key anywhere in structure\necho $COMPLEX_JSON | jq \".. | .error? // empty\"\n\n# Update in place (create modified copy)\ncat config.json | jq \".database.pool_size = 20 | .cache.ttl = 300\"\n\n# Reduce \u2014 aggregate values\ncat orders.json | jq \"[.[] | .total] | add\"          # sum all totals\ncat logs.json   | jq \"reduce .[] as $l ({}; .[$l.level] += 1)\"  # count by level\n\n# Environment variables in jq\nexport MIN_TOTAL=1000\ncat orders.json | jq --argjson min \"$MIN_TOTAL\" \"[.[] | select(.total > $min)]\"\n\n# Format as CSV\ncat users.json | jq -r \".[] | [.id, .name, .email] | @csv\"\n\n# Kubernetes + jq power combo\nkubectl get pods -A -o json | jq \"\n  .items[] |\n  select(.status.phase != \"Running\") |\n  {name: .metadata.name, ns: .metadata.namespace, phase: .status.phase}\"","tags":["#jq","#json","#query","#kubectl","#data-processing","#advanced"]},{"e":"\ud83d\udc19","name":"Git \u2014 Advanced Operations","m":"bm","tldr":"Interactive rebase to clean up history. Bisect to find when a bug was introduced. Reflog to recover from mistakes. Stash with messages. Cherry-pick ranges. Partial staging with -p. These are the operations that separate senior from principal.","code":"# Interactive rebase \u2014 rewrite history before pushing\ngit rebase -i HEAD~5       # edit last 5 commits\n# pick, reword, edit, squash, fixup, drop\n# squash = combine commits, fixup = squash without commit message\n\n# Bisect \u2014 binary search for bug introduction\ngit bisect start\ngit bisect bad             # current commit has the bug\ngit bisect good v1.2.0     # this version was fine\n# Git checks out midpoint\n# Test it, then:\ngit bisect good            # or: git bisect bad\n# Repeat until git identifies the first bad commit\ngit bisect reset           # return to HEAD\n\n# Reflog \u2014 recover from disasters\ngit reflog                 # complete history of HEAD movements\ngit checkout HEAD@{3}      # go back 3 HEAD positions\ngit reset --hard HEAD@{2}  # reset to 2 steps ago\n\n# Partial staging (interactive)\ngit add -p                 # stage individual hunks within files\n# y=stage, n=skip, s=split hunk, e=edit hunk manually\n\n# Cherry-pick range\ngit cherry-pick A..B       # pick commits from A to B (exclusive A)\ngit cherry-pick A^..B      # pick commits from A to B (inclusive A)\n\n# Stash with context\ngit stash push -m \"WIP: auth refactor\" -- src/auth/\ngit stash list             # list all stashes\ngit stash apply stash@{2}  # apply specific stash\n\n# Find when line was added\ngit log -S \"function processPayment\" --source --all","tags":["#git","#rebase","#bisect","#reflog","#stash","#cherry-pick","#advanced"]}]}]},"mml-math":{"icon":"sum","color":"var(--math)","bg":"rgba(255,183,77,0.12)","title":"MML \u2014 Linear Algebra & Geometry","desc":"MML Book Ch.2 & Ch.3 \u2014 Deisenroth, Faisal, Ong. Every concept shown with step-by-step worked examples using real numbers. The math behind every ML algorithm.","secs":[{"label":"Chapter 2 \u2014 Linear Algebra","cards":[{"e":"\ud83e\uddee","name":"Systems of Linear Equations \u2014 Step by Step","m":"bfl","tldr":"A system Ax=b is a set of equations solved simultaneously. 2 equations, 2 unknowns = find where two lines cross. Solution: 0 (parallel lines), 1 (one crossing), or infinite (same line).","img":"Two friends splitting a bill. \"Our total is 30 and you had twice what I had.\" Two unknowns (your share, my share), two equations. Gaussian elimination = systematic substitution until one unknown is isolated, then work back up.","code":"WORKED EXAMPLE \u2014 solve the system:\n    x + y  = 5    ... (equation 1)\n   2x - y  = 1    ... (equation 2)\n\nStep 1: Write as augmented matrix [A|b]\n   [ 1   1 | 5 ]\n   [ 2  -1 | 1 ]\n\nStep 2: Eliminate x from row 2\n   R2 = R2 - 2*R1   (subtract 2 times row 1 from row 2)\n   R2_new = [2-2*1,  -1-2*1,  1-2*5]\n           = [  0,     -3,     -9 ]\n\n   Matrix is now in Row Echelon Form:\n   [ 1   1 |  5 ]\n   [ 0  -3 | -9 ]\n\nStep 3: Back substitution\n   From row 2:  -3y = -9  ->  y = 3\n   From row 1:  x + 3 = 5  ->  x = 2\n\nAnswer: x = 2, y = 3\n\nCheck: 2+3=5 \u2713   2*2-3=1 \u2713\n\nIN NUMPY:\nimport numpy as np\nA = np.array([[1,1],[2,-1]], dtype=float)\nb = np.array([5., 1.])\nx = np.linalg.solve(A, b)   # [2. 3.]","tags":["#gaussian-elimination","#linear-equations","#mml-ch2","#worked-example"]},{"e":"\ud83d\udce6","name":"Matrices \u2014 Operations Step by Step","m":"bfl","tldr":"Matrix = rectangular array of numbers. Addition: element-wise. Multiplication: row of A dot column of B. Not commutative: AB != BA in general. Identity matrix I: AI = IA = A.","img":"Matrix multiplication = each cell in the result is a dot product. The (i,j) cell of AB = row i of A dotted with column j of B. Think of it as \"how much does each row of A project onto each column of B?\"","code":"WORKED EXAMPLE \u2014 Matrix multiplication AB\n\nA = [ 1  2 ]    B = [ 5  6 ]\n    [ 3  4 ]        [ 7  8 ]\n\nC = AB\n\nC[0,0] = row 0 of A  dot  col 0 of B\n       = 1*5 + 2*7 = 5 + 14 = 19\n\nC[0,1] = row 0 of A  dot  col 1 of B\n       = 1*6 + 2*8 = 6 + 16 = 22\n\nC[1,0] = row 1 of A  dot  col 0 of B\n       = 3*5 + 4*7 = 15 + 28 = 43\n\nC[1,1] = row 1 of A  dot  col 1 of B\n       = 3*6 + 4*8 = 18 + 32 = 50\n\nC = AB = [ 19  22 ]\n         [ 43  50 ]\n\nMemory rule: (m x k) * (k x n) = (m x n)\n             Inner dims must match, outer dims give result shape\n\nWORKED EXAMPLE \u2014 Matrix inverse\nA = [ 2  1 ]\n    [ 5  3 ]\n\ndet(A) = 2*3 - 1*5 = 6 - 5 = 1\n\nA^-1 = (1/det) * [  d  -b ] = 1/1 * [  3  -1 ]\n                  [ -c   a ]         [ -5   2 ]\n\nCheck: A * A^-1\n[ 2  1 ] * [  3  -1 ] = [ 2*3+1*(-5)  2*(-1)+1*2 ]\n[ 5  3 ]   [ -5   2 ]   [ 5*3+3*(-5)  5*(-1)+3*2 ]\n                       = [ 6-5  -2+2 ] = [ 1  0 ] = I  \u2713\n                         [15-15 -5+6 ]   [ 0  1 ]","tags":["#matrices","#matrix-multiplication","#inverse","#mml-ch2","#worked-example"]},{"e":"\ud83d\udd17","name":"Linear Independence & Basis \u2014 Step by Step","m":"bfl","tldr":"Vectors are linearly independent if the ONLY solution to c1*v1 + c2*v2 + ... = 0 is all c=0. A basis = linearly independent set that spans the whole space. R^2 needs exactly 2 basis vectors, R^3 needs 3.","img":"Linear independence = no vector is \"hiding inside\" the others. Three vectors in R^2 are ALWAYS dependent because you only need 2 to describe all of R^2 \u2014 the third must be reachable from the first two. Test: set up the equation and see if only the trivial solution exists.","code":"WORKED EXAMPLE \u2014 Are these vectors linearly independent?\n\nv1 = [1, 2]    v2 = [3, 4]   in R^2\n\nTest: find c1, c2 such that c1*v1 + c2*v2 = 0\n\nc1*[1,2] + c2*[3,4] = [0,0]\n\nThis gives the system:\n  c1 + 3c2 = 0   ... (eq 1)\n  2c1 + 4c2 = 0  ... (eq 2)\n\nFrom eq 1: c1 = -3c2\nSub into eq 2: 2(-3c2) + 4c2 = 0\n               -6c2 + 4c2 = 0\n               -2c2 = 0  ->  c2 = 0\nTherefore c1 = 0\n\nONLY solution is c1=c2=0 -> LINEARLY INDEPENDENT \u2713\n\nWORKED EXAMPLE \u2014 Dependent vectors:\n\nv1 = [1, 2]    v2 = [2, 4]   (v2 = 2*v1)\n\nc1 + 2c2 = 0\n2c1 + 4c2 = 0\n\nFrom eq 1: c1 = -2c2\nSub into eq 2: -4c2 + 4c2 = 0  ->  0 = 0  (always true!)\n\nInfinitely many solutions (e.g. c2=1, c1=-2)\n  -2*[1,2] + 1*[2,4] = [-2+2, -4+4] = [0,0] \u2713\n-> LINEARLY DEPENDENT\n\nWORKED EXAMPLE \u2014 Is this a basis for R^2?\nB = {[1,0], [0,1]}  (standard basis)\n\n1. Linearly independent? c1[1,0]+c2[0,1]=0 -> c1=0, c2=0 \u2713\n2. Spans R^2? Any [x,y] = x*[1,0] + y*[0,1] \u2713\n-> YES, this is a basis for R^2","tags":["#linear-independence","#basis","#span","#mml-ch2","#worked-example"]},{"e":"\ud83d\udcca","name":"Rank & Gaussian Elimination to REF","m":"bf","tldr":"Rank = number of pivot columns = dimension of column space = number of linearly independent rows/columns. Use Gaussian elimination to find REF, then count non-zero rows. rank(A) + nullity(A) = number of columns.","code":"WORKED EXAMPLE \u2014 Find the rank of A\n\nA = [ 1  2  3 ]\n    [ 4  5  6 ]\n    [ 7  8  9 ]\n\nStep 1: Eliminate column 1\nR2 = R2 - 4*R1 = [4-4,  5-8,  6-12] = [0, -3, -6]\nR3 = R3 - 7*R1 = [7-7,  8-14, 9-21] = [0, -6, -12]\n\n[ 1   2   3 ]\n[ 0  -3  -6 ]\n[ 0  -6 -12 ]\n\nStep 2: Eliminate column 2\nR3 = R3 - 2*R2 = [0-0, -6-(-6), -12-(-12)] = [0, 0, 0]\n\n[ 1   2   3 ]   <- pivot in col 1\n[ 0  -3  -6 ]   <- pivot in col 2\n[ 0   0   0 ]   <- zero row = no pivot\n\nRow Echelon Form reached.\nNon-zero rows = 2  ->  rank(A) = 2\n\nrank-nullity: rank + nullity = 3 (num columns)\n              nullity = 3 - 2 = 1\n              (1-dimensional null space = 1 free variable)\n\nFINDING NULL SPACE (what x satisfies Ax=0):\nFrom REF: -3x2 - 6x3 = 0  ->  x2 = -2x3\n          x1 + 2x2 + 3x3 = 0  ->  x1 = -2(-2x3) - 3x3 = x3\n\nLet x3 = 1 (free variable):\n  x1=1, x2=-2, x3=1\n\nNull space = span{[1, -2, 1]}  (1-dimensional \u2713)","tags":["#rank","#nullity","#ref","#null-space","#mml-ch2","#worked-example"]},{"e":"\ud83d\uddfa\ufe0f","name":"Linear Mappings \u2014 Step by Step","m":"bf","tldr":"A linear map takes vectors from one space to another while preserving addition and scaling. Every linear map between finite-dim spaces = a matrix. The matrix tells you where each basis vector lands.","code":"WORKED EXAMPLE \u2014 A linear map and its matrix\n\nDefine Phi: R^2 -> R^2\n  Phi([x, y]) = [x + y,  2x - y]\n\nStep 1: Find the matrix by seeing where basis vectors go\n\ne1 = [1, 0]:  Phi([1,0]) = [1+0, 2*1-0] = [1, 2]\ne2 = [0, 1]:  Phi([0,1]) = [0+1, 2*0-1] = [1, -1]\n\nMatrix A = [Phi(e1) | Phi(e2)] (columns are images of basis vectors)\nA = [ 1   1 ]\n    [ 2  -1 ]\n\nStep 2: Verify with a specific vector\nv = [3, 4]\n\nDirect: Phi([3,4]) = [3+4, 2*3-4] = [7, 2]\nMatrix: A*v = [ 1*3 + 1*4  ] = [ 7 ]   \u2713\n              [ 2*3 + (-1)*4 ]   [ 2 ]\n\nWORKED EXAMPLE \u2014 Change of basis\n\nStandard basis: e1=[1,0], e2=[0,1]\nNew basis:      b1=[1,1], b2=[1,-1]\n\nPoint p = [3, 1] in standard coordinates.\nWhat are its coordinates in the new basis?\n\nSolve: c1*b1 + c2*b2 = p\n  c1*[1,1] + c2*[1,-1] = [3,1]\n  c1 + c2 = 3\n  c1 - c2 = 1\n\nAdding: 2c1 = 4 -> c1 = 2\nSubtracting: 2c2 = 2 -> c2 = 1\n\np in new basis = [2, 1]\nCheck: 2*[1,1] + 1*[1,-1] = [2,2]+[1,-1] = [3,1] \u2713","tags":["#linear-map","#matrix-representation","#change-of-basis","#mml-ch2","#worked-example"]}]},{"label":"Chapter 3 \u2014 Analytic Geometry","cards":[{"e":"\ud83d\udccf","name":"Norms \u2014 Computing Vector Length","m":"bfl","tldr":"A norm measures the \"size\" of a vector. L2 = Euclidean straight-line distance. L1 = sum of absolute values (Manhattan). Each gives a different measure of length.","img":"You are at origin (0,0) trying to reach point (3,4). L2 norm = fly straight there: sqrt(3^2 + 4^2) = 5. L1 norm = walk on a grid, only horizontal and vertical: 3+4 = 7. L-infinity = how many blocks on the longest single axis: max(3,4) = 4.","code":"WORKED EXAMPLE \u2014 Compute norms of v = [3, -4]\n\nL1 norm (Manhattan):\n  ||v||_1 = |3| + |-4| = 3 + 4 = 7\n\nL2 norm (Euclidean):\n  ||v||_2 = sqrt(3^2 + (-4)^2)\n          = sqrt(9 + 16)\n          = sqrt(25)\n          = 5\n\nL-infinity norm:\n  ||v||_inf = max(|3|, |-4|) = max(3, 4) = 4\n\nWORKED EXAMPLE \u2014 Normalize a vector (make it unit length)\n\nv = [3, 4]\n||v||_2 = sqrt(9+16) = 5\n\nv_normalized = v / ||v||_2\n             = [3/5, 4/5]\n             = [0.6, 0.8]\n\nCheck: ||v_normalized||_2 = sqrt(0.6^2 + 0.8^2)\n                          = sqrt(0.36 + 0.64)\n                          = sqrt(1.0) = 1  \u2713\n\nWHY IT MATTERS FOR ML:\nL2 regularization penalizes large weights:\n  Loss = MSE + lambda * ||w||_2^2\n       = MSE + lambda * (w1^2 + w2^2 + ...)\n  -> pushes all weights toward zero, none to exactly zero\n\nL1 regularization (Lasso):\n  Loss = MSE + lambda * ||w||_1\n       = MSE + lambda * (|w1| + |w2| + ...)\n  -> pushes some weights to exactly zero (sparse solution)","tags":["#norms","#l1","#l2","#normalize","#regularization","#mml-ch3","#worked-example"]},{"e":"\ud83d\udd35","name":"Inner Products & Dot Product \u2014 Step by Step","m":"bfl","tldr":"Dot product = sum of element-wise products. Geometric meaning: measures how much two vectors point in the same direction. Positive = same direction. Zero = perpendicular. Negative = opposite directions.","img":"Imagine two arrows. The dot product answers: \"if I project one arrow onto the other, how long is the shadow times the original length?\" Full alignment (same direction) = maximum. Perpendicular = zero (no shadow). Opposite = negative.","code":"WORKED EXAMPLE \u2014 Dot product of u and v\n\nu = [2, 3]    v = [4, 1]\n\nDot product:\n  u . v = u1*v1 + u2*v2\n        = 2*4  + 3*1\n        = 8 + 3\n        = 11\n\nWORKED EXAMPLE \u2014 3D dot product\n\na = [1, 2, 3]    b = [4, 5, 6]\n\na . b = 1*4 + 2*5 + 3*6\n      = 4   + 10  + 18\n      = 32\n\nPROPERTIES TO KNOW:\n  a . a = ||a||^2     (dot with itself = squared length)\n  a . b = b . a       (commutative)\n  (a+b) . c = a.c + b.c   (distributive)\n\nWORKED EXAMPLE \u2014 Find the angle between two vectors\n\nx = [1, 0]    y = [1, 1]\n\n||x|| = sqrt(1^2 + 0^2) = 1\n||y|| = sqrt(1^2 + 1^2) = sqrt(2) \u2248 1.414\n\nx . y = 1*1 + 0*1 = 1\n\ncos(theta) = (x . y) / (||x|| * ||y||)\n           = 1 / (1 * 1.414)\n           = 0.707\n\ntheta = arccos(0.707) = 45 degrees\n\nWHY THIS MATTERS:\nAttention in transformers:\n  score(q, k) = q . k / sqrt(d)\n  -> measures how much query q \"aligns\" with key k\n  -> high dot product = high attention weight","tags":["#dot-product","#inner-product","#angle","#attention","#mml-ch3","#worked-example"]},{"e":"\ud83d\udcd0","name":"Orthogonality & Gram-Schmidt \u2014 Step by Step","m":"bfl","tldr":"Two vectors are orthogonal if their dot product = 0 (90 degree angle). Gram-Schmidt: turn any set of linearly independent vectors into an orthonormal basis by subtracting projections one at a time.","img":"Gram-Schmidt is like calibrating axes. Start with any two non-parallel vectors. Keep the first as-is (normalize it). For the second: remove the component that points in the first direction (subtract the shadow), then normalize what remains. Result: two perfectly perpendicular unit vectors.","code":"WORKED EXAMPLE \u2014 Check orthogonality\n\nu = [3, 4]    v = [-4, 3]\n\nu . v = 3*(-4) + 4*3 = -12 + 12 = 0\n\nu and v ARE orthogonal (dot product = 0) \u2713\nThe angle between them is 90 degrees.\n\nWORKED EXAMPLE \u2014 Gram-Schmidt orthogonalization\n\nInput: v1 = [1, 1]    v2 = [1, 0]\n\nSTEP 1: Normalize v1 to get e1\n  ||v1|| = sqrt(1^2 + 1^2) = sqrt(2)\n  e1 = v1 / ||v1|| = [1/sqrt(2), 1/sqrt(2)] \u2248 [0.707, 0.707]\n\nSTEP 2: Remove the e1-component from v2\n  Project v2 onto e1:\n    proj = (v2 . e1) * e1\n    v2 . e1 = 1*0.707 + 0*0.707 = 0.707\n    proj = 0.707 * [0.707, 0.707] = [0.5, 0.5]\n\n  Subtract the projection:\n    v2_perp = v2 - proj = [1, 0] - [0.5, 0.5] = [0.5, -0.5]\n\nSTEP 3: Normalize v2_perp to get e2\n  ||v2_perp|| = sqrt(0.5^2 + 0.5^2) = sqrt(0.5) \u2248 0.707\n  e2 = v2_perp / 0.707 = [0.707, -0.707]\n\nResult: orthonormal basis {e1, e2}\n  e1 = [0.707,  0.707]\n  e2 = [0.707, -0.707]\n\nCheck: e1 . e2 = 0.707*0.707 + 0.707*(-0.707) = 0.5 - 0.5 = 0 \u2713\n       ||e1|| = 1 \u2713   ||e2|| = 1 \u2713","tags":["#orthogonality","#gram-schmidt","#orthonormal","#mml-ch3","#worked-example"]},{"e":"\ud83c\udfaf","name":"Orthogonal Projections \u2014 Step by Step","m":"bm","tldr":"Projecting vector x onto a line (or subspace) finds the closest point on that line to x. The projection is the \"shadow\" of x. The difference (residual) is perpendicular to the line. Least squares is a projection.","img":"Hold a flashlight directly above a pencil lying on a table. The shadow on the table is the projection. The pencil itself is your vector x. The table is your subspace. The shadow is always the closest point on the table to the tip of the pencil.","code":"WORKED EXAMPLE \u2014 Project x onto line spanned by b\n\nx = [4, 2]    b = [3, 1]   (direction of the line)\n\nFORMULA: proj = (x . b / b . b) * b\n\nStep 1: x . b = 4*3 + 2*1 = 12 + 2 = 14\nStep 2: b . b = 3*3 + 1*1 = 9  + 1 = 10\nStep 3: scalar = 14/10 = 1.4\n\nproj = 1.4 * [3, 1] = [4.2, 1.4]\n\nResidual (what is left over, perpendicular to b):\n  r = x - proj = [4, 2] - [4.2, 1.4] = [-0.2, 0.6]\n\nCheck: r . b should = 0 (perpendicular)\n  (-0.2)*3 + 0.6*1 = -0.6 + 0.6 = 0  \u2713\n\nWORKED EXAMPLE \u2014 Least squares as projection\n\nData:  x = [1, 2, 3]\n       y = [1, 2, 2]   (doesn't lie perfectly on a line)\n\nFit y = a + b*x  (linear regression)\n\nA = [ 1  1 ]   b = [ 1 ]\n    [ 1  2 ]       [ 2 ]\n    [ 1  3 ]       [ 2 ]\n\nNormal equation: A^T A theta = A^T b\n\nA^T A = [ 1  1  1 ] [ 1  1 ]   [ 3   6 ]\n        [ 1  2  3 ] [ 1  2 ] = [ 6  14 ]\n                    [ 1  3 ]\n\nA^T b = [ 1  1  1 ] [1]   [5]\n        [ 1  2  3 ] [2] = [11]\n                    [2]\n\nSolve [3  6 ][a]   [5 ]\n      [6  14][b] = [11]\n\nFrom row 1: a = (5 - 6b)/3\nSub in row 2: 6*(5-6b)/3 + 14b = 11\n              10 - 12b + 14b = 11\n              2b = 1  ->  b = 0.5\n              a = (5 - 3)/3 = 2/3 \u2248 0.667\n\nBest fit line: y = 0.667 + 0.5*x","tags":["#projection","#least-squares","#residual","#regression","#mml-ch3","#worked-example"]},{"e":"\ud83c\udf00","name":"Rotations in R^2 and R^3 \u2014 Step by Step","m":"bf","tldr":"Rotation matrix R rotates a vector by angle theta while preserving its length. In 2D: 2x2 matrix. In 3D: compose rotations around x, y, z axes. Key: R^T = R^-1 (transpose = inverse, very cheap).","code":"WORKED EXAMPLE \u2014 Rotate a vector 90 degrees in R^2\n\nRotation matrix for theta = 90 degrees:\n  R = [ cos(90)  -sin(90) ]   = [ 0  -1 ]\n      [ sin(90)   cos(90) ]     [ 1   0 ]\n\nRotate v = [3, 0] by 90 degrees:\n\n  R*v = [ 0  -1 ] [ 3 ]   [ 0*3 + (-1)*0 ]   [  0 ]\n        [ 1   0 ] [ 0 ] = [ 1*3 +   0*0  ] = [  3 ]\n\nv = [3, 0] rotated 90 degrees -> [0, 3]  \u2713\n(pointing right became pointing up)\n\nWORKED EXAMPLE \u2014 Rotate by 45 degrees\n\ncos(45) = sin(45) = 1/sqrt(2) \u2248 0.707\n\nR = [ 0.707  -0.707 ]\n    [ 0.707   0.707 ]\n\nRotate v = [1, 0]:\n  R*v = [ 0.707*1 + (-0.707)*0 ]   [ 0.707 ]\n        [ 0.707*1 +   0.707*0  ] = [ 0.707 ]\n\n[1, 0] rotated 45 degrees -> [0.707, 0.707]  \u2713\n(pointing right, now pointing up-right at 45 degrees)\n\nKEY PROPERTIES:\n  R^T R = I  (orthogonal: transpose is the inverse)\n  det(R) = 1  (preserves area/volume)\n  ||Rv|| = ||v||  (preserves length)\n\nSo to UNDO a rotation: just transpose R\n  R^-1 = R^T  (no matrix inversion needed!)\n\n3D rotation around z-axis by theta:\n  Rz = [ cos(t) -sin(t) 0 ]\n       [ sin(t)  cos(t) 0 ]\n       [   0       0    1 ]\n  (x and y rotate, z stays fixed)","tags":["#rotation","#rotation-matrix","#orthogonal","#mml-ch3","#worked-example"]},{"e":"\ud83e\udde9","name":"Positive Definite Matrices \u2014 Step by Step","m":"bf","tldr":"A symmetric matrix A is positive definite if x^T A x > 0 for every non-zero x. This means: all eigenvalues > 0, unique minimum when used as quadratic form, and valid inner product. Covariance matrices are always positive definite.","img":"x^T A x defines a bowl shape in space. Positive definite = the bowl always curves upward in every direction \u2014 there is a unique lowest point (minimum). If A has a negative eigenvalue, the bowl dips in some direction and the minimum disappears. This is why Hessians must be positive definite at minima.","code":"WORKED EXAMPLE \u2014 Check if A is positive definite\n\nA = [ 4  2 ]\n    [ 2  3 ]\n\nMETHOD 1: Check all eigenvalues > 0\n  det(A - lambda*I) = 0\n  det([ 4-lambda    2    ]) = (4-lambda)(3-lambda) - 4 = 0\n      [    2     3-lambda  ]\n  = lambda^2 - 7*lambda + 8 = 0\n  lambda = (7 +/- sqrt(49-32)) / 2\n         = (7 +/- sqrt(17)) / 2\n\n  lambda1 = (7 + 4.12) / 2 \u2248 5.56  > 0  \u2713\n  lambda2 = (7 - 4.12) / 2 \u2248 1.44  > 0  \u2713\n\n  Both eigenvalues positive -> A is positive definite \u2713\n\nMETHOD 2: Check x^T A x > 0 for a specific x\n  x = [1, 1]:\n  x^T A x = [1 1] [ 4  2 ] [1]\n                   [ 2  3 ] [1]\n           = [1 1] [4+2]  = [1 1] [6]\n                   [2+3]           [5]\n           = 1*6 + 1*5 = 11 > 0  \u2713\n\n  x = [2, -1]:\n  x^T A x = [2 -1] [4*2+2*(-1)]  = [2 -1] [6]\n                    [2*2+3*(-1)]           [1]\n           = 2*6 + (-1)*1 = 11 > 0  \u2713\n\nWORKED EXAMPLE \u2014 Mahalanobis distance\n  Standard Euclidean: d = sqrt((x-y)^T (x-y))\n  Mahalanobis:        d = sqrt((x-y)^T Sigma^-1 (x-y))\n\n  Sigma = covariance matrix (captures correlations)\n  Sigma^-1 normalizes by the data's natural spread\n\n  x=[5,2], y=[0,0], Sigma=[[4,0],[0,1]]\n  Sigma^-1 = [[0.25, 0], [0, 1]]\n  diff = [5, 2]\n  d = sqrt([5 2] [[0.25,0],[0,1]] [5])\n                                  [2]\n    = sqrt([5 2] [1.25])\n                 [2.0 ]\n    = sqrt(5*1.25 + 2*2) = sqrt(6.25+4) = sqrt(10.25) \u2248 3.2\n\n  Euclidean would give sqrt(25+4) = sqrt(29) \u2248 5.4\n  Mahalanobis accounts for x being \"spread out\" in dim 1","tags":["#positive-definite","#eigenvalues","#covariance","#mahalanobis","#mml-ch3","#worked-example"]},{"e":"\ud83d\udd17","name":"Everything Connects \u2014 MML to ML Algorithms","m":"bm","tldr":"Every concept from Ch2+Ch3 appears in ML algorithms. This card shows the direct connections: projection -> regression, inner product -> attention, orthogonality -> PCA, norm -> regularization.","code":"CONCEPT -> ML ALGORITHM\n\n1. SOLVING Ax=b (Ch2.1)\n   Linear regression: find w such that Xw \u2248 y\n   Normal equation: X^T X w = X^T y\n   Same structure, same Gaussian elimination\n\n2. PROJECTION (Ch3.7)\n   Least squares = project target y onto col(X)\n   Residual e = y - y_hat is perpendicular to col(X)\n   PCA = project data onto top eigenvectors\n\n3. DOT PRODUCT / INNER PRODUCT (Ch3.2)\n   Cosine similarity: sim(a,b) = a.b / (||a||*||b||)\n   Attention score: softmax(QK^T / sqrt(d)) * V\n   SVM: kernel = implicit inner product in high-dim space\n\n4. NORMS (Ch3.1)\n   Loss function: ||y - Xw||_2^2  (L2 = MSE)\n   Regularization: + lambda * ||w||_2^2  (Ridge)\n                   + lambda * ||w||_1    (Lasso, sparsity)\n\n5. ORTHOGONALITY (Ch3.4)\n   PCA: principal components are ORTHOGONAL\n        -> explained variances add up exactly\n   QR decomposition: factor A = QR\n                     Q orthogonal, R upper triangular\n\n6. POSITIVE DEFINITE (Ch3.2.3)\n   Covariance matrix MUST be PD (or PSD)\n   Hessian at a minimum MUST be PD\n   Kernel matrix MUST be PD\n   Gram matrix: K_ij = phi(x_i).phi(x_j) always PD\n\n7. RANK (Ch2.6)\n   rank(X) = effective dimensionality of your data\n   Low rank = data lies near a lower-dim subspace\n   SVD exploits this: X \u2248 U_k * Sigma_k * V_k^T\n   -> collaborative filtering, dimensionality reduction","tags":["#mml","#linear-algebra-ml","#connections","#pca","#regression","#attention"]}]}]},"exercises":{"icon":"lab","color":"#a78bfa","bg":"rgba(167,139,250,0.12)","title":"Hands-On GenAI Exercises","desc":"Step-by-step practical exercises: BERT classifier, fine-tuning LLMs, RAG pipeline, diffusion, LoRA. Each exercise builds end-to-end intuition \u2014 the fastest way to lock concepts into memory.","secs":[{"label":"Classification & fine-tuning","cards":[{"e":"\ud83c\udfac","name":"Exercise: BERT Sentiment Classifier (IMDB)","m":"bn","tldr":"Build a DistilBERT sentiment classifier on IMDB reviews. Steps: load dataset \u2192 tokenize \u2192 load pretrained model \u2192 freeze base layers \u2192 train classification head \u2192 evaluate. Core skill: transfer learning for NLP.","img":"You are hiring a general language expert (DistilBERT, pretrained on Wikipedia) and teaching them one new skill: deciding if a movie review is positive or negative. You freeze their general knowledge (base layers), only train their new judgment (classification head). 100x cheaper than training from scratch.","code":"# STEP 1: Install and import\n# pip install transformers datasets torch scikit-learn\n\nfrom datasets import load_dataset\nfrom transformers import (AutoTokenizer, AutoModelForSequenceClassification,\n                          TrainingArguments, Trainer)\nimport torch\nimport numpy as np\n\n# STEP 2: Load the IMDB dataset\ndataset = load_dataset(\"imdb\")\n# dataset[\"train\"] -> 25,000 reviews  {text: \"...\", label: 0/1}\n# dataset[\"test\"]  -> 25,000 reviews\nprint(dataset[\"train\"][0])  # peek at one example\n\n# STEP 3: Load tokenizer and preprocess\nMODEL = \"distilbert-base-uncased\"\ntokenizer = AutoTokenizer.from_pretrained(MODEL)\n\ndef preprocess(batch):\n    return tokenizer(\n        batch[\"text\"],\n        truncation=True,     # cut at max_length\n        padding=\"max_length\",\n        max_length=256,      # DistilBERT max is 512; 256 saves memory\n    )\n\ndataset = dataset.map(preprocess, batched=True)\ndataset = dataset.rename_column(\"label\", \"labels\")\ndataset.set_format(\"torch\", columns=[\"input_ids\",\"attention_mask\",\"labels\"])\n\n# STEP 4: Load model and FREEZE the base transformer\nmodel = AutoModelForSequenceClassification.from_pretrained(\n    MODEL, num_labels=2)\n\n# Freeze ALL DistilBERT layers except the classifier head\nfor name, param in model.named_parameters():\n    if \"classifier\" not in name:  # only train the classification head\n        param.requires_grad = False\n\n# Check trainable params\ntrainable = sum(p.numel() for p in model.parameters() if p.requires_grad)\ntotal     = sum(p.numel() for p in model.parameters())\nprint(f\"Trainable: {trainable:,} / {total:,} ({100*trainable/total:.1f}%)\")\n# Trainable: ~592 / 66,955,010 (0.001%) -- only the head!\n\n# STEP 5: Define metrics (pure PyTorch/NumPy, no sklearn)\ndef compute_metrics(eval_pred):\n    logits, labels = eval_pred\n    preds = np.argmax(logits, axis=-1)\n    accuracy = (preds == labels).mean()\n    return {\"accuracy\": float(accuracy)}\n\n# STEP 6: Configure training\nargs = TrainingArguments(\n    output_dir=\"./bert-imdb\",\n    num_train_epochs=3,\n    per_device_train_batch_size=32,\n    per_device_eval_batch_size=64,\n    eval_strategy=\"epoch\",\n    save_strategy=\"epoch\",\n    load_best_model_at_end=True,\n    learning_rate=2e-4,  # higher LR OK since only head trains\n    warmup_ratio=0.1,\n    logging_steps=100,\n    report_to=\"none\",\n)\n\n# STEP 7: Train\ntrainer = Trainer(\n    model=model,\n    args=args,\n    train_dataset=dataset[\"train\"],\n    eval_dataset=dataset[\"test\"],\n    compute_metrics=compute_metrics,\n)\ntrainer.train()\n\n# STEP 8: Evaluate\nresults = trainer.evaluate()\nprint(f\"Test accuracy: {results['eval_accuracy']:.3f}\")\n# Expected: ~92% accuracy with frozen base, 3 epochs\n\n# STEP 9: Manual evaluation loop with PyTorch (no sklearn)\nmodel.eval()\ncorrect = 0\ntotal = 0\nwith torch.no_grad():\n    for batch in DataLoader(dataset[\"test\"], batch_size=64):\n        input_ids = batch[\"input_ids\"].to(device)\n        attention_mask = batch[\"attention_mask\"].to(device)\n        labels = batch[\"labels\"].to(device)\n        outputs = model(input_ids=input_ids, attention_mask=attention_mask)\n        preds = torch.argmax(outputs.logits, dim=-1)\n        correct += (preds == labels).sum().item()\n        total += labels.size(0)\nprint(f\"Manual PyTorch accuracy: {correct/total:.3f}\")\n\n# STEP 9: Run inference\nfrom transformers import pipeline\nclf = pipeline(\"sentiment-analysis\",\n               model=model, tokenizer=tokenizer)\nprint(clf(\"This movie was absolutely fantastic!\"))\n# [{'label': 'LABEL_1', 'score': 0.998}]  -> positive","tags":["#bert","#distilbert","#sentiment","#imdb","#classification","#transfer-learning","#exercise"]},{"e":"\ud83d\udd25","name":"Exercise: Fine-Tune LLM with LoRA (Alpaca-style)","m":"bn","tldr":"Fine-tune Llama-3 (or similar) for instruction following using LoRA + SFTTrainer. Steps: load base model in 4-bit \u2192 attach LoRA adapters \u2192 format dataset as instruction-response pairs \u2192 train \u2192 merge and save.","img":"You take a general-purpose LLM (knows everything but follows no particular style) and teach it to answer in a specific way (your domain, your format). LoRA means you only add thin adapter layers \u2014 the original 8B params stay frozen. Training costs a fraction of full fine-tuning.","code":"# pip install transformers peft trl bitsandbytes datasets\n\nfrom transformers import AutoTokenizer, AutoModelForCausalLM, BitsAndBytesConfig\nfrom peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training\nfrom trl import SFTTrainer, SFTConfig\nfrom datasets import load_dataset\nimport torch\n\nMODEL = \"meta-llama/Llama-3.2-1B\"  # use 1B for laptop, 8B on GPU server\n\n# STEP 1: Load model in 4-bit (QLoRA)\nbnb_config = BitsAndBytesConfig(\n    load_in_4bit=True,\n    bnb_4bit_quant_type=\"nf4\",\n    bnb_4bit_compute_dtype=torch.bfloat16,\n    bnb_4bit_use_double_quant=True,\n)\nmodel = AutoModelForCausalLM.from_pretrained(\n    MODEL, quantization_config=bnb_config, device_map=\"auto\")\nmodel = prepare_model_for_kbit_training(model)\n\ntokenizer = AutoTokenizer.from_pretrained(MODEL)\ntokenizer.pad_token = tokenizer.eos_token\n\n# STEP 2: Attach LoRA adapters\nlora_config = LoraConfig(\n    r=16, lora_alpha=32,\n    target_modules=[\"q_proj\",\"v_proj\",\"k_proj\",\"o_proj\"],\n    lora_dropout=0.05, bias=\"none\",\n    task_type=\"CAUSAL_LM\",\n)\nmodel = get_peft_model(model, lora_config)\nmodel.print_trainable_parameters()  # ~0.7% of total params\n\n# STEP 3: Load and format dataset\ndataset = load_dataset(\"tatsu-lab/alpaca\", split=\"train[:5000]\")\n\ndef format_instruction(sample):\n    if sample[\"input\"]:\n        return (f\"### Instruction:\n{sample['instruction']}\n\n\"\n                f\"### Input:\n{sample['input']}\n\n\"\n                f\"### Response:\n{sample['output']}\")\n    return (f\"### Instruction:\n{sample['instruction']}\n\n\"\n            f\"### Response:\n{sample['output']}\")\n\n# STEP 4: Train with SFTTrainer\ntrainer = SFTTrainer(\n    model=model,\n    tokenizer=tokenizer,\n    train_dataset=dataset,\n    args=SFTConfig(\n        output_dir=\"./llama-alpaca-lora\",\n        num_train_epochs=3,\n        per_device_train_batch_size=4,\n        gradient_accumulation_steps=4,\n        learning_rate=2e-4,\n        lr_scheduler_type=\"cosine\",\n        warmup_ratio=0.05,\n        max_seq_length=512,\n        report_to=\"none\",\n    ),\n    formatting_func=format_instruction,\n    packing=True,  # pack multiple short examples into one sequence\n)\ntrainer.train()\n\n# STEP 5: Merge LoRA into base model and save\nmerged = model.merge_and_unload()\nmerged.save_pretrained(\"./llama-alpaca-merged\")\ntokenizer.save_pretrained(\"./llama-alpaca-merged\")\n\n# STEP 6: Inference\nfrom transformers import pipeline\ngen = pipeline(\"text-generation\", model=merged, tokenizer=tokenizer)\noutput = gen(\"### Instruction:\nExplain gradient descent\n\n### Response:\n\",\n             max_new_tokens=200, do_sample=False)\nprint(output[0][\"generated_text\"])","tags":["#lora","#qlora","#fine-tuning","#llama","#sft","#alpaca","#exercise"]},{"e":"\ud83c\udfc6","name":"Exercise: Full Fine-Tune BERT \u2014 Unfreeze All Layers","m":"bn","tldr":"Same IMDB setup but unfreeze ALL layers with discriminative learning rates: low LR for early layers (preserve general features), higher LR for later layers (adapt to sentiment). Gets 93-94% vs 92% with frozen base.","code":"# Building on the frozen-base exercise above\n# Change: unfreeze everything with layer-wise learning rates\n\nfrom transformers import AutoModelForSequenceClassification\nmodel = AutoModelForSequenceClassification.from_pretrained(\n    \"distilbert-base-uncased\", num_labels=2)\n\n# Discriminative learning rates: earlier layers = lower LR\n# DistilBERT has 6 transformer layers (0-5)\n# Layer 0 = most general (grammar), Layer 5 = most task-specific\n\noptimizer_grouped = [\n    # Embedding layer: very small LR (very general features)\n    {\"params\": model.distilbert.embeddings.parameters(),\n     \"lr\": 1e-5},\n    # Lower transformer layers (0-2): small LR\n    {\"params\": [p for i in range(3)\n                for p in model.distilbert.transformer.layer[i].parameters()],\n     \"lr\": 2e-5},\n    # Upper transformer layers (3-5): medium LR\n    {\"params\": [p for i in range(3, 6)\n                for p in model.distilbert.transformer.layer[i].parameters()],\n     \"lr\": 3e-5},\n    # Classification head: highest LR (task-specific, train from scratch)\n    {\"params\": model.classifier.parameters(),\n     \"lr\": 1e-4},\n]\n\nimport torch\noptimizer = torch.optim.AdamW(optimizer_grouped, weight_decay=0.01)\n\n# Use same Trainer setup as before but pass custom optimizer\nfrom transformers import TrainingArguments, Trainer\n\nargs = TrainingArguments(\n    output_dir=\"./bert-imdb-fullft\",\n    num_train_epochs=5,     # more epochs since more params to adapt\n    per_device_train_batch_size=16,\n    eval_strategy=\"epoch\",\n    load_best_model_at_end=True,\n    report_to=\"none\",\n)\n\ntrainer = Trainer(\n    model=model, args=args,\n    train_dataset=dataset[\"train\"],\n    eval_dataset=dataset[\"test\"],\n    compute_metrics=compute_metrics,\n    optimizers=(optimizer, None),  # pass custom optimizer\n)\ntrainer.train()\n# Expected: ~93.5% accuracy\n# Frozen head: ~92%  |  Full fine-tune with disc LR: ~93.5%\n# Small gain, but shows discriminative LR technique","tags":["#bert","#full-fine-tuning","#discriminative-lr","#imdb","#exercise"]}]},{"label":"RAG & retrieval","cards":[{"e":"\ud83d\udd0d","name":"Exercise: Build a RAG Pipeline from Scratch","m":"bn","tldr":"Build a full RAG system: load documents \u2192 chunk \u2192 embed \u2192 store in vector DB \u2192 retrieve \u2192 generate answer. Use LangChain + pgvector (or Chroma for local). Core skill: grounding LLM answers in your own data.","code":"# pip install langchain langchain-openai chromadb pypdf\n\nfrom langchain_community.document_loaders import PyPDFLoader\nfrom langchain.text_splitter import RecursiveCharacterTextSplitter\nfrom langchain_openai import OpenAIEmbeddings, ChatOpenAI\nfrom langchain_community.vectorstores import Chroma\nfrom langchain.chains import RetrievalQA\nfrom langchain.prompts import PromptTemplate\n\n# STEP 1: Load documents\nloader = PyPDFLoader(\"your_document.pdf\")\ndocs = loader.load()\nprint(f\"Loaded {len(docs)} pages\")\n\n# STEP 2: Split into chunks\nsplitter = RecursiveCharacterTextSplitter(\n    chunk_size=512,      # characters per chunk\n    chunk_overlap=64,    # overlap to preserve context at boundaries\n    separators=[\"\n\n\", \"\n\", \".\", \"?\", \"!\"],  # split on these, in order\n)\nchunks = splitter.split_documents(docs)\nprint(f\"Created {len(chunks)} chunks\")\n# Inspect a chunk\nprint(chunks[0].page_content[:200])\n\n# STEP 3: Embed and store\nembeddings = OpenAIEmbeddings(model=\"text-embedding-3-small\")\nvectorstore = Chroma.from_documents(\n    documents=chunks,\n    embedding=embeddings,\n    persist_directory=\"./chroma_db\",  # saves to disk\n)\nprint(f\"Stored {vectorstore._collection.count()} vectors\")\n\n# STEP 4: Test retrieval before generation\nquery = \"What is the main conclusion of this document?\"\nretrieved = vectorstore.similarity_search(query, k=4)\nfor i, doc in enumerate(retrieved):\n    print(f\"\n--- Chunk {i+1} (score: relevant) ---\")\n    print(doc.page_content[:300])\n\n# STEP 5: Build retrieval QA chain\nllm = ChatOpenAI(model=\"gpt-4o-mini\", temperature=0)\n\nprompt = PromptTemplate(\n    input_variables=[\"context\", \"question\"],\n    template=\"\"\"Answer based ONLY on this context. If the answer is not\nin the context, say \"I don't know\".\n\nContext:\n{context}\n\nQuestion: {question}\nAnswer:\"\"\"\n)\n\nqa_chain = RetrievalQA.from_chain_type(\n    llm=llm,\n    chain_type=\"stuff\",          # stuff all chunks into one prompt\n    retriever=vectorstore.as_retriever(\n        search_type=\"mmr\",       # max marginal relevance: diverse results\n        search_kwargs={\"k\": 4, \"fetch_k\": 20}\n    ),\n    chain_type_kwargs={\"prompt\": prompt},\n    return_source_documents=True,\n)\n\n# STEP 6: Query the RAG system\nresult = qa_chain.invoke({\"query\": \"What is the main conclusion?\"})\nprint(\"Answer:\", result[\"result\"])\nprint(\"\nSources:\")\nfor doc in result[\"source_documents\"]:\n    print(f\"  Page {doc.metadata.get('page', '?')}: {doc.page_content[:100]}\")\n\n# STEP 7: Evaluate (did we retrieve the right chunks?)\n# Check: is the answer actually supported by the retrieved context?\n# Manual inspection is the best first evaluation","tags":["#rag","#langchain","#chroma","#embeddings","#retrieval","#exercise"]}]},{"label":"Generative models","cards":[{"e":"\ud83c\udfa8","name":"Exercise: Image Generation with Stable Diffusion","m":"bn","tldr":"Generate images with Stable Diffusion: load pipeline \u2192 basic generation \u2192 negative prompts \u2192 seed control \u2192 ControlNet with edge map \u2192 img2img. Core skill: understanding CFG, steps, and how conditioning works.","code":"# pip install diffusers transformers accelerate torch\n\nfrom diffusers import (StableDiffusionPipeline,\n                       StableDiffusionImg2ImgPipeline,\n                       ControlNetModel,\n                       StableDiffusionControlNetPipeline)\nimport torch\nfrom PIL import Image\n\ndevice = \"cuda\" if torch.cuda.is_available() else \"cpu\"\n\n# STEP 1: Basic text-to-image\npipe = StableDiffusionPipeline.from_pretrained(\n    \"runwayml/stable-diffusion-v1-5\",\n    torch_dtype=torch.float16,\n).to(device)\n\n# Memory optimization (essential for consumer GPUs)\npipe.enable_attention_slicing()\npipe.enable_vae_slicing()\n\n# STEP 2: Generate with a seed (reproducible)\ngenerator = torch.Generator(device).manual_seed(42)\nimage = pipe(\n    prompt=\"a futuristic city at night, neon lights, photorealistic, 4k\",\n    negative_prompt=\"blurry, deformed, ugly, low quality, text, watermark\",\n    num_inference_steps=30,   # more steps = higher quality, slower\n    guidance_scale=7.5,       # CFG: higher = more prompt-adherent, less creative\n    width=512, height=512,\n    generator=generator,\n).images[0]\nimage.save(\"output.png\")\n\n# STEP 3: Experiment with guidance_scale\n# guidance_scale=1:  ignore prompt almost entirely (creative chaos)\n# guidance_scale=7:  balanced (default)\n# guidance_scale=15: very literal to prompt (less creative)\nfor cfg in [3, 7, 12]:\n    img = pipe(prompt=\"a red apple on a wooden table\",\n               guidance_scale=cfg,\n               generator=torch.Generator(device).manual_seed(42)).images[0]\n    img.save(f\"cfg_{cfg}.png\")\n\n# STEP 4: Img2Img (transform an existing image)\nimg2img = StableDiffusionImg2ImgPipeline(**pipe.components)\ninit_image = Image.open(\"photo.jpg\").resize((512, 512))\n\nresult = img2img(\n    prompt=\"oil painting style, impressionist\",\n    image=init_image,\n    strength=0.7,  # 0=keep original, 1=ignore original completely\n    guidance_scale=7.5,\n).images[0]\nresult.save(\"transformed.png\")\n\n# STEP 5: ControlNet (spatial control with edge map)\nfrom controlnet_aux import CannyDetector\ncanny = CannyDetector()\nedge_image = canny(init_image, low_threshold=100, high_threshold=200)\n\ncontrolnet = ControlNetModel.from_pretrained(\n    \"lllyasviel/sd-controlnet-canny\", torch_dtype=torch.float16)\npipe_cnet = StableDiffusionControlNetPipeline.from_pretrained(\n    \"runwayml/stable-diffusion-v1-5\",\n    controlnet=controlnet, torch_dtype=torch.float16).to(device)\n\nresult = pipe_cnet(\n    prompt=\"a robot in the same pose, cyberpunk style\",\n    image=edge_image,\n    controlnet_conditioning_scale=0.8,  # strength of edge control\n    num_inference_steps=30,\n).images[0]\nresult.save(\"controlled.png\")","tags":["#stable-diffusion","#diffusers","#controlnet","#img2img","#cfg","#exercise"]},{"e":"\ud83e\udd16","name":"Exercise: Build a Multi-Turn Chatbot with Memory","m":"bn","tldr":"Build a chatbot using the Anthropic API with: conversation history management, system prompt, streaming output, token counting, and context window management (summarize when too long).","code":"import anthropic\n\nclient = anthropic.Anthropic()\nMODEL = \"claude-sonnet-4-20250514\"\nMAX_TOKENS_HISTORY = 8000  # summarize when history exceeds this\n\n# STEP 1: Define the chatbot class\nclass Chatbot:\n    def __init__(self, system_prompt):\n        self.system = system_prompt\n        self.history = []\n        self.total_tokens = 0\n\n    def chat(self, user_message: str) -> str:\n        self.history.append({\"role\": \"user\", \"content\": user_message})\n\n        # STEP 2: Check if we need to compress history\n        if self.total_tokens > MAX_TOKENS_HISTORY:\n            self._compress_history()\n\n        # STEP 3: Stream the response\n        full_response = \"\"\n        with client.messages.stream(\n            model=MODEL,\n            max_tokens=1024,\n            system=self.system,\n            messages=self.history,\n        ) as stream:\n            for text in stream.text_stream:\n                print(text, end=\"\", flush=True)\n                full_response += text\n        print()  # newline after streaming\n\n        # STEP 4: Update history and token count\n        self.history.append({\"role\": \"assistant\", \"content\": full_response})\n        usage = stream.get_final_message().usage\n        self.total_tokens += usage.input_tokens + usage.output_tokens\n        print(f\"[tokens used this turn: {usage.input_tokens + usage.output_tokens}]\")\n        return full_response\n\n    def _compress_history(self):\n        \"\"\"Summarize old history to save context window\"\"\"\n        if len(self.history) < 4:\n            return\n        # Keep first 2 and last 2 messages, summarize middle\n        to_summarize = self.history[2:-2]\n        summary_prompt = (\n            \"Summarize this conversation in 3-4 sentences:\n\"\n            + \"\n\".join(f\"{m['role']}: {m['content']}\" for m in to_summarize)\n        )\n        summary = client.messages.create(\n            model=\"claude-haiku-3-5-20251022\",  # cheap model for summarization\n            max_tokens=300,\n            messages=[{\"role\": \"user\", \"content\": summary_prompt}]\n        ).content[0].text\n\n        # Replace middle messages with summary\n        self.history = (self.history[:2]\n            + [{\"role\": \"assistant\", \"content\": f\"[Summary: {summary}]\"}]\n            + self.history[-2:])\n        self.total_tokens = 0  # reset estimate\n\n# STEP 5: Run the chatbot\nbot = Chatbot(system_prompt=\"\"\"You are a helpful ML tutor.\nExplain concepts clearly, give examples, ask follow-up questions.\"\"\")\n\nprint(\"Chatbot ready. Type 'quit' to exit.\n\")\nwhile True:\n    user_input = input(\"You: \").strip()\n    if user_input.lower() == \"quit\":\n        break\n    if not user_input:\n        continue\n    print(\"Bot: \", end=\"\")\n    bot.chat(user_input)\n    print()","tags":["#chatbot","#anthropic-api","#streaming","#memory","#context-window","#exercise"]},{"e":"\ud83e\uddec","name":"Exercise: Train a VAE on MNIST","m":"bn","tldr":"Build a Variational Autoencoder from scratch: encoder maps images to (mu, logvar) \u2192 reparameterize to sample z \u2192 decoder reconstructs image. Train with ELBO loss = reconstruction + KL divergence. Then generate new digits by sampling z.","code":"import torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import DataLoader\nfrom torchvision import datasets, transforms\nimport matplotlib.pyplot as plt\n\n# STEP 1: Define the VAE architecture\nclass VAE(nn.Module):\n    def __init__(self, latent_dim=16):\n        super().__init__()\n        self.latent_dim = latent_dim\n\n        # Encoder: image -> (mu, logvar)\n        self.encoder = nn.Sequential(\n            nn.Flatten(),\n            nn.Linear(784, 400), nn.ReLU(),\n            nn.Linear(400, 200), nn.ReLU(),\n        )\n        self.fc_mu     = nn.Linear(200, latent_dim)\n        self.fc_logvar = nn.Linear(200, latent_dim)\n\n        # Decoder: z -> image\n        self.decoder = nn.Sequential(\n            nn.Linear(latent_dim, 200), nn.ReLU(),\n            nn.Linear(200, 400),        nn.ReLU(),\n            nn.Linear(400, 784),        nn.Sigmoid(),\n        )\n\n    def encode(self, x):\n        h = self.encoder(x)\n        return self.fc_mu(h), self.fc_logvar(h)\n\n    def reparameterize(self, mu, logvar):\n        # Trick: sample z = mu + eps*std  (differentiable!)\n        std = torch.exp(0.5 * logvar)\n        eps = torch.randn_like(std)\n        return mu + eps * std\n\n    def decode(self, z):\n        return self.decoder(z).view(-1, 1, 28, 28)\n\n    def forward(self, x):\n        mu, logvar = self.encode(x)\n        z = self.reparameterize(mu, logvar)\n        recon = self.decode(z)\n        return recon, mu, logvar\n\n# STEP 2: ELBO loss = reconstruction + KL\ndef vae_loss(recon_x, x, mu, logvar, beta=1.0):\n    # Reconstruction: how well did we reconstruct? (per pixel BCE)\n    recon_loss = F.binary_cross_entropy(recon_x, x, reduction=\"sum\")\n\n    # KL: how close is q(z|x) to prior N(0,I)?\n    # KL = -0.5 * sum(1 + logvar - mu^2 - exp(logvar))\n    kl_loss = -0.5 * torch.sum(1 + logvar - mu.pow(2) - logvar.exp())\n\n    return (recon_loss + beta * kl_loss) / x.size(0)  # per sample\n\n# STEP 3: Load data and train\ntransform = transforms.Compose([transforms.ToTensor()])\ntrain_data = datasets.MNIST(\"./data\", train=True,  download=True, transform=transform)\ntest_data  = datasets.MNIST(\"./data\", train=False, download=True, transform=transform)\n\ntrain_loader = DataLoader(train_data, batch_size=128, shuffle=True)\ntest_loader  = DataLoader(test_data,  batch_size=128)\n\ndevice = \"cuda\" if torch.cuda.is_available() else \"cpu\"\nmodel  = VAE(latent_dim=16).to(device)\noptim  = torch.optim.Adam(model.parameters(), lr=1e-3)\n\nfor epoch in range(20):\n    model.train()\n    train_loss = 0\n    for x, _ in train_loader:\n        x = x.to(device)\n        recon, mu, logvar = model(x)\n        loss = vae_loss(recon, x, mu, logvar)\n        optim.zero_grad(); loss.backward(); optim.step()\n        train_loss += loss.item()\n    print(f\"Epoch {epoch+1}: loss={train_loss/len(train_loader):.3f}\")\n\n# STEP 4: Generate new digits by sampling z ~ N(0,I)\nmodel.eval()\nwith torch.no_grad():\n    z = torch.randn(16, 16).to(device)  # 16 random latent vectors\n    samples = model.decode(z).cpu()\n\nfig, axes = plt.subplots(4, 4, figsize=(6,6))\nfor i, ax in enumerate(axes.flat):\n    ax.imshow(samples[i].squeeze(), cmap=\"gray\"); ax.axis(\"off\")\nplt.savefig(\"vae_samples.png\")  # should show digit-like images\n\n# STEP 5: Interpolate between two digits in latent space\nx1, x2 = test_data[0][0].unsqueeze(0), test_data[1][0].unsqueeze(0)\nwith torch.no_grad():\n    mu1, _ = model.encode(x1.to(device))\n    mu2, _ = model.encode(x2.to(device))\n    # Interpolate: z = (1-t)*z1 + t*z2\n    interps = [model.decode((1-t)*mu1 + t*mu2).cpu()\n               for t in torch.linspace(0, 1, 8)]","tags":["#vae","#mnist","#generative","#elbo","#reparameterization","#exercise"]}]},{"label":"Agents & orchestration","cards":[{"e":"\ud83d\udd75\ufe0f","name":"Exercise: Build a ReAct Agent with Tools","m":"bn","tldr":"Build a ReAct agent using the Anthropic API with tool use: define tools (web search, calculator, code runner) \u2192 agent reasons \u2192 calls tools \u2192 observes results \u2192 reasons again \u2192 gives final answer.","code":"import anthropic, json, math\n\nclient = anthropic.Anthropic()\n\n# STEP 1: Define tools the agent can use\ntools = [\n    {\n        \"name\": \"calculator\",\n        \"description\": \"Evaluate a mathematical expression. Returns the numeric result.\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\n                \"expression\": {\n                    \"type\": \"string\",\n                    \"description\": \"Math expression, e.g. '2 ** 10' or 'math.sqrt(144)'\"\n                }\n            },\n            \"required\": [\"expression\"]\n        }\n    },\n    {\n        \"name\": \"get_weather\",\n        \"description\": \"Get current weather for a city.\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\n                \"city\": {\"type\": \"string\"}\n            },\n            \"required\": [\"city\"]\n        }\n    }\n]\n\n# STEP 2: Tool executor (your actual implementations)\ndef execute_tool(name: str, inputs: dict) -> str:\n    if name == \"calculator\":\n        try:\n            result = eval(inputs[\"expression\"], {\"math\": math, \"__builtins__\": {}})\n            return str(result)\n        except Exception as e:\n            return f\"Error: {e}\"\n    elif name == \"get_weather\":\n        # Mock implementation; replace with real API\n        return f\"Weather in {inputs['city']}: 22 degrees, partly cloudy\"\n    return f\"Unknown tool: {name}\"\n\n# STEP 3: ReAct loop\ndef run_agent(user_message: str) -> str:\n    messages = [{\"role\": \"user\", \"content\": user_message}]\n    print(f\"User: {user_message}\n\")\n\n    while True:\n        # Agent thinks and optionally calls a tool\n        response = client.messages.create(\n            model=\"claude-sonnet-4-20250514\",\n            max_tokens=1024,\n            tools=tools,\n            messages=messages,\n        )\n\n        # Print agent reasoning (text blocks)\n        for block in response.content:\n            if hasattr(block, \"text\"):\n                print(f\"Agent thinks: {block.text}\")\n\n        # If no tool call -> we have the final answer\n        if response.stop_reason == \"end_turn\":\n            final = next(b.text for b in response.content if hasattr(b,\"text\"))\n            print(f\"\nFinal answer: {final}\")\n            return final\n\n        # Process tool calls\n        messages.append({\"role\": \"assistant\", \"content\": response.content})\n        tool_results = []\n\n        for block in response.content:\n            if block.type == \"tool_use\":\n                print(f\"\nCalling tool: {block.name}({block.input})\")\n                result = execute_tool(block.name, block.input)\n                print(f\"Tool result: {result}\")\n                tool_results.append({\n                    \"type\": \"tool_result\",\n                    \"tool_use_id\": block.id,\n                    \"content\": result,\n                })\n\n        messages.append({\"role\": \"user\", \"content\": tool_results})\n\n# STEP 4: Test the agent\nrun_agent(\"What is 2^32, and what is the square root of that?\")\nrun_agent(\"What is the weather in Santiago, and should I bring a jacket?\")","tags":["#react-agent","#tool-use","#anthropic-api","#agentic","#exercise"]}]},{"label":"GPT From Scratch \u2014 Full Annotated Walkthrough","cards":[{"e":"\ud83e\udde0","name":"GPT From Scratch \u2014 Architecture Overview","m":"bn","tldr":"A minimal GPT has 4 parts: token embedding, positional embedding, N transformer blocks, decoder head. Input = token IDs. Output = logits over vocabulary. Loss = cross entropy against next tokens. Everything else is just these 4 parts stacked.","img":"GPT is a pipeline. Raw token IDs go in the left side. Logits over the vocabulary come out the right side. Inside: a lookup table converts IDs to vectors, position info is added, N transformer blocks process the sequence, a final linear layer expands back to vocab size. Training = minimize prediction error. Generation = sample from output probabilities repeatedly.","code":"ANATOMY OF MINIMAL GPT\n\nclass GPT(nn.Module):\n    def __init__(self, config):\n        super().__init__()\n\n        # PART 1: INPUT EMBEDDING STEM\n        self.tok_emb = nn.Embedding(config.vocab_size, config.n_embd)\n        #   Lookup table: vocab_size rows, each row is n_embd-dim vector\n        #   config.vocab_size = 50257 (GPT-2)\n        #   config.n_embd     = 768   (GPT-2 small)\n        #   Parameters: 50257 * 768 = 38.6M  <- huge chunk of model params\n\n        self.pos_embd = nn.Parameter(torch.zeros(1, config.block_size, config.n_embd))\n        #   Learned position embeddings (NOT sinusoidal like original Transformer)\n        #   Shape: [1, block_size, n_embd]\n        #   The 1 in dim 0 = will broadcast across batch dimension\n        #   config.block_size = 1024  (max sequence length GPT-2 can handle)\n        #   Initialized to ZEROS, learned during training\n\n        self.drop = nn.Dropout(config.embd_pdrop)\n        #   Dropout after adding token + position embeddings\n        #   Regularization: randomly zero some embedding values during training\n        #   config.embd_pdrop = 0.1 typically\n\n        # PART 2: TRANSFORMER BLOCKS (the actual computation)\n        self.blocks = nn.Sequential(*[Block(config) for _ in range(config.n_layer)])\n        #   Stack N identical transformer blocks\n        #   config.n_layer = 12 (GPT-2 small), 96 (GPT-3)\n        #   Each Block = LayerNorm + MultiHeadSelfAttention + LayerNorm + FFN\n        #   nn.Sequential: output of block i feeds directly into block i+1\n\n        # PART 3: DECODER HEAD\n        self.ln_f = nn.LayerNorm(config.n_embd)\n        #   Final layer norm BEFORE the linear projection\n        #   Stabilizes the output of the last transformer block\n\n        self.head = nn.Linear(config.n_embd, config.vocab_size, bias=False)\n        #   Projects from n_embd -> vocab_size\n        #   Shape: [n_embd, vocab_size] = [768, 50257]\n        #   bias=False: common in modern LLMs, saves params\n        #   Output = logits (raw unnormalized scores, one per vocab token)\n        #   NOTE: no softmax here! Loss function handles that\n\n        # PART 4: INITIALIZATION\n        self.apply(self._init_weights)\n        #   Apply weight init to ALL submodules recursively\n        #   Normal(mean=0, std=0.02) for Linear and Embedding weights\n        #   Zeros for biases, Ones for LayerNorm weights\n        #   std=0.02 is empirically good for transformer training stability\n\nCONFIG REFERENCE:\n  config.vocab_size  = 50257   # GPT-2 BPE vocabulary\n  config.n_embd      = 768     # embedding dimension (GPT-2 small)\n  config.block_size  = 1024    # max context length\n  config.n_layer     = 12      # number of transformer blocks\n  config.n_head      = 12      # attention heads per block\n  config.embd_pdrop  = 0.1     # dropout rate","tags":["#gpt","#architecture","#transformer","#embedding","#decoder-head","#karpathy"]},{"e":"\u26a1","name":"GPT From Scratch \u2014 Forward Pass Line by Line","m":"bn","tldr":"Forward pass: token IDs -> token embeddings -> add position embeddings -> dropout -> N transformer blocks -> final LayerNorm -> linear head -> logits. If targets given: compute cross entropy loss. This is the entire forward pass of GPT.","img":"Assembly line. Raw token IDs (integers) arrive. Station 1: look up each ID in the embedding table, get a vector. Station 2: add position information. Station 3: blur randomly (dropout). Stations 4-15: 12 transformer blocks each refine the representations. Station 16: normalize. Station 17: project to vocabulary scores. Optional: compare to correct answers, compute loss.","code":"def forward(self, idx, targets=None):\n    b, t = idx.size()\n    # idx shape: [batch_size, sequence_length]\n    # b = batch size (how many sequences in parallel)\n    # t = current sequence length (number of tokens)\n    # Example: b=4, t=128 means 4 sequences of 128 tokens each\n\n    assert t <= self.block_size\n    # Safety check: sequence must fit in context window\n    # t=1025 with block_size=1024 -> crash (intended)\n\n    # STEP 1: TOKEN EMBEDDINGS\n    token_embeddings = self.tok_emb(idx)\n    # idx: [b, t]  (integer token IDs)\n    # tok_emb: lookup table [vocab_size, n_embd]\n    # token_embeddings: [b, t, n_embd]\n    # Each integer ID gets replaced by its learned n_embd-dim vector\n    # Example: token 42 (\"cat\") -> [0.21, -0.43, 0.87, ..., 0.12]\n\n    # STEP 2: POSITIONAL EMBEDDINGS\n    position_embeddings = self.pos_embd[:, :t, :]\n    # pos_embd shape: [1, block_size, n_embd]\n    # Slice to current length: [1, t, n_embd]\n    # The :t slice ensures we only use the first t position vectors\n    # If generating token by token, t grows from 1 to block_size\n\n    # STEP 3: COMBINE AND DROPOUT\n    x = self.drop(token_embeddings + position_embeddings)\n    # Addition: [b, t, n_embd] + [1, t, n_embd] -> [b, t, n_embd]\n    # Broadcasting: pos_embd's batch dim 1 broadcasts to b\n    # Each token embedding gets its corresponding position embedding added\n    # Same position embedding added to ALL sequences in the batch\n    # Dropout: randomly zero some values -> prevents co-adaptation\n\n    # STEP 4: TRANSFORMER BLOCKS\n    x = self.blocks(x)\n    # x passes through each Block sequentially\n    # Shape stays [b, t, n_embd] throughout (residual connections!)\n    # Each block attends, mixes, and refines the representations\n    # After 12 blocks: each token \"knows\" about every other token\n\n    # STEP 5: FINAL LAYER NORM\n    x = self.ln_f(x)\n    # Normalize: zero mean, unit variance per token per dim\n    # Stabilizes the input to the linear head\n    # Shape still [b, t, n_embd]\n\n    # STEP 6: PROJECT TO VOCAB (the \"head\")\n    logits = self.head(x)\n    # Linear: [b, t, n_embd] @ [n_embd, vocab_size] -> [b, t, vocab_size]\n    # Each of the t positions gets a score for EVERY vocab token\n    # These are raw unnormalized scores (logits), NOT probabilities\n    # No softmax yet!\n\n    # STEP 7: OPTIONAL LOSS (training only)\n    if targets is not None:\n        loss = F.cross_entropy(\n            logits.view(-1, logits.size(-1)),\n            # reshape: [b, t, vocab_size] -> [b*t, vocab_size]\n            # Flatten batch and time dims into one big batch\n\n            targets.view(-1),\n            # reshape: [b, t] -> [b*t]\n            # targets[i] = what the correct next token is at position i\n\n            ignore_index=-1\n            # Skip positions where target=-1 (padding tokens)\n        )\n    else:\n        loss = None\n    # During training: targets = idx shifted by 1 (next-token prediction)\n    # idx:     [The, cat, sat, on]\n    # targets: [cat, sat, on,  mat]\n\n    return logits, loss\n\nSHAPES SUMMARY:\n  idx:               [b, t]\n  token_embeddings:  [b, t, n_embd]\n  position_embeddings: [1, t, n_embd]  broadcast to [b, t, n_embd]\n  x after blocks:    [b, t, n_embd]\n  logits:            [b, t, vocab_size]\n  loss:              scalar (mean over all b*t positions)","tags":["#gpt","#forward-pass","#cross-entropy","#logits","#teacher-forcing","#shapes"]},{"e":"\ud83c\udfb2","name":"GPT From Scratch \u2014 Generation Loop Line by Line","m":"bn","tldr":"Generation = a loop. Each iteration: crop sequence to block_size -> forward pass -> take last position logits -> scale by temperature -> optionally top-k -> softmax -> sample one token -> append -> repeat. Stop at max_new_tokens or stop token.","img":"Writing a story one word at a time. You read everything you wrote so far (the context), predict the next word probabilities, roll the dice weighted by those probabilities, write that word, then read everything again including the new word, predict the next, repeat. The model never looks ahead, only backward.","code":"@torch.no_grad()\ndef generate(self, idx, max_new_tokens, temperature=1.0, top_k=None, stop_tokens=None):\n    # @torch.no_grad(): disable gradient computation during inference\n    #   Training builds a computation graph for backprop (memory expensive)\n    #   Inference just needs the forward pass result, not the graph\n    #   This makes generation ~2x faster and uses much less memory\n\n    # idx: [b, t]  starting sequence (the prompt as token IDs)\n    # max_new_tokens: how many tokens to generate\n    # temperature: controls randomness (1.0=default, 0.0=greedy)\n    # top_k: if set, only sample from top k most likely tokens\n    # stop_tokens: stop generation if any of these tokens are produced\n\n    for _ in range(max_new_tokens):\n\n        # STEP 1: CROP CONTEXT TO BLOCK_SIZE\n        idx_cond = idx if idx.size(1) <= self.block_size                        else idx[:, -self.block_size:]\n        # Problem: as we generate, idx grows beyond block_size\n        # Solution: always feed the LAST block_size tokens\n        # Example: block_size=1024, idx has 1500 tokens\n        #   -> feed tokens [476:1500], discard [0:476]\n        # Note: model loses memory of very early context (sliding window)\n\n        # STEP 2: FORWARD PASS\n        logits, _ = self(idx_cond)\n        # logits shape: [b, t, vocab_size]\n        # We only care about the LAST time step (predicting next token)\n        # _ = loss (None since we pass no targets)\n\n        # STEP 3: TAKE LAST POSITION AND SCALE BY TEMPERATURE\n        logits = logits[:, -1, :] / temperature\n        # [:, -1, :] -> shape: [b, vocab_size]\n        # -1 index = the last token position = predicting what comes NEXT\n        # / temperature:\n        #   temperature=1.0: unchanged\n        #   temperature=0.5: divide logits by 0.5 = double them = sharper dist\n        #   temperature=2.0: divide by 2 = halve them = flatter dist\n        #   temperature->0:  logits->inf for max, softmax->one_hot = greedy\n\n        # STEP 4: TOP-K FILTERING (optional)\n        if top_k is not None:\n            v, _ = torch.topk(logits, top_k)\n            # v: [b, top_k]  the top_k largest logit values\n            # v[:, [-1]]: [b, 1]  the SMALLEST of the top_k values (threshold)\n            logits[logits < v[:, [-1]]] = -float(\"Inf\")\n            # Set all logits below threshold to -infinity\n            # After softmax: -inf -> 0 probability\n            # Effect: only the top_k tokens get any probability mass\n            # Example top_k=50: 50,207 tokens get probability 0\n\n        # STEP 5: SOFTMAX -> PROBABILITIES\n        probs = F.softmax(logits, dim=-1)\n        # Convert logits to probabilities: exp(x_i) / sum(exp(x_j))\n        # dim=-1: softmax across vocab dimension\n        # probs: [b, vocab_size], each row sums to 1.0\n        # probs[0, 42] = 0.15 means 15% chance of token 42 next\n\n        # STEP 6: SAMPLE ONE TOKEN\n        idx_next = torch.multinomial(probs, num_samples=1)\n        # multinomial: sample from categorical distribution\n        # num_samples=1: draw exactly one token\n        # idx_next: [b, 1]  one token ID per sequence in batch\n        # If probs = [0.7, 0.2, 0.1]: samples token 0 70% of the time\n        # top_k=1 + multinomial = greedy (always picks max prob token)\n\n        # STEP 7: APPEND TO SEQUENCE\n        idx = torch.cat((idx, idx_next), dim=1)\n        # Concatenate along sequence dimension\n        # idx: [b, t] -> [b, t+1]\n        # This new token becomes part of the context for the next iteration\n\n        # STEP 8: CHECK STOP TOKENS\n        if stop_tokens is not None and idx_next.item() in stop_tokens:\n            break\n        # .item(): convert 1-element tensor to Python int\n        # Stop token examples: EOS token (50256 in GPT-2)\n        # Without stop tokens: generate exactly max_new_tokens tokens\n\n    return idx\n    # Final shape: [b, t + num_generated_tokens]\n\nGENERATION EXAMPLE:\n  prompt:   \"The cat\"     -> token IDs: [464, 3797]\n  iter 1:   model sees [464, 3797], predicts next, samples 3332 (\"sat\")\n            idx = [464, 3797, 3332]\n  iter 2:   model sees [464, 3797, 3332], predicts, samples 319 (\"on\")\n            idx = [464, 3797, 3332, 319]\n  iter 3:   samples 262 (\"the\") -> idx = [464, 3797, 3332, 319, 262]\n  iter 4:   samples 2603 (\"mat\") -> idx = [..., 2603]\n  Output:   \"The cat sat on the mat\"","tags":["#gpt","#generation","#autoregressive","#temperature","#top-k","#multinomial","#sampling"]},{"e":"\ud83e\udde9","name":"GPT From Scratch \u2014 Weight Initialization & Why It Matters","m":"bf","tldr":"Good weight init prevents exploding/vanishing signals at the start of training. std=0.02 keeps activations near unit variance at initialization. Biases to zero, LayerNorm weights to 1.0. Bad init = model never learns or diverges in first few steps.","code":"def _init_weights(self, module):\n    if isinstance(module, (nn.Linear, nn.Embedding)):\n        module.weight.data.normal_(mean=0.0, std=0.02)\n        # Normal distribution with std=0.02\n        # Why 0.02? Empirically chosen for transformer stability\n        # Too large (std=1.0): activations explode through layers\n        # Too small (std=0.001): activations vanish through layers\n        # 0.02 keeps variance roughly stable across many layers\n\n        if isinstance(module, nn.Linear) and module.bias is not None:\n            module.bias.data.zero_()\n            # Biases start at zero (neutral)\n            # Network learns non-zero biases if needed during training\n\n    elif isinstance(module, nn.LayerNorm):\n        module.bias.data.zero_()\n        # LayerNorm bias (beta) starts at zero\n        module.weight.data.fill_(1.0)\n        # LayerNorm weight (gamma) starts at 1.0\n        # LayerNorm: y = gamma * (x - mean) / std + beta\n        # gamma=1, beta=0 at init = identity transform\n        # Network learns to scale and shift as needed\n\nWHY INIT MATTERS \u2014 INTUITION:\n\n  Say we have 12 transformer blocks.\n  Each block multiplies the signal by some weight matrix W.\n  If W has std=1.0: after 12 layers, variance grows by ~12x -> explodes\n  If W has std=0.1: after 12 layers, variance shrinks by ~12x -> vanishes\n  If W has std=0.02: variance stays roughly stable across all 12 layers\n\n  Mathematical justification:\n    If x has variance sigma^2 and W has variance w^2:\n    Var(Wx) = n * w^2 * sigma^2  (n = fan-in, number of input features)\n    For n_embd=768: w = 0.02 -> n * w^2 = 768 * 0.0004 = 0.31\n    Close to 1.0 -> signal stays controlled\n\nSELF APPLY:\n  self.apply(self._init_weights)\n  # .apply() traverses every submodule in the model tree\n  # Calls _init_weights on each one\n  # This covers: all nn.Linear, all nn.Embedding, all nn.LayerNorm\n  # Order: depth-first traversal of the module tree\n\nPARAMETER COUNT (GPT-2 small with n_embd=768, n_layer=12):\n  tok_emb:         50257 * 768   = 38.6M\n  pos_embd:        1024 * 768    = 0.8M\n  12 blocks:       ~7M each      = 84M\n  ln_f + head:     ~39M\n  Total:           ~117M parameters\n\n  print(\"number of parameters: {}\".format(\n      sum(p.numel() for p in self.parameters())))\n  # p.numel() = number of elements in tensor\n  # sum over ALL parameters including embeddings, weights, biases, norms","tags":["#gpt","#weight-init","#normal-distribution","#layernorm","#parameters","#stability"]}]}]},"palace-ops":{"icon":"ops","color":"#f472b6","bg":"rgba(244,114,182,0.12)","title":"Mem
